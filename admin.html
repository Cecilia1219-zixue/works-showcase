<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>医起AI·挑战赛 - 管理后台</title>
<script src="cloudbase.full.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0d0d1a;color:#e0e0e0;min-height:100vh}
:root{--bg:#0d0d1a;--card:#1a1a2e;--cardH:#22223a;--input:#16162a;--bdr:rgba(0,172,193,.15);--a1:#00ACC1;--a2:#00E5A0;--aGlow:rgba(0,172,193,.3);--txt:#e8e8f0;--txt2:#9a9ab0;--txt3:#6a6a80;--danger:#e74c3c}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:3px}
.header{background:linear-gradient(135deg,rgba(0,172,193,.12),rgba(0,229,160,.08));border-bottom:1px solid var(--bdr);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{font-size:18px;background:linear-gradient(90deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
.header .back a{color:var(--a1);text-decoration:none;font-size:13px;opacity:.8}
.container{max-width:1280px;margin:0 auto;padding:20px 16px}
.tabs{display:flex;gap:3px;margin-bottom:20px;background:var(--card);padding:4px;border-radius:12px;border:1px solid var(--bdr);overflow-x:auto}
.tab-btn{flex:1;padding:9px 6px;border:none;border-radius:10px;background:transparent;font-size:12px;cursor:pointer;color:var(--txt2);transition:.2s;font-weight:500;white-space:nowrap}
.tab-btn.active{background:linear-gradient(135deg,var(--a1),var(--a2));color:#0d0d1a;font-weight:700;box-shadow:0 2px 10px var(--aGlow)}
.panel{display:none;animation:fadeIn .25s}.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.dash-card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:20px 18px;position:relative;overflow:hidden}
.dash-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.dash-card:nth-child(1)::before{background:linear-gradient(90deg,var(--a1),var(--a2))}
.dash-card:nth-child(2)::before{background:linear-gradient(90deg,#FF6B6B,#FFB347)}
.dash-card:nth-child(3)::before{background:linear-gradient(90deg,#4ECDC4,#556270)}
.dash-card:nth-child(4)::before{background:linear-gradient(90deg,#A78BFA,#F472B6)}
.dash-card:nth-child(5)::before{background:linear-gradient(90deg,#FBBF24,#F59E0B)}
.dash-card .icon{font-size:26px;margin-bottom:8px}
.dash-card .num{font-size:30px;font-weight:800;background:linear-gradient(135deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2}
.dash-card .label{font-size:11px;color:var(--txt2);margin-top:4px}
.tw{overflow-x:auto;border-radius:12px;border:1px solid var(--bdr)}
table{width:100%;border-collapse:collapse;background:var(--card);min-width:560px}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--bdr);font-size:12px}
th{background:rgba(0,172,193,.06);font-weight:600;color:var(--a1);position:sticky;top:0;z-index:1;white-space:nowrap}
td{color:var(--txt)}tbody tr:hover{background:var(--cardH)}
.fb{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.fb select,.fb input{background:var(--input);border:1px solid var(--bdr);border-radius:8px;padding:7px 12px;color:var(--txt);font-size:12px;outline:none}
.fb select option{background:var(--card)}
.eg{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.ec{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:20px;display:flex;align-items:center;gap:14px}
.ec .i{font-size:32px}.ec .h3{font-size:14px;margin-bottom:2px}.ec .p{font-size:11px;color:var(--txt2)}
.btn{padding:9px 18px;border:none;border-radius:9px;font-size:12px;cursor:pointer;font-weight:600;transition:.2s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{opacity:.85}.bp{background:linear-gradient(135deg,var(--a1),var(--a2));color:#0d0d1a}.bd{background:var(--danger);color:#fff}.bs{padding:5px 12px;font-size:11px}
.badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600}
.bb{background:rgba(0,172,193,.12);color:var(--a1)}.bl{background:rgba(0,229,160,.1);color:var(--a2)}
.po{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(13,13,26,.94);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}.po.h{display:none}
.pb{background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:36px 32px;width:340px;text-align:center}
.pb h2{margin-bottom:6px;font-size:18px;background:linear-gradient(90deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pb p{color:var(--txt2);font-size:12px;margin-bottom:16px}.pe{color:var(--danger);font-size:12px;margin-bottom:8px;display:none}
.pb input{width:100%;padding:12px;border:1px solid var(--bdr);border-radius:10px;font-size:15px;text-align:center;outline:none;margin-bottom:12px;background:var(--input);color:var(--txt)}
.pb .bp{width:100%;padding:12px;font-size:14px;border-radius:10px}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(26,26,46,.92);color:#fff;padding:10px 24px;border-radius:10px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;border:1px solid var(--bdr)}.toast.s{opacity:1}
@media(max-width:768px){.header{padding:12px 14px}.header h1{font-size:15px}.container{padding:14px 10px}.dash-grid{grid-template-columns:repeat(2,1fr);gap:8px}.dash-card{padding:14px}.dash-card .num{font-size:24px}.tabs{gap:2px}.tab-btn{font-size:11px;padding:7px 5px}.eg{grid-template-columns:1fr}th,td{padding:8px 10px;font-size:11px}}
</style>
</head>
<body>

<div id="pwOverlay" class="po">
  <div class="pb">
    <h2>🔐 管理后台</h2><p>请输入管理密码继续</p>
    <div id="pwErr" class="pe">密码错误，请重试</div>
    <input id="pwIn" type="password" placeholder="输入管理密码" onkeydown="if(event.key==='Enter')checkPw()"/>
    <button class="btn bp" onclick="checkPw()">登 录</button>
  </div>
</div>

<div class="header">
  <h1>⚙️ 医起AI·挑战赛 管理后台</h1>
  <div class="back"><a href="index.html">← 返回作品广场</a></div>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" data-t="dash" onclick="switchT('dash')">📊 数据概览</button>
    <button class="tab-btn" data-t="works" onclick="switchT('works')">🏆 作品统计</button>
    <button class="tab-btn" data-t="users" onclick="switchT('users')">👤 用户行为</button>
    <button class="tab-btn" data-t="visit" onclick="switchT('visit')">👁️ 访客列表</button>
    <button class="tab-btn" data-t="export" onclick="switchT('export')">📥 数据导出</button>
    <button class="tab-btn" data-t="upload" onclick="switchT('upload')">📤 上传作品</button>
  </div>

  <div id="p-dash" class="panel active">
    <div class="dash-grid">
      <div class="dash-card"><div class="icon">📁</div><div class="num" id="d-works">-</div><div class="label">总作品数</div></div>
      <div class="dash-card"><div class="icon">❤️</div><div class="num" id="d-likes">-</div><div class="label">总点赞数</div></div>
      <div class="dash-card"><div class="icon">💬</div><div class="num" id="d-cmts">-</div><div class="label">总评论数</div></div>
      <div class="dash-card"><div class="icon">🔄</div><div class="num" id="d-shares">-</div><div class="label">总分享数</div></div>
      <div class="dash-card"><div class="icon">👁️</div><div class="num" id="d-visits">-</div><div class="label">总访客数</div></div>
    </div>
    <h3 style="font-size:14px;margin-bottom:12px;color:var(--a1)">🕐 最近访客</h3>
    <div class="tw"><table><thead><tr><th>用户昵称</th><th>部门</th><th>设备ID</th><th>最后访问</th></tr></thead><tbody id="d-rec-vis"></tbody></table></div>
  </div>

  <div id="p-works" class="panel">
    <div class="fb"><select id="w-cat" onchange="rWT()"><option value="all">全部分类</option><option value="battle">"医"起打擂台</option><option value="bold">医高人胆大</option></select><span style="font-size:11px;color:var(--txt3);margin-left:auto" id="w-cnt"></span></div>
    <div class="tw"><table><thead><tr><th>作品标题</th><th>分类</th><th>❤️ 点赞</th><th>💬 评论</th><th>🔄 分享</th><th>📈 互动总数</th></tr></thead><tbody id="w-tbody"></tbody></table></div>
  </div>

  <div id="p-users" class="panel">
    <div class="fb"><input id="u-name" placeholder="🔍 搜索用户名" oninput="rUT()" style="width:140px"/><input id="u-dept" placeholder="🔍 搜索部门" oninput="rUT()" style="width:140px"/><select id="u-type" onchange="rUT()"><option value="all">全部操作</option><option value="like">点赞</option><option value="comment">评论</option><option value="share">分享</option></select><span style="font-size:11px;color:var(--txt3);margin-left:auto" id="u-cnt"></span></div>
    <div class="tw"><table><thead><tr><th>用户名</th><th>部门</th><th>作品标题</th><th>操作类型</th><th>评论内容</th><th>时间</th></tr></thead><tbody id="u-tbody"></tbody></table></div>
  </div>

  <div id="p-visit" class="panel">
    <div class="tw"><table><thead><tr><th>用户昵称</th><th>部门</th><th>设备ID</th><th>首次访问</th><th>最后访问</th></tr></thead><tbody id="v-tbody"></tbody></table></div>
  </div>

  <div id="p-upload" class="panel">
    <div style="max-width:640px;margin:0 auto">
      <div style="background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:24px;margin-bottom:16px">
        <h3 style="font-size:14px;margin-bottom:4px;color:var(--a1)">📤 上传作品</h3>
        <p style="font-size:12px;color:var(--txt2);margin-bottom:20px">填写作品信息后提交到前台展示</p>
        <div style="display:grid;gap:12px">
          <label style="font-size:12px;color:var(--txt2)">作品标题 *</label>
          <input id="ul-title" style="background:var(--input);border:1px solid var(--bdr);border-radius:8px;padding:9px 14px;color:var(--txt);font-size:13px;outline:none" placeholder="请输入作品标题"/>
          <label style="font-size:12px;color:var(--txt2)">作品描述</label>
          <textarea id="ul-desc" rows="3" style="background:var(--input);border:1px solid var(--bdr);border-radius:8px;padding:9px 14px;color:var(--txt);font-size:13px;outline:none;resize:vertical;font-family:inherit" placeholder="请输入作品描述"></textarea>
          <label style="font-size:12px;color:var(--txt2)">所属分类 *</label>
          <label style="font-size:12px;color:var(--txt2)">作者 *</label>
          <input id="ul-author" style="background:var(--input);border:1px solid var(--bdr);border-radius:8px;padding:9px 14px;color:var(--txt);font-size:13px;outline:none" placeholder="请输入作者姓名"/>
          <select id="ul-cat" style="background:var(--input);border:1px solid var(--bdr);border-radius:8px;padding:9px 14px;color:var(--txt);font-size:13px;outline:none">
            <option value="0">📋 "医"起打擂台</option>
            <option value="1">📋 "医"高人胆大</option>
          </select>
          <label style="font-size:12px;color:var(--txt2)">📁 选择图片（支持多张，最多10张，直接上传）</label>
          <input id="ul-files" type="file" multiple accept="image/*" style="background:var(--input);border:1px solid var(--bdr);border-radius:8px;padding:10px 14px;color:var(--txt);font-size:12px" onchange="previewFiles()"/>
          <div id="ul-preview" style="display:flex;gap:8px;flex-wrap:wrap"></div>
          <div id="ul-status" style="font-size:11px;color:var(--txt2)"></div>
          <button class="btn bp" onclick="doSubmit()" style="margin-top:8px;padding:12px 24px;font-size:14px">🚀 提交作品</button>
        </div>
      </div>
      <div id="ul-msg" style="text-align:center;font-size:12px;color:var(--txt2);display:none"></div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
var EI='works-showcase-d2giub4pr5d687848',PK='eyJhbGciOiJSUzI1NiIsImtpZCI6IjlkMWRjMzFlLWI0ZDAtNDQ4Yi1hNzZmLWIwY2M2M2Q4MTQ5OCJ9.eyJpc3MiOiJodHRwczovL3dvcmtzLXNob3djYXNlLWQyZ2l1YjRwcjVkNjg3ODQ4LmFwLXNoYW5naGFpLnRjYi1hcGkudGVuY2VudGNsb3VkYXBpLmNvbSIsInN1YiI6ImFub24iLCJhdWQiOiJ3b3Jrcy1zaG93Y2FzZS1kMmdpdWI0cHI1ZDY4Nzg0OCIsImV4cCI6NDA4MzY2MDYyNiwiaWF0IjoxNzc5OTc3NDI2LCJub25jZSI6IlBSdHgtMm1GUlZ1OXFkM0p5ejU1aWciLCJhdF9oYXNoIjoiUFJ0eC0ybUZSVnU5cWQzSnl6NTVpZyIsIm5hbWUiOiJBbm9ueW1vdXMiLCJzY29wZSI6ImFub255bW91cyIsInByb2plY3RfaWQiOiJ3b3Jrcy1zaG93Y2FzZS1kMmdpdWI0cHI1ZDY4Nzg0OCIsIm1ldGEiOnsicGxhdGZvcm0iOiJQdWJsaXNoYWJsZUtleSJ9LCJ1c2VyX3R5cGUiOiIiLCJjbGllbnRfdHlwZSI6ImNsaWVudF91c2VyIiwiaXNfc3lzdGVtX2FkbWluIjpmYWxzZX0.hbLxMthyDPhSvGwtKo-PpjGfyejWQir39akNphU_pxYr5aW_MRC-crr-g2nznaTWcnvkjDLlXrJAxd8qjRQ7y5H6S_s8QOZ9LllWmEbDGU2IDV9-Z9F6R_-I3AFy80O6l-vVqEH2V3uTV7gOkGDHq9Rebf0adPIWs3Iv9Lgp-sU5MhZoXgluu-rkxDQPr3Lmaw1GL2O2t7QCp4fmfAJjBkBwgEY3hloe8LdO6_xe8fzAKRzMkc9o1D9ZgPplOARhj-lIQK6JVPjHpGYelYJmlMEq_ePQWzQ7HWKwucoPnspi11hnVP9-NQzesOYRMpjww7sIO5QWhTbyIat60TQbOw',AP='yiyao1219';
var app,auth,db,W=[],Lk=[],Cm=[],Sh=[],Vi=[],UR=[];

function checkPw(){if(document.getElementById('pwIn').value===AP){document.getElementById('pwOverlay').classList.add('h');localStorage.setItem('aa',JSON.stringify({t:Date.now()}));initDB().then(loadAll)}else{document.getElementById('pwErr').style.display='block'}}
function isAuth(){try{var d=JSON.parse(localStorage.getItem('aa'));return Date.now()-d.t<6048e5}catch(e){return false}}
if(isAuth())document.getElementById('pwOverlay').classList.add('h');

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function fd(d){if(!d)return'-';var t=new Date(d);return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0')}
function ft(d){return d?new Date(d).toLocaleString('zh-CN'):'-'}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('s');setTimeout(function(){t.classList.remove('s')},2200)}

function switchT(t){document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.toggle('active',b.dataset.t===t)});document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});var p=document.getElementById('p-'+t);if(p)p.classList.add('active')}

async function initDB(){
  try{
    app=cloudbase.init({env:EI,publishableKey:PK});
    auth=app.auth({persistence:'local'});
    db=app.database();
    // Check login state - try both old and new API
    try{
      if(typeof auth.hasLoginState==='function'){
        if(!auth.hasLoginState()){
          if(typeof auth.signInAnonymously==='function') await auth.signInAnonymously();
          else if(auth.anonymousAuthProvider){
            var provider=auth.anonymousAuthProvider();
            if(typeof provider.signIn==='function') await provider.signIn();
          }
        }
      }else{
        if(typeof auth.signInAnonymously==='function') await auth.signInAnonymously();
        else if(auth.anonymousAuthProvider){
          var provider=auth.anonymousAuthProvider();
          if(typeof provider.signIn==='function') await provider.signIn();
        }
      }
    }catch(e){
      console.warn('Auth warning:',e.message);
    }
    // Test DB connection
    await db.collection('Work').limit(1).get();
    console.log('DB ready');
  }catch(e){
    console.error('initDB error:',e);
    throw e;
  }
}

async function loadAll(){try{await loadD();rDash();rWT();rUT();rVT();console.log('loadAll OK')}catch(e){console.error('loadAll error:',e);toast('数据加载失败: '+e.message)}}

async function loadD(){
  var r;r=await db.collection('Work').orderBy('sort_order','asc').get();W=r.data||[];
  r=await db.collection('Like').get();Lk=r.data||[];
  r=await db.collection('Comment').get();Cm=r.data||[];
  r=await db.collection('Share').get();Sh=r.data||[];
  r=await db.collection('Visitor').orderBy('last_seen','desc').get();Vi=r.data||[];
}

function rDash(){
  el('d-works',W.length);el('d-likes',Lk.length);el('d-cmts',Cm.length);el('d-shares',Sh.length);el('d-visits',Vi.length);
  var tb=document.getElementById('d-rec-vis');
  tb.innerHTML=Vi.slice(0,10).map(function(v){return'<tr><td>'+esc(v.user_nickname)+'</td><td>'+esc(v.user_department)+'</td><td style="font-size:11px;color:var(--txt3)">'+esc(v.device_id)+'</td><td>'+ft(v.last_seen)+'</td></tr>'}).join('')||'<tr><td colspan="4" style="text-align:center;color:var(--txt3)">暂无数据</td></tr>';
}
function el(id,v){var e=document.getElementById(id);if(e)e.textContent=v}

function rWT(){
  var f=document.getElementById('w-cat').value;
  var ws=W.filter(function(w){return f==='all'||w.category===f});
  var rows=ws.map(function(w){
    var l=0,c=0,s=0;
    for(var i=0;i<Lk.length;i++)if(Lk[i].work_id===w._id)l++;
    for(var i=0;i<Cm.length;i++)if(Cm[i].work_id===w._id)c++;
    for(var i=0;i<Sh.length;i++)if(Sh[i].work_id===w._id)s++;
    return{w:w,l:l,c:c,s:s,t:l+c+s};
  });
  rows.sort(function(a,b){return b.t-a.t});
  var tb=document.getElementById('w-tbody');
  tb.innerHTML=rows.map(function(r){
    var cl=r.w.category==='battle'?'bb':'bl';
    var lb=r.w.category==='battle'?"\"医\"起打擂台":"医高人胆大";
    return'<tr><td>'+esc(r.w.title)+'</td><td><span class="badge '+cl+'">'+esc(lb)+'</span></td><td>'+r.l+'</td><td>'+r.c+'</td><td>'+r.s+'</td><td><strong>'+r.t+'</strong></td></tr>';
  }).join('')||'<tr><td colspan="6" style="text-align:center;color:var(--txt3)">暂无数据</td></tr>';
  document.getElementById('w-cnt').textContent='共 '+rows.length+' 个作品';
}

function buildUR(){
  var wm={};for(var i=0;i<W.length;i++)wm[W[i]._id]=W[i].title;
  UR=[];
  for(var i=0;i<Lk.length;i++){var x=Lk[i];UR.push({n:x.user_nickname||x.nickname||'',d:x.user_department||x.department||'',wt:wm[x.work_id]||'-',tp:'\u70b9\u8d5e',ct:'-',tm:x.created_at})}
  for(var i=0;i<Cm.length;i++){var x=Cm[i];UR.push({n:x.user_nickname||x.nickname||'',d:x.user_department||x.department||'',wt:wm[x.work_id]||'-',tp:'\u8bc4\u8bba',ct:x.content||'-',tm:x.created_at})}
  for(var i=0;i<Sh.length;i++){var x=Sh[i];UR.push({n:x.user_nickname||x.nickname||'',d:x.user_department||x.department||'',wt:wm[x.work_id]||'-',tp:'\u5206\u4eab',ct:'-',tm:x.created_at})}
  UR.sort(function(a,b){return new Date(b.tm)-new Date(a.tm)});
}

function rUT(){
  buildUR();
  var nf=document.getElementById('u-name').value.trim().toLowerCase();
  var df=document.getElementById('u-dept').value.trim().toLowerCase();
  var tf=document.getElementById('u-type').value;
  var tpMap={like:'\u70b9\u8d5e',comment:'\u8bc4\u8bba',share:'\u5206\u4eab'};
  var f=UR.filter(function(r){
    if(nf&&r.n.toLowerCase().indexOf(nf)===-1)return false;

function csvCell(v){var s=String(v||'');if(s.indexOf(',')!==-1||s.indexOf('"')!==-1||s.indexOf('\n')!==-1)return'"'+s.replace(/"/g,'""')+'"';return s}
function dlCSV(rows,filename){
  var bom='\uFEFF';var csv=bom+rows.map(function(r){return r.map(csvCell).join(',')}).join('\r\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);
  toast('导出成功: '+filename);
}

// ===== Upload =====
var _ulFiles=[];
function previewFiles(){
  var input=document.getElementById('ul-files');
  var newFiles=Array.from(input.files);
  if(_ulFiles.length+newFiles.length>10){toast('最多10张，当前已有'+_ulFiles.length+'张');return}
  _ulFiles=_ulFiles.concat(newFiles);renderPreview();input.value='';
}

function removeImg(idx){_ulFiles.splice(idx,1);renderPreview()}

function renderPreview(){
  var preview=document.getElementById('ul-preview');
  var status=document.getElementById('ul-status');
  preview.innerHTML='';
  status.textContent=_ulFiles.length?'已选择 '+_ulFiles.length+' 张（点击 × 移除）':'';
  _ulFiles.forEach(function(f,i){
    var idx=i;
    var reader=new FileReader();
    reader.onload=function(e){
      var wrap=document.createElement('div');
      wrap.style.cssText='position:relative;width:80px;height:80px;border-radius:8px;overflow:hidden;border:2px solid var(--bdr)';
      wrap.innerHTML='<img src="'+e.target.result+'" style="width:100%;height:100%;object-fit:cover"/>'+'<div style="position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:14px;line-height:20px;text-align:center;cursor:pointer">\u00d7</div>';
      wrap.querySelector('div').onclick=function(){removeImg(idx)};
      preview.appendChild(wrap);
    };
    reader.readAsDataURL(f);
  });
}

function compressImg(file,maxW,quality){
  return new Promise(function(resolve){
    var reader=new FileReader();
    reader.onload=function(e){
      var img=new Image();
      img.onload=function(){
        var w=img.width,h=img.height;
        if(w>maxW){h=Math.round(h*maxW/w);w=maxW}
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',quality));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function doSubmit(){
  if(!db||typeof db.collection!=='function'){toast('数据库未就绪，请等待3秒');return}
  var title=document.getElementById('ul-title').value.trim();
  var desc=document.getElementById('ul-desc').value.trim();
  a var author=document.getElementById("ul-author").value.trim();
  if(!author){toast("请填写作者");return}
  var cat=document.getElementById('ul-cat').value;
  var msg=document.getElementById('ul-msg');
  if(!title){toast('请填写标题');return}
  if(!_ulFiles.length){toast('请选择至少一张图片');return}
  msg.textContent='正在处理 '+_ulFiles.length+' 张图片...';msg.style.color='var(--txt2)';msg.style.display='block';
  var images=[];
  for(var i=0;i<_ulFiles.length;i++){
    try{
      var b64=await compressImg(_ulFiles[i],600,0.6);
      images.push(b64);
    }catch(e){
      msg.textContent='图片处理失败: '+e.message;msg.style.color='var(--danger)';return;
    }
  }
  try{
    await db.collection('Work').add({
      title:title,description:desc,category:cat,creator_name:author,images:images,
      visible:true,sort_order:Date.now(),createdAt:new Date()
    });
    document.getElementById('ul-title').value='';
    document.getElementById('ul-desc').value='';
    document.getElementById('ul-files').value='';
    document.getElementById('ul-preview').innerHTML='';
    document.getElementById('ul-status').textContent='';
    _ulFiles=[];
    msg.textContent='\u2705 作品已提交！刷新前台即可看到';msg.style.color='#00E5A0';
    toast('发布成功');
    loadAll();
  }catch(e){
    msg.textContent='发布失败: '+e.message;msg.style.color='var(--danger)';
    toast('发布失败: '+e.message);
  }
}

if(isAuth()){initDB().then(loadAll)}else{document.getElementById('pwIn').focus()}
