<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>医起AI·挑战赛 - 管理后台</title>
<script src="https://unpkg.com/@cloudbase/js-sdk@latest/dist/index.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Roboto,sans-serif;background:linear-gradient(160deg,#D4F2EC 0%,#E8FAF6 40%,#f0f4ff 100%);color:#1a1a2e;min-height:100vh}
.header{background:linear-gradient(135deg,#00ACC1,#1565C0);color:#fff;padding:20px 20px;text-align:center;box-shadow:0 4px 16px rgba(0,172,193,.2)}
.header h1{font-size:20px;letter-spacing:2px}
.header .back{font-size:13px;opacity:.85;margin-top:6px}
.header .back a{color:#fff}
.container{max-width:1200px;margin:0 auto;padding:20px 16px}
.tabs{display:flex;gap:6px;margin-bottom:20px;background:#fff;padding:6px;border-radius:12px;box-shadow:0 2px 12px rgba(0,172,193,.08)}
.tab-btn{flex:1;padding:10px;border:none;border-radius:8px;background:#f0f8f7;font-size:14px;cursor:pointer;transition:.2s;font-weight:500;color:#5a6a7a}
.tab-btn.active{background:linear-gradient(135deg,#00ACC1,#1565C0);color:#fff;box-shadow:0 2px 8px rgba(0,172,193,.25)}
.panel{display:none}
.panel.active{display:block}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,172,193,.06)}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid #e8f0ee;font-size:13px}
th{background:#f0f8f7;font-weight:600;color:#00ACC1}
.work-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,172,193,.08);border:1px solid rgba(0,172,193,.06)}
.work-card h3{font-size:15px;margin-bottom:12px;color:#1a1a2e}
.stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.stat-box{flex:1;min-width:100px;padding:10px;border-radius:8px;text-align:center}
.stat-today{background:rgba(0,172,193,.08)}
.stat-total{background:rgba(21,101,192,.06)}
.stat-box .num{font-size:22px;font-weight:700;color:#00ACC1}
.stat-box .label{font-size:11px;color:#999;margin-top:4px}
.stat-total .num{color:#1565C0}
.detail-toggle{font-size:13px;color:#00ACC1;cursor:pointer;text-decoration:underline}
.detail-table{display:none;margin-top:8px}
.detail-table.show{display:block}
.detail-table table{box-shadow:none;border:1px solid #e8f0ee}
.detail-table th{background:rgba(0,172,193,.04)}
.form-section{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(0,172,193,.08);border:1px solid rgba(0,172,193,.06)}
.form-section h3{margin-bottom:16px;font-size:16px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#5a6a7a;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid #d8e8e4;border-radius:10px;font-size:14px;outline:none;background:#f8fcfb}
.form-group input:focus,.form-group textarea:focus{border-color:#00ACC1;background:#fff}
.form-group textarea{height:60px;resize:vertical}
.btn{padding:10px 24px;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:600;transition:.2s}
.btn-primary{background:linear-gradient(135deg,#00ACC1,#1565C0);color:#fff}
.btn-danger{background:#e74c3c;color:#fff;font-size:12px;padding:6px 14px}
.btn:hover{opacity:.85;transform:scale(1.02)}
.form-actions{display:flex;gap:8px;margin-top:8px}
.password-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.password-overlay.hidden{display:none}
.password-box{background:#fff;border-radius:20px;padding:32px;width:340px;text-align:center;box-shadow:0 8px 32px rgba(0,172,193,.15)}
.password-box h2{margin-bottom:8px;font-size:18px}
.password-box p{color:#5a6a7a;font-size:13px;margin-bottom:16px}
.password-box input{width:100%;padding:12px;border:1px solid #d8e8e4;border-radius:10px;font-size:15px;text-align:center;outline:none;margin-bottom:12px;background:#f8fcfb}
.password-box input:focus{border-color:#00ACC1;background:#fff}
.password-error{color:#e74c3c;font-size:13px;margin-bottom:8px;display:none}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(26,26,46,.8);color:#fff;padding:10px 24px;border-radius:10px;font-size:14px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;backdrop-filter:blur(4px)}
.toast.show{opacity:1}
.loading{text-align:center;padding:40px;color:#5a6a7a}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600}
.badge-battle{background:rgba(0,172,193,.08);color:#00ACC1}
.badge-bold{background:rgba(21,101,192,.06);color:#1565C0}
.work-item{background:#fff;border-radius:10px;padding:12px 16px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,172,193,.06);display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(0,172,193,.04)}
.work-item .info{flex:1}
.work-item .info h4{font-size:14px;margin-bottom:4px}
.work-item .info p{font-size:12px;color:#999}
</style>
</head>
<body>

<div id="passwordOverlay" class="password-overlay">
  <div class="password-box">
    <h2>🔐 管理后台登录</h2>
    <p>请输入管理密码</p>
    <div id="pwError" class="password-error">密码错误</div>
    <input id="pwInput" type="password" placeholder="输入密码" onkeydown="if(event.key==='Enter')checkPassword()" />
    <button class="btn btn-primary" style="width:100%" onclick="checkPassword()">登录</button>
  </div>
</div>

<div class="header">
  <h1>⚙️ 医起AI·挑战赛 管理后台</h1>
  <div class="back"><a href="index.html">← 返回作品广场</a></div>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('daily')">每日访问</button>
    <button class="tab-btn" onclick="switchTab('stats')">互动明细</button>
    <button class="tab-btn" onclick="switchTab('manage')">作品管理</button>
  </div>

  <div id="panel-daily" class="panel active">
    <table><thead><tr><th>日期</th><th>UV（去重人数）</th><th>PV（总访问次数）</th></tr></thead>
    <tbody id="daily-tbody"></tbody></table>
  </div>

  <div id="panel-stats" class="panel">
    <div id="stats-container"></div>
  </div>

  <div id="panel-manage" class="panel">
    <div class="form-section" style="margin-bottom:20px">
      <h3>➕ 新增作品</h3>
      <div class="form-group"><label>标题</label><input id="new-title" placeholder="作品标题" /></div>
      <div class="form-group"><label>描述</label><textarea id="new-desc" placeholder="作品描述"></textarea></div>
      <div class="form-group"><label>分类</label>
        <select id="new-cat"><option value="battle">"医"起打擂台</option><option value="bold">医高人胆大</option></select>
      </div>
      <div class="form-group"><label>图片URL（逗号分隔）</label><input id="new-imgs" placeholder="https://xxx.jpg,https://yyy.png" /></div>
      <div class="form-group"><label>外链</label><input id="new-url" placeholder="https://..." /></div>
      <div class="form-group"><label>排序值（越小越靠前）</label><input id="new-sort" type="number" value="99" /></div>
      <button class="btn btn-primary" onclick="addWork()">添加作品</button>
    </div>
    <div id="works-list"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const ENV_ID = 'works-showcase-d2giub4pr5d687848';
const PUB_KEY = 'eyJhbGciOiJSUzI1NiIsImtpZCI6IjlkMWRjMzFlLWI0ZDAtNDQ4Yi1hNzZmLWIwY2M2M2Q4MTQ5OCJ9.eyJpc3MiOiJodHRwczovL3dvcmtzLXNob3djYXNlLWQyZ2l1YjRwcjVkNjg3ODQ4LmFwLXNoYW5naGFpLnRjYi1hcGkudGVuY2VudGNsb3VkYXBpLmNvbSIsInN1YiI6ImFub24iLCJhdWQiOiJ3b3Jrcy1zaG93Y2FzZS1kMmdpdWI0cHI1ZDY4Nzg0OCIsImV4cCI6NDA4MzY2MDYyNiwiaWF0IjoxNzc5OTc3NDI2LCJub25jZSI6IlBSdHgtMm1GUlZ1OXFkM0p5ejU1aWciLCJhdF9oYXNoIjoiUFJ0eC0ybUZSVnU5cWQzSnl6NTVpZyIsIm5hbWUiOiJBbm9ueW1vdXMiLCJzY29wZSI6ImFub255bW91cyIsInByb2plY3RfaWQiOiJ3b3Jrcy1zaG93Y2FzZS1kMmdpdWI0cHI1ZDY4Nzg0OCIsIm1ldGEiOnsicGxhdGZvcm0iOiJQdWJsaXNoYWJsZUtleSJ9LCJ1c2VyX3R5cGUiOiIiLCJjbGllbnRfdHlwZSI6ImNsaWVudF91c2VyIiwiaXNfc3lzdGVtX2FkbWluIjpmYWxzZX0.hbLxMthyDPhSvGwtKo-PpjGfyejWQir39akNphU_pxYr5aW_MRC-crr-g2nznaTWcnvkjDLlXrJAxd8qjRQ7y5H6S_s8QOZ9LllWmEbDGU2IDV9-Z9F6R_-I3AFy80O6l-vVqEH2V3uTV7gOkGDHq9Rebf0adPIWs3Iv9Lgp-sU5MhZoXgluu-rkxDQPr3Lmaw1GL2O2t7QCp4fmfAJjBkBwgEY3hloe8LdO6_xe8fzAKRzMkc9o1D9ZgPplOARhj-lIQK6JVPjHpGYelYJmlMEq_ePQWzQ7HWKwucoPnspi11hnVP9-NQzesOYRMpjww7sIO5QWhTbyIat60TQbOw';
const ADMIN_PW = 'yiyao1219';
let app, auth, db;

function checkPassword() {
  var pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PW) {
    document.getElementById('passwordOverlay').classList.add('hidden');
    localStorage.setItem('admin_auth', JSON.stringify({ ts: Date.now() }));
    initCloudBase().then(loadAll);
  } else {
    document.getElementById('pwError').style.display = 'block';
  }
}

function isAuthenticated() {
  try {
    var d = JSON.parse(localStorage.getItem('admin_auth'));
    return Date.now() - d.ts < 7 * 24 * 3600 * 1000;
  } catch (e) { return false; }
}

if (isAuthenticated()) {
  document.getElementById('passwordOverlay').classList.add('hidden');
}

function escHtml(s) {
  var div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

function fmtDate(d) {
  if (!d) return '-';
  var dt = new Date(d);
  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
}

function fmtTime(d) {
  if (!d) return '-';
  return new Date(d).toLocaleString('zh-CN');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

function switchTab(tab) {
  var btns = document.querySelectorAll('.tab-btn');
  var panels = document.querySelectorAll('.panel');
  btns.forEach(function(b, i) {
    b.classList.toggle('active', (i===0&&tab==='daily')||(i===1&&tab==='stats')||(i===2&&tab==='manage'));
  });
  panels.forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('panel-' + tab).classList.add('active');
}

async function initCloudBase() {
  app = cloudbase.init({ env: ENV_ID, publishableKey: PUB_KEY });
  auth = app.auth({ persistence: 'local' });
  db = app.database();
  await auth.anonymousAuthProvider().signIn();
}

async function loadAll() {
  loadDailyVisits();
  loadStats();
  loadWorksList();
}

async function loadDailyVisits() {
  try {
    var res = await db.collection('Visitor').orderBy('last_seen', 'desc').get();
    var visitors = res.data || [];
    var dateMap = {};
    visitors.forEach(function(v) {
      var date = fmtDate(v.last_seen || v.created_at);
      if (!dateMap[date]) dateMap[date] = { devices: new Set(), count: 0 };
      dateMap[date].devices.add(v.device_id);
      dateMap[date].count++;
    });
    var sorted = Object.entries(dateMap).sort(function(a, b) { return b[0].localeCompare(a[0]); });
    var tbody = document.getElementById('daily-tbody');
    tbody.innerHTML = sorted.map(function(entry) {
      var date = entry[0], info = entry[1];
      return '<tr><td>' + date + '</td><td>' + info.devices.size + '</td><td>' + info.count + '</td></tr>';
    }).join('') || '<tr><td colspan="3" style="text-align:center;color:#999">暂无数据</td></tr>';
  } catch(e) {
    document.getElementById('daily-tbody').innerHTML = '<tr><td colspan="3" style="text-align:center;color:#e74c3c">加载失败: ' + escHtml(e.message) + '</td></tr>';
  }
}

async function loadStats() {
  try {
    var res = await db.collection('Work').orderBy('sort_order', 'asc').get();
    var worksList = res.data || [];
    var today = fmtDate(new Date());
    var container = document.getElementById('stats-container');
    if (worksList.length === 0) {
      container.innerHTML = '<div class="loading">暂无作品</div>';
      return;
    }
    var html = '';
    for (var i = 0; i < worksList.length; i++) {
      var w = worksList[i];
      html += '<div class="work-card" data-workid="' + w._id + '">';
      html += '<h3>' + escHtml(w.title) + ' <span class="badge ' + (w.category==='battle'?'badge-battle':'badge-bold') + '">' + (w.category==='battle'?'打擂台':'胆大') + '</span></h3>';
      html += '<div class="stats-row">';
      html += '<div class="stat-box stat-today"><div class="num" id="tl-' + w._id + '">-</div><div class="label">今日点赞</div></div>';
      html += '<div class="stat-box stat-today"><div class="num" id="tc-' + w._id + '">-</div><div class="label">今日评论</div></div>';
      html += '<div class="stat-box stat-today"><div class="num" id="ts-' + w._id + '">-</div><div class="label">今日转发</div></div>';
      html += '<div class="stat-box stat-total"><div class="num" id="al-' + w._id + '">-</div><div class="label">总点赞</div></div>';
      html += '<div class="stat-box stat-total"><div class="num" id="ac-' + w._id + '">-</div><div class="label">总评论</div></div>';
      html += '<div class="stat-box stat-total"><div class="num" id="as-' + w._id + '">-</div><div class="label">总转发</div></div>';
      html += '</div>';
      html += '<div class="detail-toggle" onclick="toggleDetail(\'' + w._id + '\')">📋 展开查看详情</div>';
      html += '<div class="detail-table" id="detail-' + w._id + '"></div>';
      html += '</div>';
    }
    container.innerHTML = html;

    for (var j = 0; j < worksList.length; j++) {
      var wid = worksList[j]._id;
      var likesRes = await db.collection('Like').where({ work_id: wid }).get();
      var cmtsRes = await db.collection('Comment').where({ work_id: wid }).get();
      var sharesRes = await db.collection('Share').where({ work_id: wid }).get();
      var lAll = likesRes.data || [];
      var cAll = cmtsRes.data || [];
      var sAll = sharesRes.data || [];
      var lToday = lAll.filter(function(x) { return fmtDate(x.created_at) === today; });
      var cToday = cAll.filter(function(x) { return fmtDate(x.created_at) === today; });
      var sToday = sAll.filter(function(x) { return fmtDate(x.created_at) === today; });

      var se = function(id, val) { var e = document.getElementById(id); if(e) e.textContent = val; };
      se('tl-' + wid, lToday.length);
      se('tc-' + wid, cToday.length);
      se('ts-' + wid, sToday.length);
      se('al-' + wid, lAll.length);
      se('ac-' + wid, cAll.length);
      se('as-' + wid, sAll.length);

      var detailEl = document.getElementById('detail-' + wid);
      if (detailEl) {
        var rows = '';
        lAll.forEach(function(x) { rows += '<tr><td>' + escHtml(x.nickname) + '</td><td>' + fmtTime(x.created_at) + '</td></tr>'; });
        var likesTable = '<p style="font-size:13px;font-weight:600;margin-bottom:6px">点赞明细</p><table><thead><tr><th>姓名</th><th>时间</th></tr></thead><tbody>' + (rows || '<tr><td colspan="2" style="color:#999;text-align:center">暂无</td></tr>') + '</tbody></table>';

        rows = '';
        cAll.forEach(function(x) { rows += '<tr><td>' + escHtml(x.nickname) + '</td><td>' + fmtTime(x.created_at) + '</td><td>' + escHtml(x.content) + '</td></tr>'; });
        var cmtsTable = '<p style="font-size:13px;font-weight:600;margin:12px 0 6px">评论明细</p><table><thead><tr><th>姓名</th><th>时间</th><th>内容</th></tr></thead><tbody>' + (rows || '<tr><td colspan="3" style="color:#999;text-align:center">暂无</td></tr>') + '</tbody></table>';

        rows = '';
        sAll.forEach(function(x) { rows += '<tr><td>' + escHtml(x.nickname) + '</td><td>' + fmtTime(x.created_at) + '</td><td>' + escHtml(x.share_type) + '</td></tr>'; });
        var sharesTable = '<p style="font-size:13px;font-weight:600;margin:12px 0 6px">转发明细</p><table><thead><tr><th>姓名</th><th>时间</th><th>类型</th></tr></thead><tbody>' + (rows || '<tr><td colspan="3" style="color:#999;text-align:center">暂无</td></tr>') + '</tbody></table>';

        detailEl.innerHTML = likesTable + cmtsTable + sharesTable;
      }
    }
  } catch(e) {
    document.getElementById('stats-container').innerHTML = '<div class="loading" style="color:#e74c3c">加载失败: ' + escHtml(e.message) + '</div>';
  }
}

function toggleDetail(id) {
  var el = document.getElementById('detail-' + id);
  if (el) el.classList.toggle('show');
}

async function loadWorksList() {
  try {
    var res = await db.collection('Work').orderBy('sort_order', 'asc').get();
    var works = res.data || [];
    var container = document.getElementById('works-list');
    if (works.length === 0) {
      container.innerHTML = '<div class="loading">暂无作品</div>';
      return;
    }
    container.innerHTML = works.map(function(w) {
      return '<div class="work-item"><div class="info"><h4>' + escHtml(w.title) + ' <span class="badge ' + (w.category==='battle'?'badge-battle':'badge-bold') + '">' + (w.category==='battle'?'打擂台':'胆大') + '</span></h4><p>' + escHtml(w.description) + ' | 排序: ' + (w.sort_order||0) + '</p></div><button class="btn btn-danger" onclick="deleteWork(\'' + w._id + '\')">删除</button></div>';
    }).join('');
  } catch(e) {
    document.getElementById('works-list').innerHTML = '<div class="loading" style="color:#e74c3c">加载失败</div>';
  }
}

async function addWork() {
  var title = document.getElementById('new-title').value.trim();
  var desc = document.getElementById('new-desc').value.trim();
  var cat = document.getElementById('new-cat').value;
  var imgs = document.getElementById('new-imgs').value.trim();
  var url = document.getElementById('new-url').value.trim();
  var sort = parseInt(document.getElementById('new-sort').value) || 99;
  if (!title) { showToast('请输入标题'); return; }
  try {
    await db.collection('Work').add({
      title: title, description: desc, category: cat, images: imgs,
      external_url: url, sort_order: sort, created_at: new Date()
    });
    showToast('作品添加成功');
    document.getElementById('new-title').value = '';
    document.getElementById('new-desc').value = '';
    document.getElementById('new-imgs').value = '';
    document.getElementById('new-url').value = '';
    document.getElementById('new-sort').value = '99';
    loadWorksList();
    loadStats();
  } catch(e) {
    showToast('添加失败: ' + e.message);
  }
}

async function deleteWork(id) {
  if (!confirm('确定删除该作品？')) return;
  try {
    await db.collection('Work').doc(id).remove();
    showToast('已删除');
    loadWorksList();
    loadStats();
  } catch(e) {
    showToast('删除失败: ' + e.message);
  }
}

// 初始化
if (isAuthenticated()) {
  initCloudBase().then(loadAll);
} else {
  document.getElementById('pwInput').focus();
}
</script>
</body>
</html>
