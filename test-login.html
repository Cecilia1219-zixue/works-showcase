<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>测试云函数 login</title></head>
<body style="padding:2rem;font-family:monospace">
<h2>测试 CloudBase 云函数 login</h2>
<div style="margin:1rem 0">
  <button onclick="testCall()">Step 2: 调云函数</button>
</div>
<pre id="log" style="margin-top:1rem;padding:1rem;background:#f0f0f0;white-space:pre-wrap">等待测试...</pre>

<script src="cloudbase.full.js"></script>
<script>
const ENV_ID='works-showcase-d2giub4pr5d687848';
let app;

const log=document.getElementById('log');

async function testCall(){
  log.textContent='';
  logMsg('检查 cloudbase...');
  
  try{
    const appObj=cloudbase.init({env:ENV_ID});
    logMsg('✅ init OK, keys: '+Object.keys(appObj).join(', '));
    
    logMsg('正在调用云函数 login...');
    const res=await appObj.callFunction({name:'login',data:{code:'test_code_123'}});
    logMsg('✅ 结果: '+JSON.stringify(res,null,2));
  }catch(e){
    logMsg('❌ 失败: '+e.message);
  }
}

// Auto-run
testCall();
</script>
</body>
</html>
