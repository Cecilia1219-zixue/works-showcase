<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>优秀作品展</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f5f5; color: #333; }
  header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-align: center; padding: 30px 20px 20px; }
  header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: 2px; }
  header p { margin-top: 8px; font-size: 0.9rem; opacity: 0.85; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
  @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
  .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); transition: transform 0.2s, box-shadow 0.2s; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.14); }
  .carousel { position: relative; width: 100%; aspect-ratio: 16/10; overflow: hidden; background: #eee; }
  .carousel img { width: 100%; height: 100%; object-fit: cover; display: none; }
  .carousel img.active { display: block; }
  .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.35); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; z-index: 2; display: flex; align-items: center; justify-content: center; }
  .carousel-btn.prev { left: 8px; }
  .carousel-btn.next { right: 8px; }
  .carousel-dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
  .carousel-dots span { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.6); cursor: pointer; }
  .carousel-dots span.active { background: white; }
  .card-body { padding: 16px; }
  .card-title { font-size: 1rem; font-weight: 600; line-height: 1.4; }
  .card-desc { margin-top: 8px; font-size: 0.875rem; color: #666; line-height: 1.6; white-space: pre-wrap; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; }
  .card-link a { color: #667eea; font-size: 0.85rem; text-decoration: none; display: flex; align-items: center; gap: 4px; }
  .card-link a:hover { text-decoration: underline; }
  .like-btn { background: none; border: 1.5px solid #e0e0e0; border-radius: 20px; padding: 6px 14px; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 5px; color: #888; transition: all 0.2s; }
  .like-btn:hover, .like-btn.liked { border-color: #ff6b6b; color: #ff6b6b; background: #fff5f5; }
  .like-btn.liked .heart { animation: heartbeat 0.3s; }
  @keyframes heartbeat { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
  .empty { text-align: center; padding: 80px 20px; color: #aaa; }
  .empty svg { width: 64px; opacity: 0.3; margin-bottom: 16px; }
  .admin-link { text-align: center; padding: 20px; }
  .admin-link a { color: #bbb; font-size: 0.75rem; text-decoration: none; }
  .admin-link a:hover { color: #667eea; }
</style>
</head>
<body>
<header>
  <h1>✨ 优秀作品展</h1>
  <p>发现优秀，分享灵感</p>
</header>
<div class="container">
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 16l4-4 4 4 6-8"/><circle cx="12" cy="12" r="10"/></svg>
    <p>暂无作品，敬请期待</p>
  </div>
</div>
<div class="admin-link"><a href="admin.html">管理后台</a></div>

<script>
const STORAGE_KEY = 'works_data_v1';
const LIKES_KEY = 'works_likes_v1';

function getData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
}
function getLikes() {
  try { return JSON.parse(localStorage.getItem(LIKES_KEY)) || {}; } catch { return {}; }
}
function saveLikes(likes) {
  localStorage.setItem(LIKES_KEY, JSON.stringify(likes));
}

function renderCards() {
  const works = getData();
  const likes = getLikes();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  grid.innerHTML = '';
  if (!works.length) { empty.style.display = ''; return; }
  empty.style.display = 'none';
  works.forEach((w, i) => {
    const likeCount = likes[w.id] ? likes[w.id].count : 0;
    const isLiked = likes[w.id] ? likes[w.id].byMe : false;
    const imgs = w.images || [];
    let carouselHtml = '';
    if (imgs.length > 0) {
      carouselHtml = `<div class="carousel" id="c${i}">`;
      imgs.forEach((src, j) => {
        carouselHtml += `<img src="${src}" class="${j===0?'active':''}" alt="">`;
      });
      if (imgs.length > 1) {
        carouselHtml += `<button class="carousel-btn prev" onclick="slide(${i},-1)">&#8249;</button>`;
        carouselHtml += `<button class="carousel-btn next" onclick="slide(${i},1)">&#8250;</button>`;
        carouselHtml += `<div class="carousel-dots" id="dots${i}">`;
        imgs.forEach((_, j) => carouselHtml += `<span class="${j===0?'active':''}" onclick="goSlide(${i},${j})"></span>`);
        carouselHtml += `</div>`;
      }
      carouselHtml += `</div>`;
    }
    const linkHtml = w.link ? `<div class="card-link"><a href="${w.link}" target="_blank">🔗 查看详情</a></div>` : '<div></div>';
    grid.innerHTML += `
      <div class="card">
        ${carouselHtml}
        <div class="card-body">
          <div class="card-title">${w.title || '未命名作品'}</div>
          ${w.desc ? `<div class="card-desc">${w.desc}</div>` : ''}
          <div class="card-footer">
            ${linkHtml}
            <button class="like-btn ${isLiked?'liked':''}" id="like${i}" onclick="toggleLike('${w.id}',${i})">
              <span class="heart">${isLiked?'❤️':'🤍'}</span> ${likeCount}
            </button>
          </div>
        </div>
      </div>`;
  });
}

window._carouselIdx = {};
function slide(i, dir) {
  const c = document.getElementById('c'+i);
  const imgs = c.querySelectorAll('img');
  const dots = document.getElementById('dots'+i);
  let idx = window._carouselIdx[i] || 0;
  imgs[idx].classList.remove('active');
  dots && dots.children[idx].classList.remove('active');
  idx = (idx + dir + imgs.length) % imgs.length;
  imgs[idx].classList.add('active');
  dots && dots.children[idx].classList.add('active');
  window._carouselIdx[i] = idx;
}
function goSlide(i, j) {
  const c = document.getElementById('c'+i);
  const imgs = c.querySelectorAll('img');
  const dots = document.getElementById('dots'+i);
  const idx = window._carouselIdx[i] || 0;
  imgs[idx].classList.remove('active');
  dots && dots.children[idx].classList.remove('active');
  imgs[j].classList.add('active');
  dots && dots.children[j].classList.add('active');
  window._carouselIdx[i] = j;
}

function toggleLike(id, i) {
  const likes = getLikes();
  if (!likes[id]) likes[id] = { count: 0, byMe: false };
  if (likes[id].byMe) {
    likes[id].count = Math.max(0, likes[id].count - 1);
    likes[id].byMe = false;
  } else {
    likes[id].count++;
    likes[id].byMe = true;
  }
  saveLikes(likes);
  renderCards();
}

renderCards();
</script>
</body>
</html>
