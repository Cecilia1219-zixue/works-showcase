<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>医起AI·挑战赛</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F5F4;--bg-alt:#FAFAFA;--surface:#fff;
  --teal:#00ACC1;--blue:#1565C0;--gradient:linear-gradient(135deg,var(--teal),var(--blue));
  --text-primary:#1A1A1A;--text-secondary:#666;--text-dim:#999;
  --card-shadow:0 2px 12px rgba(0,0,0,0.06);
  --card-shadow-h:0 8px 32px rgba(0,0,0,0.10);
  --card-radius:16px;--chip-bg:#EBEBEB;
  --nav-bg:rgba(255,255,255,0.92);--nav-shadow:0 2px 12px rgba(0,0,0,0.06);
  --border:rgba(0,0,0,0.06);--border-h:rgba(0,0,0,0.10);
}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--text-primary);min-height:100vh;line-height:1.6;overflow-x:hidden;
}
a{color:var(--teal);text-decoration:none}

/* ── 登录页 ── */
#login-overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:opacity .5s,visibility .5s;overflow:hidden}
#login-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
.login-hero{position:absolute;inset:0;z-index:0;overflow:hidden}
.login-hero img{width:100%;height:100%;object-fit:cover;object-position:center;filter:brightness(0.92);opacity:.18}
.login-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,var(--bg) 0%,transparent 20%,transparent 80%,var(--bg) 100%)}
.login-card{position:relative;z-index:1;background:rgba(255,255,255,0.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(0,0,0,0.06);border-radius:24px;padding:2.5rem 2rem;width:90%;max-width:420px;box-shadow:0 16px 48px rgba(0,0,0,0.08);text-align:center}
.login-card .logo-sphere{width:80px;height:80px;margin:0 auto 1.2rem;border-radius:50%;overflow:hidden;box-shadow:0 4px 20px rgba(0,172,193,0.15)}
.login-card .logo-sphere img{width:100%;height:100%;object-fit:cover;display:block}
.login-card h1{font-size:1.6rem;font-weight:700;color:var(--text-primary);letter-spacing:-0.02em;margin-bottom:.2rem}
.login-card .theme-text{font-family:'Dancing Script','Georgia',cursive;font-size:1rem;color:rgba(26,26,26,0.3);margin-bottom:1.5rem;font-style:italic}
.login-card .login-form{text-align:left}
.login-card .login-form h2{display:none}
.login-card .login-form>p{text-align:center;color:var(--text-dim);margin-bottom:1.5rem;font-size:.85rem}
.form-input{width:100%;padding:14px 16px;margin-bottom:1rem;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text-primary);font-size:1rem;outline:none;transition:border-color .2s,box-shadow .2s}
.form-input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,172,193,0.1)}
.form-input::placeholder{color:var(--text-dim)}
.form-btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 28px;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .2s,opacity .2s}
.btn-primary{width:100%;margin-top:.5rem;background:var(--gradient);color:#fff;box-shadow:0 4px 16px rgba(0,172,193,0.25)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,172,193,0.35)}
.btn-primary:active{transform:scale(0.98)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.login-error{color:#E53935;font-size:.82rem;margin-top:.25rem;display:none}
.login-hint{color:var(--text-dim);font-size:.75rem;margin-top:.75rem;text-align:center}
@media(max-width:768px){.login-card{padding:2rem 1.5rem;width:92%;max-width:360px;border-radius:20px}.login-card h1{font-size:1.3rem}.login-card .theme-text{font-size:.9rem}}

/* ── 主内容 ── */
#main{position:relative;z-index:1;display:none}
#main.show{display:block}

/* 悬浮导航 */
.navbar{position:sticky;top:0;z-index:100;padding:10px 1.5rem;display:flex;align-items:center;gap:12px;background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:var(--nav-shadow);border-radius:0 0 20px 20px}
.nav-sphere{width:36px;height:36px;border-radius:50%;flex-shrink:0;overflow:hidden;box-shadow:0 2px 8px rgba(0,172,193,0.2)}
.nav-sphere img{width:100%;height:100%;object-fit:cover;display:block}
.nav-title{font-weight:700;font-size:1.1rem;color:var(--text-primary);letter-spacing:-0.01em}

/* Hero */
.hero{text-align:center;padding:2.5rem 1.5rem 1.5rem}
.hero h1{font-size:2rem;font-weight:700;color:var(--text-primary);letter-spacing:-0.03em}
.hero .theme-text{font-family:'Dancing Script','Georgia',cursive;font-size:1.4rem;color:rgba(26,26,26,0.3);margin-top:.4rem;font-style:italic;letter-spacing:.03em}
.hero .subtitle{color:var(--text-dim);font-size:.85rem;margin-top:.4rem}

/* Tabs - 药丸样式 */
.tabs-wrap{max-width:1100px;margin:0 auto;padding:0 1.5rem}
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;overflow-x:auto;padding:4px;background:var(--chip-bg);border-radius:14px;width:fit-content}
.tab{padding:10px 20px;cursor:pointer;font-size:.9rem;color:var(--text-secondary);border-radius:10px;transition:all .2s;white-space:nowrap;user-select:none;font-weight:500}
.tab:hover{color:var(--text-primary)}
.tab.active{background:var(--surface);color:var(--text-primary);box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.tab.active .tab-accent{color:var(--teal)}

/* ── 作品卡片 ── */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.5rem;max-width:1100px;margin:0 auto;padding:0 1.5rem 3rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);overflow:hidden;box-shadow:var(--card-shadow);transition:transform .25s,box-shadow .25s}
.card:hover{transform:translateY(-4px);box-shadow:var(--card-shadow-h)}
.carousel{position:relative;height:200px;overflow:hidden;background:#F0F0F0}
.carousel-track{display:flex;height:100%;transition:transform .35s cubic-bezier(.25,.1,.25,1)}
.carousel-slide{min-width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.carousel-slide img{width:100%;height:100%;object-fit:cover}
.carousel-slide .placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(0,172,193,0.05),rgba(21,101,192,0.05));font-size:2.5rem}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,0.9);color:var(--text-primary);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;box-shadow:0 2px 8px rgba(0,0,0,0.1);z-index:2}
.carousel-btn:hover{background:#fff}
.carousel-btn.prev{left:8px}
.carousel-btn.next{right:8px}
.carousel-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:2}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(0,0,0,0.15);cursor:pointer;transition:background .2s,transform .2s}
.dot.active{background:var(--teal);transform:scale(1.3)}
.card-body{padding:1.25rem}
.card-title{font-size:1.05rem;font-weight:600;margin-bottom:.4rem;color:var(--text-primary)}
.card-desc{font-size:.85rem;color:var(--text-secondary);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-actions{display:flex;gap:.25rem;padding:.5rem 1rem;border-top:1px solid var(--border)}
.action-btn{display:flex;align-items:center;gap:4px;padding:6px 12px;border:none;background:transparent;color:var(--text-dim);font-size:.8rem;cursor:pointer;border-radius:8px;transition:color .15s,background .15s}
.action-btn:hover{background:rgba(0,172,193,0.06);color:var(--text-primary)}
.action-btn.active{color:var(--teal)}
.action-btn .icon{font-size:1rem}

/* ── 评论 ── */
.comments-section{display:none;padding:.75rem 1rem 1rem;border-top:1px solid var(--border);background:var(--bg-alt)}
.comments-section.show{display:block}
.comment-input-wrap{display:flex;gap:8px;margin-bottom:.75rem}
.comment-input-wrap input{flex:1;padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text-primary);font-size:.85rem;outline:none;transition:border-color .2s}
.comment-input-wrap input:focus{border-color:var(--teal)}
.comment-input-wrap button{padding:8px 16px;border:none;border-radius:10px;background:var(--gradient);color:#fff;font-size:.8rem;cursor:pointer;white-space:nowrap;font-weight:500;transition:opacity .2s}
.comment-input-wrap button:hover{opacity:.85}
.comment-list{max-height:200px;overflow-y:auto}
.comment-item{padding:8px 0;font-size:.8rem;border-bottom:1px solid var(--border)}
.comment-item:last-child{border-bottom:none}
.comment-author{color:var(--teal);font-weight:500}
.comment-dept{display:inline-block;padding:1px 8px;border-radius:10px;background:rgba(0,172,193,0.08);color:var(--blue);font-size:.7rem;margin-left:4px;vertical-align:middle}
.comment-time{color:var(--text-dim);margin-left:8px;font-size:.75rem}
.comment-text{margin-top:3px;color:var(--text-secondary)}

/* ── 分享弹窗 ── */
.modal-overlay{position:fixed;inset:0;z-index:998;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s}
.modal-overlay.show{opacity:1;visibility:visible}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:1.5rem;width:90%;max-width:400px;box-shadow:0 16px 48px rgba(0,0,0,0.12);transform:translateY(20px);transition:transform .25s;position:relative}
.modal-overlay.show .modal{transform:translateY(0)}
.modal h3{font-size:1.1rem;font-weight:600;margin-bottom:1rem;color:var(--text-primary)}
.share-buttons{display:flex;gap:1rem;justify-content:center;margin-bottom:1rem}
.share-btn{width:56px;height:56px;border-radius:50%;border:none;background:var(--chip-bg);color:var(--text-primary);font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,background .15s}
.share-btn:hover{transform:scale(1.1)}
.share-btn.feishu:hover{background:rgba(0,172,193,0.12);color:var(--teal)}
.share-btn.wechat:hover{background:rgba(7,193,96,0.12);color:#07C160}
.share-link{display:flex;gap:8px}
.share-link input{flex:1;padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text-primary);font-size:.8rem;outline:none}
.share-link button{padding:8px 14px;border:none;border-radius:10px;background:var(--gradient);color:#fff;font-size:.8rem;cursor:pointer;font-weight:500}

/* ── Toast ── */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,172,193,0.92);backdrop-filter:blur(8px);color:#fff;padding:10px 20px;border-radius:12px;font-size:.9rem;z-index:9999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;box-shadow:0 4px 20px rgba(0,172,193,0.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── 空状态 ── */
.empty-state{display:flex!important;flex-direction:column;align-items:center;justify-content:center;padding:5rem 2rem;text-align:center;grid-column:1/-1;min-height:50vh}
.empty-state .icon{font-size:3rem;margin-bottom:1rem;opacity:.5}
.empty-state p{font-size:1rem;color:var(--text-secondary)}

/* ── Loading ── */
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--text-dim)}
.loading .spinner{width:24px;height:24px;border:2px solid var(--chip-bg);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  .hero{padding:2rem 1rem 1rem}.hero h1{font-size:1.5rem}.hero .theme-text{font-size:1.1rem}
  .cards{grid-template-columns:1fr;gap:1rem;padding:0 1rem 2rem}
  .carousel{height:180px}
  .navbar{padding:10px 1rem;border-radius:0 0 16px 16px}
  .tabs-wrap{padding:0 1rem}
}

</style>
</head>
<body>

<!-- 登录页 -->
<div id="login-overlay">

</div>

  <!-- Hero -->
  <header class="hero">

  <!-- Tabs -->

      <div class="tab active" data-tab="0">"医"起打擂台</div>

<!-- 分享弹窗 -->

    <h3>分享给朋友</h3>
    <div class="share-buttons">
      <button class="share-btn feishu" title="飞书" onclick="shareFeishu()">📎</button>
      <button class="share-btn wechat" title="微信" onclick="shareWechat()">💬</button>
    </div>
    <div class="share-link">
      <input id="share-url" readonly />
      <button onclick="shareCopy()">复制</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

let app,db,anonymousAuth,deviceId,visitorName='',visitorDepartment='',isKnown=false,currentTab=0,allWorks=[],interactors={},shareWorkId='';

async function initCloudBase(){
  try{
    app=cloudbase.init({env:ENV_ID,anonymousAuth:PUB_KEY});
    db=app.database();
    anonymousAuth=app.auth({persistence:'local'});
    await anonymousAuth.anonymousAuthProvider().signIn();
    console.log('[CloudBase] initialized & signed in');
  }catch(e){console.error('[CloudBase] init error:',e)}
}

function initDeviceId(){
  deviceId=localStorage.getItem('works_device_id');
  if(!deviceId){deviceId='dev_'+Date.now().toString(36)+Math.random().toString(36).slice(2,8);localStorage.setItem('works_device_id',deviceId)}
}

function hideLogin(){document.getElementById('login-overlay').classList.add('hidden');document.getElementById('main').classList.add('show')}
function showLogin(){document.getElementById('login-overlay').classList.remove('hidden');document.getElementById('main').classList.remove('show')}

async function doLogin(){
  const name=document.getElementById('name-input').value.trim();
  const dept=document.getElementById('dept-input').value.trim();
  const errEl=document.getElementById('login-error');
  if(!name||!dept){if(errEl)errEl.style.display='block';return}
  if(errEl)errEl.style.display='none';
  visitorName=name;visitorDepartment=dept;isKnown=true;
  localStorage.setItem('loginInfo',JSON.stringify({nickname:name,department:dept,timestamp:Date.now()}));
  try{
    const col=db.collection('visitors');
    const res=await col.where({deviceId}).get();
    if(!res.data||res.data.length===0){await col.add({name,department:dept,deviceId,createdAt:new Date()})}
    else{await col.doc(res.data[0]._id).update({name,department:dept,lastLoginAt:new Date()})}
  }catch(e){console.warn('[doLogin] DB write skipped:',e)}
  hideLogin();showToast('欢迎 '+name+'（'+dept+'）！');loadData();
}

async function loadData(){
  const container=document.getElementById('cards');
  try{
    const col=db.collection('works');
    const res=await col.where({category:currentTab,visible:true}).orderBy('createdAt','desc').get();
    allWorks=res.data||[];
  }catch(e){console.error('[loadData] error:',e);allWorks=[]}
  loadInteractors();renderWorks();
}

function switchTab(idx){
  currentTab=idx;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',parseInt(t.dataset.tab)===idx));
  loadData();
}

function renderWorks(){
  const container=document.getElementById('cards');
  if(!allWorks.length){
    container.innerHTML='<div class="empty-state"><div class="icon">✨</div><p>暂无作品，敬请期待</p></div>';
    return;
  }
  container.innerHTML=allWorks.map(w=>{
    const imgs=w.images||[];
    const hasCarousel=imgs.length>1;
    const slides=imgs.length?imgs.map((src,i)=>'<div class="carousel-slide"><img src="'+escHtml(src)+'" alt="" onerror="this.parentElement.innerHTML=\'<div class=placeholder>\u{1f5bc}\u{fe0f}</div>\'"></div>').join(''):'<div class="carousel-slide"><div class="placeholder">\u{1f5bc}\u{fe0f}</div></div>';
    const dots=imgs.length>1?imgs.map((_,i)=>'<div class="dot'+(i===0?' active':'')+'" data-w="'+w._id+'" onclick="goSlide(\''+w._id+'\','+i+')"></div>').join(''):'';
    const arrows=hasCarousel?'<button class="carousel-btn prev" onclick="prevSlide(\''+w._id+'\')">\u2039</button><button class="carousel-btn next" onclick="nextSlide(\''+w._id+'\')">\u203a</button>':'';
    const stats=w._stats||{likes:0,comments:0,shares:0};
    const liked=interactors[w._id]&&interactors[w._id].liked;
    const commentOpen=interactors[w._id]&&interactors[w._id].commentOpen;
    return '<div class="card" id="card-'+w._id+'">'+
      '<div class="carousel" data-wid="'+w._id+'"><div class="carousel-track" id="track-'+w._id+'">'+slides+'</div>'+arrows+
      '<div class="carousel-dots" id="dots-'+w._id+'">'+dots+'</div></div>'+
      '<div class="card-body"><div class="card-title">'+escHtml(w.title||'未命名作品')+'</div><div class="card-desc">'+escHtml(w.description||'')+'</div></div>'+
      '<div class="card-actions">'+
      '<button class="action-btn'+(liked?' active':'')+'" onclick="toggleLike(\''+w._id+'\')"><span class="icon">'+(liked?'\u2764\u{fe0f}':'\u{1f90d}')+'</span><span id="likes-'+w._id+'">'+stats.likes+'</span></button>'+
      '<button class="action-btn'+(commentOpen?' active':'')+'" onclick="toggleComment(\''+w._id+'\')"><span class="icon">\u{1f4ac}</span><span id="comments-count-'+w._id+'">'+stats.comments+'</span></button>'+
      '<button class="action-btn" onclick="openShareModal(\''+w._id+'\')"><span class="icon">\u{2197}\u{fe0f}</span><span>'+stats.shares+'</span></button>'+
      '</div>'+
      '<div class="comments-section'+(commentOpen?' show':'')+'" id="comments-'+w._id+'">'+
      '<div class="comment-input-wrap"><input type="text" placeholder="写评论\u2026" id="comment-input-'+w._id+'" onkeydown="if(event.key===\'Enter\')submitComment(\''+w._id+'\')"><button onclick="submitComment(\''+w._id+'\')">发送</button></div>'+
      '<div class="comment-list" id="comment-list-'+w._id+'"><div class="loading"><div class="spinner"></div></div></div>'+
      '</div></div>';
  }).join('');
  allWorks.forEach(w=>{
    if(!interactors[w._id])interactors[w._id]={slide:0};
    if(!interactors[w._id].slide)interactors[w._id].slide=0;
    goSlide(w._id,interactors[w._id].slide);
  });
  scrollToWorkFromHash();loadVisibleComments();
}

function loadInteractors(){try{const s=localStorage.getItem('works_interactors');if(s)interactors={...interactors,...JSON.parse(s)}}catch(e){}}
function saveInteractors(){localStorage.setItem('works_interactors',JSON.stringify(interactors))}

async function toggleLike(workId){
  if(!interactors[workId])interactors[workId]={};
  interactors[workId].liked=!interactors[workId].liked;saveInteractors();
  const w=allWorks.find(x=>x._id===workId);
  if(w&&w._stats){w._stats.likes+=interactors[workId].liked?1:-1}
  try{await db.collection('likes').add({workId,user_nickname:visitorName,user_department:visitorDepartment,deviceId,timestamp:new Date()})}catch(e){}
  try{
    const sc=db.collection('work_stats');
    const res=await sc.where({workId}).get();
    if(res.data&&res.data.length>0){await sc.doc(res.data[0]._id).update({likes:res.data[0].likes+(interactors[workId].liked?1:-1)})}
    else{await sc.add({workId,likes:interactors[workId].liked?1:0,comments:0,shares:0})}
  }catch(e){}
  const btn=document.querySelector('#card-'+workId+' .card-actions .action-btn:first-child');
  if(btn){btn.classList.toggle('active',interactors[workId].liked);btn.querySelector('.icon').textContent=interactors[workId].liked?'\u2764\u{fe0f}':'\u{1f90d}';
    const c=document.getElementById('likes-'+workId);if(c)c.textContent=w&&w._stats?w._stats.likes:0}
}

function toggleComment(workId){
  if(!interactors[workId])interactors[workId]={};
  interactors[workId].commentOpen=!interactors[workId].commentOpen;saveInteractors();
  const s=document.getElementById('comments-'+workId);
  if(s){s.classList.toggle('show',interactors[workId].commentOpen);if(interactors[workId].commentOpen)loadComments(workId)}
}

async function loadComments(workId){
  const list=document.getElementById('comment-list-'+workId);if(!list)return;
  try{
    const res=await db.collection('comments').where({workId}).orderBy('createdAt','desc').limit(50).get();
    const comments=res.data||[];
    if(comments.length){
      list.innerHTML=comments.map(c=>{
        const time=c.createdAt?formatTime(c.createdAt):'';
        const dept=c.user_department?'<span class="comment-dept">'+escHtml(c.user_department)+'</span>':'';
        return '<div class="comment-item"><span class="comment-author">'+escHtml(c.user_nickname||c.authorName||'匿名')+'</span>'+dept+'<span class="comment-time">'+time+'</span><div class="comment-text">'+escHtml(c.content||c.text)+'</div></div>';
      }).join('');
    }else{list.innerHTML='<div style="padding:8px 0;color:var(--text-dim);font-size:.8rem">暂无评论，来抢沙发吧~</div>'}
  }catch(e){list.innerHTML='<div style="padding:8px 0;color:var(--text-dim);font-size:.8rem">评论加载失败</div>'}
}

async function submitComment(workId){
  const input=document.getElementById('comment-input-'+workId);const text=input.value.trim();
  if(!text||!visitorName){showToast('请先输入评论内容');return}
  try{
    await db.collection('comments').add({workId,user_nickname:visitorName,user_department:visitorDepartment,deviceId,content:text,timestamp:new Date()});
    input.value='';
    const sc=db.collection('work_stats');const res=await sc.where({workId}).get();
    if(res.data&&res.data.length>0){await sc.doc(res.data[0]._id).update({comments:db.command.inc(1)})}
    else{await sc.add({workId,likes:0,comments:1,shares:0})}
    const w=allWorks.find(x=>x._id===workId);if(w&&w._stats)w._stats.comments++;
    const cnt=document.getElementById('comments-count-'+workId);if(cnt)cnt.textContent=w&&w._stats?w._stats.comments:0;
    loadComments(workId);showToast('评论成功 \u{1f389}');
  }catch(e){console.error('[submitComment] error:',e);showToast('评论失败，请重试')}
}

let visibleCommentsLoaded={};
function loadVisibleComments(){allWorks.forEach(w=>{if(interactors[w._id]&&interactors[w._id].commentOpen&&!visibleCommentsLoaded[w._id]){visibleCommentsLoaded[w._id]=true;loadComments(w._id)}})}

function openShareModal(workId){
  shareWorkId=workId;const w=allWorks.find(x=>x._id===workId);
  const url=w?(window.location.origin+window.location.pathname+'#'+workId):window.location.href;
  document.getElementById('share-url').value=url;document.getElementById('share-modal').classList.add('show');
}
function closeShareModal(){document.getElementById('share-modal').classList.remove('show');shareWorkId=''}

function shareCopy(){
  const input=document.getElementById('share-url');input.select();
  navigator.clipboard.writeText(input.value).then(()=>{showToast('链接已复制 \u{1f517}');recordShare(shareWorkId,'link');closeShareModal()}).catch(()=>{document.execCommand('copy');showToast('链接已复制 \u{1f517}');recordShare(shareWorkId,'link');closeShareModal()});
}
function shareFeishu(){
  const url=document.getElementById('share-url').value;const w=allWorks.find(x=>x._id===shareWorkId);
  const title=w?w.title:'医起AI\u00b7挑战赛作品';
  navigator.clipboard.writeText('\u6765\u770b\u770b\u300c'+title+'\u300d\u5427\uff01'+url).then(()=>{showToast('已复制到剪贴板，请在飞书中粘贴发送');recordShare(shareWorkId,'feishu');closeShareModal()}).catch(()=>{showToast('复制失败，请手动复制链接')});
}
function shareWechat(){recordShare(shareWorkId,'wechat');shareCopy();showToast('链接已复制，请在微信中粘贴分享')}

async function recordShare(workId,platform){
  try{await db.collection('shares').add({workId,user_nickname:visitorName,user_department:visitorDepartment,deviceId,platform:platform||'link',timestamp:new Date()})}catch(e){}
  try{
    const sc=db.collection('work_stats');const res=await sc.where({workId}).get();
    if(res.data&&res.data.length>0){await sc.doc(res.data[0]._id).update({shares:db.command.inc(1)})}
    else{await sc.add({workId,likes:0,comments:0,shares:1})}
    const w=allWorks.find(x=>x._id===workId);if(w&&w._stats)w._stats.shares++;
  }catch(e){}
}

function goSlide(workId,idx){
  const w=allWorks.find(x=>x._id===workId);if(!w)return;
  const imgs=w.images||[];if(!imgs.length)return;
  if(!interactors[workId])interactors[workId]={};
  idx=Math.max(0,Math.min(idx,imgs.length-1));interactors[workId].slide=idx;saveInteractors();
  const track=document.getElementById('track-'+workId);if(track)track.style.transform='translateX(-'+idx*100+'%)';
  const dotsWrap=document.getElementById('dots-'+workId);
  if(dotsWrap){dotsWrap.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===idx))}
}
function nextSlide(workId){const w=allWorks.find(x=>x._id===workId);if(!w)return;const idx=(interactors[workId]&&interactors[workId].slide||0)+1;goSlide(workId,idx%(w.images||[]).length)}
function prevSlide(workId){const w=allWorks.find(x=>x._id===workId);if(!w)return;const imgs=w.images||[];const idx=(interactors[workId]&&interactors[workId].slide||0)-1;goSlide(workId,idx<0?imgs.length-1:idx)}

function scrollToWorkFromHash(){const hash=window.location.hash.slice(1);if(!hash)return;const card=document.getElementById('card-'+hash);if(card)setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'center'}),300)}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove('show'),2500)}
function escHtml(s){if(!s)return '';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function formatTime(v){if(v instanceof Date)return v.toLocaleString('zh-CN');if(typeof v==='string'){try{return new Date(v).toLocaleString('zh-CN')}catch(e){return v}}if(v&&v.$date)return new Date(v.$date).toLocaleString('zh-CN');return ''}

// 粒子生成（已弃用，保留函数定义避免引用报错）
function createParticles(){}

async function init(){
  await initCloudBase();initDeviceId();
  const nameInput=document.getElementById('name-input');
  const deptInput=document.getElementById('dept-input');
  const loginBtn=document.getElementById('login-btn');
  const errEl=document.getElementById('login-error');
  function checkLoginReady(){const ready=nameInput.value.trim()&&deptInput.value.trim();loginBtn.disabled=!ready;if(ready&&errEl)errEl.style.display='none'}
  nameInput.addEventListener('input',checkLoginReady);deptInput.addEventListener('input',checkLoginReady);
  nameInput.addEventListener('keydown',e=>{if(e.key==='Enter'){if(nameInput.value.trim()&&deptInput.value.trim())doLogin();else checkLoginReady()}});
  deptInput.addEventListener('keydown',e=>{if(e.key==='Enter'){if(nameInput.value.trim()&&deptInput.value.trim())doLogin();else checkLoginReady()}});
  loginBtn.addEventListener('click',doLogin);
  const saved=localStorage.getItem('loginInfo');
  if(saved){try{const info=JSON.parse(saved);const days=(Date.now()-info.timestamp)/(1000*60*60*24);if(days<=30&&info.nickname){visitorName=info.nickname;visitorDepartment=info.department||'';isKnown=true;hideLogin();await loadData();return}}catch(e){}}
  showLogin();
}
init();
</script>
