<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>医起AI·挑战赛</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0d0d1a;--mint:#A8E8D8;--teal:#00ACC1;--blue:#1565C0;
--surface:rgba(255,255,255,0.06);--surface-h:rgba(255,255,255,0.12);
--text:#e0e0e0;--text-dim:rgba(255,255,255,0.5);
--radius:12px;--card-shadow:0 8px 32px rgba(0,0,0,0.4);
}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.6}
a{color:var(--mint);text-decoration:none}

/* ── Floating Orbs ── */
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;animation:float 18s ease-in-out infinite}
.orb:nth-child(1){width:400px;height:400px;background:var(--mint);top:-10%;left:-5%;animation-delay:0s}
.orb:nth-child(2){width:350px;height:350px;background:var(--teal);top:40%;right:-8%;animation-delay:-6s}
.orb:nth-child(3){width:300px;height:300px;background:var(--blue);bottom:-10%;left:30%;animation-delay:-12s}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-60px) scale(1.1)}}

/* ── Login Overlay ── */
#login-overlay{position:fixed;inset:0;z-index:999;display:flex;background:var(--bg);transition:opacity .5s,visibility .5s}
#login-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
.login-left{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#00ACC1 0%,#1565C0 100%);padding:2rem;position:relative;overflow:hidden}
.login-left::before{content:'';position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,0.08);top:10%;left:10%;filter:blur(60px)}
.sphere{width:140px;height:140px;border-radius:50%;background:linear-gradient(135deg,rgba(255,255,255,0.3),rgba(255,255,255,0.05));backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:3rem;box-shadow:0 0 60px rgba(168,232,216,0.3),inset 0 0 30px rgba(255,255,255,0.1);animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(168,232,216,0.3),inset 0 0 30px rgba(255,255,255,0.1)}50%{box-shadow:0 0 80px rgba(168,232,216,0.5),inset 0 0 40px rgba(255,255,255,0.15)}}
.login-left h1{color:#fff;font-size:1.8rem;margin-top:1.5rem;text-align:center}
.login-left p{color:rgba(255,255,255,0.7);margin-top:.5rem;font-size:.95rem}
.login-right{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
.login-form{width:100%;max-width:360px}
.login-form h2{font-size:1.5rem;margin-bottom:.5rem;color:#fff}
.login-form p{color:var(--text-dim);margin-bottom:1.5rem;font-size:.9rem}
.login-form input{width:100%;padding:14px 16px;border-radius:var(--radius);border:1px solid var(--surface-h);background:var(--surface);color:#fff;font-size:1rem;outline:none;transition:border .2s}
.login-form input:focus{border-color:var(--teal)}
.login-form input::placeholder{color:var(--text-dim)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 28px;border:none;border-radius:var(--radius);font-size:1rem;cursor:pointer;transition:transform .15s,box-shadow .15s}
.btn-primary{width:100%;margin-top:1rem;background:linear-gradient(135deg,var(--teal),var(--blue));color:#fff;font-weight:600;box-shadow:0 4px 20px rgba(0,172,193,0.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,172,193,0.4)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ── Main Content ── */
#main{position:relative;z-index:1;display:none}
#main.show{display:block}

/* ── Hero ── */
.hero{text-align:center;padding:3rem 1.5rem 1.5rem}
.hero-sphere{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,rgba(168,232,216,0.3),rgba(0,172,193,0.15));border:1px solid rgba(168,232,216,0.25);display:inline-flex;align-items:center;justify-content:center;font-size:2rem;box-shadow:0 0 40px rgba(168,232,216,0.2);margin-bottom:1rem}
.hero h1{font-size:1.6rem;color:var(--mint)}
.hero .subtitle{color:var(--text-dim);font-size:.9rem;margin-top:.25rem}

/* ── Tabs ── */
.tabs-wrap{max-width:1100px;margin:0 auto;padding:0 1rem}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--surface-h);margin-bottom:1.5rem;overflow-x:auto}
.tab{padding:10px 20px;cursor:pointer;font-size:.95rem;color:var(--text-dim);border-bottom:2px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap;user-select:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--mint);border-bottom-color:var(--mint)}

/* ── Cards Grid ── */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem;max-width:1100px;margin:0 auto;padding:0 1rem 3rem}
.card{background:var(--surface);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius);overflow:hidden;box-shadow:var(--card-shadow);transition:transform .2s}
.card:hover{transform:translateY(-4px)}

/* ── Carousel ── */
.carousel{position:relative;height:200px;overflow:hidden;background:linear-gradient(135deg,rgba(0,172,193,0.1),rgba(21,101,192,0.1))}
.carousel-track{display:flex;height:100%;transition:transform .35s ease}
.carousel-slide{min-width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;position:relative}
.carousel-slide img{width:100%;height:100%;object-fit:cover}
.carousel-slide .placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(0,172,193,0.15),rgba(21,101,192,0.15))}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;border:none;background:rgba(0,0,0,0.5);color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;z-index:2}
.carousel-btn:hover{background:rgba(0,0,0,0.7)}
.carousel-btn.prev{left:8px}
.carousel-btn.next{right:8px}
.carousel-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:2}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.4);cursor:pointer;transition:background .2s,transform .2s}
.dot.active{background:var(--mint);transform:scale(1.2)}

/* ── Card Body ── */
.card-body{padding:1rem}
.card-title{font-size:1rem;font-weight:600;margin-bottom:.4rem;color:#fff}
.card-desc{font-size:.85rem;color:var(--text-dim);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:.75rem}

/* ── Card Actions ── */
.card-actions{display:flex;gap:.5rem;padding:.5rem 1rem;border-top:1px solid rgba(255,255,255,0.05)}
.action-btn{display:flex;align-items:center;gap:4px;padding:6px 10px;border:none;background:transparent;color:var(--text-dim);font-size:.8rem;cursor:pointer;border-radius:6px;transition:color .15s,background .15s}
.action-btn:hover{background:var(--surface-h);color:var(--text)}
.action-btn.active{color:var(--mint)}
.action-btn .icon{font-size:1rem}

/* ── Comments Section ── */
.comments-section{display:none;padding:.75rem 1rem 1rem;border-top:1px solid rgba(255,255,255,0.05);background:rgba(0,0,0,0.15)}
.comments-section.show{display:block}
.comment-input-wrap{display:flex;gap:8px;margin-bottom:.75rem}
.comment-input-wrap input{flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--surface-h);background:var(--surface);color:#fff;font-size:.85rem;outline:none}
.comment-input-wrap input:focus{border-color:var(--teal)}
.comment-input-wrap button{padding:8px 14px;border:none;border-radius:8px;background:var(--teal);color:#fff;font-size:.8rem;cursor:pointer;white-space:nowrap}
.comment-list{max-height:200px;overflow-y:auto}
.comment-item{padding:6px 0;font-size:.8rem;border-bottom:1px solid rgba(255,255,255,0.04)}
.comment-item:last-child{border-bottom:none}
.comment-author{color:var(--mint);font-weight:500}
.comment-time{color:var(--text-dim);margin-left:8px;font-size:.75rem}
.comment-text{margin-top:2px;color:var(--text-dim)}

/* ── Share Modal ── */
.modal-overlay{position:fixed;inset:0;z-index:998;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s}
.modal-overlay.show{opacity:1;visibility:visible}
.modal{background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius);padding:1.5rem;width:90%;max-width:400px;box-shadow:0 16px 48px rgba(0,0,0,0.5);transform:translateY(20px);transition:transform .25s}
.modal-overlay.show .modal{transform:translateY(0)}
.modal h3{font-size:1.1rem;margin-bottom:1rem;color:#fff}
.share-buttons{display:flex;gap:1rem;justify-content:center;margin-bottom:1rem}
.share-btn{width:56px;height:56px;border-radius:50%;border:none;background:var(--surface-h);color:#fff;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,background .15s}
.share-btn:hover{transform:scale(1.1);background:var(--teal)}
.share-link{display:flex;gap:8px}
.share-link input{flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--surface-h);background:var(--surface);color:#fff;font-size:.8rem;outline:none}
.share-link button{padding:8px 14px;border:none;border-radius:8px;background:var(--teal);color:#fff;font-size:.8rem;cursor:pointer}
.modal-close{position:absolute;top:12px;right:12px;background:transparent;border:none;color:var(--text-dim);font-size:1.2rem;cursor:pointer}

/* ── Toast ── */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,172,193,0.9);backdrop-filter:blur(8px);color:#fff;padding:10px 20px;border-radius:var(--radius);font-size:.9rem;z-index:9999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Loading ── */
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--text-dim)}
.loading .spinner{width:24px;height:24px;border:2px solid var(--surface-h);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Responsive ── */
@media(max-width:768px){
#login-overlay{flex-direction:column}
.login-left{padding:2rem 1.5rem;min-height:35vh}
.login-left h1{font-size:1.4rem}
.login-right{padding:1.5rem}
.sphere{width:100px;height:100px;font-size:2rem}
.hero{padding:2rem 1rem 1rem}
.hero-sphere{width:60px;height:60px;font-size:1.5rem}
.hero h1{font-size:1.3rem}
.cards{grid-template-columns:1fr;gap:1rem}
.carousel{height:180px}
}
@media(max-width:400px){
.card-actions{flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- Floating Orbs -->
<div class="orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>

<!-- ── Login Overlay ── -->
<div id="login-overlay">
  <div class="login-left">
    <div class="sphere">🏥</div>
    <h1>医起AI·挑战赛</h1>
    <p>展现你的医疗AI创意</p>
  </div>
  <div class="login-right">
    <div class="login-form">
      <h2>欢迎参与 🎉</h2>
      <p>请输入你的昵称，即可开始浏览和互动</p>
      <input id="name-input" type="text" placeholder="请输入你的昵称" maxlength="20" autocomplete="off">
      <button class="btn btn-primary" id="login-btn" disabled>进入活动</button>
    </div>
  </div>
</div>

<!-- ── Main Content ── -->
<div id="main">
  <div class="hero">
    <div class="hero-sphere">🏥</div>
    <h1>医起AI·挑战赛</h1>
    <p class="subtitle">作品展示与互动平台</p>
  </div>

  <div class="tabs-wrap">
    <div class="tabs">
      <div class="tab active" data-tab="0" onclick="switchTab(0)">"医"起打擂台</div>
      <div class="tab" data-tab="1" onclick="switchTab(1)">"医"高人胆大</div>
    </div>
  </div>

  <div class="cards" id="cards-container">
    <div class="loading" id="loading-state"><div class="spinner"></div>加载中…</div>
  </div>
</div>

<!-- ── Share Modal ── -->
<div class="modal-overlay" id="share-modal" onclick="if(event.target===this)closeShareModal()">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="closeShareModal()">✕</button>
    <h3>分享作品</h3>
    <div class="share-buttons">
      <button class="share-btn" onclick="shareFeishu()" title="飞书">📋</button>
      <button class="share-btn" onclick="shareWechat()" title="微信">💬</button>
      <button class="share-btn" onclick="shareCopy()" title="复制链接">🔗</button>
    </div>
    <div class="share-link">
      <input id="share-url" readonly value="">
      <button onclick="shareCopy()">复制</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

<!-- CloudBase SDK -->
<script src="https://tcb-js.cloud.tcloudbase.com/cloudbase.js"></script>
<script>
/* ═══════════════════════════════════════════
   医起AI·挑战赛 — 作品展示
   ═══════════════════════════════════════════ */

const ENV_ID = 'works-showcase-d2giub4pr5d687848';
const PUB_KEY = 'eyJhbGciOiJSUzI1NiIsImtpZCI6IjlkMWRjMzFlLWI0ZDAtNDQ4Yi1hNzZmLWIwY2M2M2Q4MTQ5OCJ9.eyJpc3MiOiJodHRwczovL3dvcmtzLXNob3djYXNlLWQyZ2l1YjRwcjVkNjg3ODQ4LmFwLXNoYW5naGFpLnRjYi1hcGkudGVuY2VudGNsb3VkYXBpLmNvbSIsInN1YiI6ImFub24iLCJhdWQiOiJ3b3Jrcy1zaG93Y2FzZS1kMmdpdWI0cHI1ZDY4Nzg0OCIsImV4cCI6NDA4MzY2MDYyNiwiaWF0IjoxNzc5OTc3NDI2LCJub25jZSI6IlBSdHgtMmZSVnU5cWQzSnl6NTVpZyIsImF0X2hhc2giOiJQUnR4LTJtRlJWdTlxZDNKeXo1NWlnIiwibmFtZSI6IkFub255bW91cyIsInNjb3BlIjoiYW5vbnltb3VzIiwicHJvamVjdF9pZCI6IndvcmtzLXNob3djYXNlLWQyZ2l1YjRwcjVkNjg3ODQ4IiwibWV0YSI6eyJwbGF0Zm9ybSI6IlB1Ymxpc2hhYmxlS2V5In0sInVzZXJfdHlwZSI6IiIsImNsaWVudF90eXBlIjoiY2xpZW50X3VzZXIiLCJpc19zeXN0ZW1fYWRtaW4iOmZhbHNlfQ.hbLxMthyDPhSvGwtKo-PjGfyejWQir39akNphU_pxYr5aW_MRC-crr-g2nznaTWcnvkjDLlXrJAxd8qjRQ7y5H6S_s8QOZ9LllWmEbDGU2IDV9-Z9F6R_-I3AFy80O6l-vVqEH2V3uTV7gOkGDHq9Rebf0adPIWs3Iv9Lgp-sU5MhZoXgluu-rkxDQPr3Lmaw1GL2O2t7QCp4fmfAJjBkBwgEY3hloe8LdO6_xe8fzAKRzMkc9o1D9ZgPplOARhj-lIQK6JVPjHpGYelYJmlMEq_ePQWzQ7HWKwucoPnspi11hnVP9-NQzesOYRMpjww7sIO5QWhTbyIat60TQbOw';

let app, db, anonymousAuth, deviceId;
let visitorName = '';
let isKnown = false;
let currentTab = 0;
let allWorks = [];
let interactors = {}; // { workId: { liked: bool, commentOpen: bool } }
let shareWorkId = '';

/* ── initCloudBase ── */
async function initCloudBase() {
  try {
    app = cloudbase.init({ env: ENV_ID, anonymousAuth: PUB_KEY });
    db = app.database();
    anonymousAuth = app.auth({ persistence: 'local' });
    await anonymousAuth.anonymousAuthProvider().signIn();
    console.log('[CloudBase] initialized & signed in');
  } catch (e) {
    console.error('[CloudBase] init error:', e);
  }
}

/* ── initDeviceId ── */
function initDeviceId() {
  deviceId = localStorage.getItem('works_device_id');
  if (!deviceId) {
    deviceId = 'dev_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    localStorage.setItem('works_device_id', deviceId);
  }
}

/* ── checkVisitor ── */
function checkVisitor() {
  const saved = localStorage.getItem('works_visitor');
  if (saved) {
    try {
      const v = JSON.parse(saved);
      visitorName = v.name;
      isKnown = true;
    } catch { /* ignore */ }
  }
}

/* ── registerVisitor ── */
async function registerVisitor(name) {
  visitorName = name;
  isKnown = true;
  localStorage.setItem('works_visitor', JSON.stringify({ name, deviceId, at: Date.now() }));
  try {
    const col = db.collection('visitors');
    // Check if already registered
    const res = await col.where({ deviceId }).get();
    if (!res.data || res.data.length === 0) {
      await col.add({ name, deviceId, createdAt: new Date() });
    }
  } catch (e) { console.warn('[registerVisitor] DB write skipped:', e); }
}

/* ── doLogin ── */
function doLogin() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) return;
  document.getElementById('login-overlay').classList.add('hidden');
  document.getElementById('main').classList.add('show');
  registerVisitor(name);
  loadData();
}

/* ── loadData ── */
async function loadData() {
  const container = document.getElementById('cards-container');
  const loading = document.getElementById('loading-state');

  try {
    const col = db.collection('works');
    const res = await col.where({ category: currentTab, visible: true }).orderBy('createdAt', 'desc').get();
    allWorks = res.data || [];
  } catch (e) {
    console.error('[loadData] error:', e);
    allWorks = [];
  }

  // If no data from DB, use placeholder works
  if (!allWorks.length) {
    allWorks = getPlaceholderWorks(currentTab);
  }

  loadInteractors();
  renderWorks();
}

/* ── getWorkStats ── */
async function getWorkStats(workId) {
  let likes = 0, comments = 0, shares = 0;
  try {
    // Try fetching stats from DB
    const statsCol = db.collection('work_stats');
    const res = await statsCol.where({ workId }).get();
    if (res.data && res.data.length > 0) {
      likes = res.data[0].likes || 0;
      comments = res.data[0].comments || 0;
      shares = res.data[0].shares || 0;
    }
  } catch (e) { /* ignore */ }
  return { likes, comments, shares };
}

/* ── switchTab ── */
function switchTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', parseInt(t.dataset.tab) === idx));
  loadData();
}

/* ── renderWorks ── */
function renderWorks() {
  const container = document.getElementById('cards-container');
  if (!allWorks.length) {
    container.innerHTML = '<div class="loading">暂无作品</div>';
    return;
  }

  container.innerHTML = allWorks.map(w => {
    const imgs = w.images || [];
    const hasCarousel = imgs.length > 1;
    const slides = imgs.length ? imgs.map((src, i) => {
      return `<div class="carousel-slide"><img src="${escHtml(src)}" alt="" onerror="this.parentElement.innerHTML='<div class=placeholder>🖼️</div>'"></div>`;
    }).join('') : `<div class="carousel-slide"><div class="placeholder">🖼️</div></div>`;

    const dots = imgs.length > 1 ? imgs.map((_, i) => `<div class="dot${i === 0 ? ' active' : ''}" data-w="${w._id}" onclick="goSlide('${w._id}',${i})"></div>`).join('') : '';
    const arrows = hasCarousel ? `<button class="carousel-btn prev" onclick="prevSlide('${w._id}')">‹</button><button class="carousel-btn next" onclick="nextSlide('${w._id}')">›</button>` : '';

    const stats = w._stats || { likes: 0, comments: 0, shares: 0 };
    const liked = interactors[w._id] && interactors[w._id].liked;
    const commentOpen = interactors[w._id] && interactors[w._id].commentOpen;

    return `
    <div class="card" id="card-${w._id}">
      <div class="carousel" data-wid="${w._id}">
        <div class="carousel-track" id="track-${w._id}">${slides}</div>
        ${arrows}
        <div class="carousel-dots" id="dots-${w._id}">${dots}</div>
      </div>
      <div class="card-body">
        <div class="card-title">${escHtml(w.title || '未命名作品')}</div>
        <div class="card-desc">${escHtml(w.description || '')}</div>
      </div>
      <div class="card-actions">
        <button class="action-btn${liked ? ' active' : ''}" onclick="toggleLike('${w._id}')">
          <span class="icon">${liked ? '❤️' : '🤍'}</span>
          <span id="likes-${w._id}">${stats.likes}</span>
        </button>
        <button class="action-btn${commentOpen ? ' active' : ''}" onclick="toggleComment('${w._id}')">
          <span class="icon">💬</span>
          <span id="comments-count-${w._id}">${stats.comments}</span>
        </button>
        <button class="action-btn" onclick="openShareModal('${w._id}')">
          <span class="icon">↗️</span>
          <span>${stats.shares}</span>
        </button>
      </div>
      <div class="comments-section${commentOpen ? ' show' : ''}" id="comments-${w._id}">
        <div class="comment-input-wrap">
          <input type="text" placeholder="写评论…" id="comment-input-${w._id}" onkeydown="if(event.key==='Enter')submitComment('${w._id}')">
          <button onclick="submitComment('${w._id}')">发送</button>
        </div>
        <div class="comment-list" id="comment-list-${w._id}">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </div>`;
  }).join('');

  // Init slide positions
  allWorks.forEach(w => {
    const imgs = w.images || [];
    if (!interactors[w._id]) interactors[w._id] = { slide: 0 };
    if (!interactors[w._id].slide) interactors[w._id].slide = 0;
    goSlide(w._id, interactors[w._id].slide);
  });

  // Check hash for scrolling to a work
  scrollToWorkFromHash();

  // Lazy-load comments for visible cards
  loadVisibleComments();
}

/* ── loadInteractors ── */
function loadInteractors() {
  try {
    const saved = localStorage.getItem('works_interactors');
    if (saved) interactors = { ...interactors, ...JSON.parse(saved) };
  } catch { /* ignore */ }
}

function saveInteractors() {
  localStorage.setItem('works_interactors', JSON.stringify(interactors));
}

/* ── toggleLike ── */
async function toggleLike(workId) {
  if (!interactors[workId]) interactors[workId] = {};
  interactors[workId].liked = !interactors[workId].liked;
  saveInteractors();

  const w = allWorks.find(x => x._id === workId);
  if (w && w._stats) {
    w._stats.likes += interactors[workId].liked ? 1 : -1;
  }

  // Update DB
  try {
    const statsCol = db.collection('work_stats');
    const res = await statsCol.where({ workId }).get();
    if (res.data && res.data.length > 0) {
      const doc = res.data[0];
      const newLikes = (doc.likes || 0) + (interactors[workId].liked ? 1 : -1);
      await statsCol.doc(doc._id).update({ likes: newLikes });
    } else {
      await statsCol.add({ workId, likes: interactors[workId].liked ? 1 : 0, comments: 0, shares: 0 });
    }
  } catch (e) { /* ignore */ }

  // Update UI
  const btn = document.querySelector(`#card-${workId} .card-actions .action-btn:first-child`);
  if (btn) {
    btn.classList.toggle('active', interactors[workId].liked);
    btn.querySelector('.icon').textContent = interactors[workId].liked ? '❤️' : '🤍';
    const count = document.getElementById('likes-' + workId);
    if (count) count.textContent = w && w._stats ? w._stats.likes : 0;
  }
}

/* ── toggleComment ── */
function toggleComment(workId) {
  if (!interactors[workId]) interactors[workId] = {};
  interactors[workId].commentOpen = !interactors[workId].commentOpen;
  saveInteractors();

  const section = document.getElementById('comments-' + workId);
  if (section) {
    section.classList.toggle('show', interactors[workId].commentOpen);
    if (interactors[workId].commentOpen) loadComments(workId);
  }
}

/* ── loadComments ── */
async function loadComments(workId) {
  const list = document.getElementById('comment-list-' + workId);
  if (!list) return;
  try {
    const col = db.collection('comments');
    const res = await col.where({ workId }).orderBy('createdAt', 'desc').limit(50).get();
    const comments = res.data || [];
    if (comments.length) {
      list.innerHTML = comments.map(c => {
        const time = c.createdAt ? formatTime(c.createdAt) : '';
        return `<div class="comment-item"><span class="comment-author">${escHtml(c.authorName || '匿名')}</span><span class="comment-time">${time}</span><div class="comment-text">${escHtml(c.text)}</div></div>`;
      }).join('');
    } else {
      list.innerHTML = '<div style="padding:8px 0;color:var(--text-dim);font-size:.8rem">暂无评论，来抢沙发吧~</div>';
    }
  } catch (e) {
    list.innerHTML = '<div style="padding:8px 0;color:var(--text-dim);font-size:.8rem">评论加载失败</div>';
  }
}

/* ── submitComment ── */
async function submitComment(workId) {
  const input = document.getElementById('comment-input-' + workId);
  const text = input.value.trim();
  if (!text || !visitorName) { showToast('请先输入评论内容'); return; }

  try {
    const col = db.collection('comments');
    await col.add({ workId, authorName: visitorName, authorDeviceId: deviceId, text, createdAt: new Date() });
    input.value = '';

    // Update stats
    const statsCol = db.collection('work_stats');
    const res = await statsCol.where({ workId }).get();
    if (res.data && res.data.length > 0) {
      await statsCol.doc(res.data[0]._id).update({ comments: db.command.inc(1) });
    } else {
      await statsCol.add({ workId, likes: 0, comments: 1, shares: 0 });
    }

    const w = allWorks.find(x => x._id === workId);
    if (w && w._stats) w._stats.comments++;
    const cnt = document.getElementById('comments-count-' + workId);
    if (cnt) cnt.textContent = w && w._stats ? w._stats.comments : 0;

    loadComments(workId);
    showToast('评论成功 🎉');
  } catch (e) {
    console.error('[submitComment] error:', e);
    showToast('评论失败，请重试');
  }
}

/* ── loadVisibleComments ── */
let visibleCommentsLoaded = {};
function loadVisibleComments() {
  // Preload comments for cards already open
  allWorks.forEach(w => {
    if (interactors[w._id] && interactors[w._id].commentOpen && !visibleCommentsLoaded[w._id]) {
      visibleCommentsLoaded[w._id] = true;
      loadComments(w._id);
    }
  });
}

/* ── openShareModal ── */
function openShareModal(workId) {
  shareWorkId = workId;
  const w = allWorks.find(x => x._id === workId);
  const url = w ? (window.location.origin + window.location.pathname + '#' + workId) : window.location.href;
  document.getElementById('share-url').value = url;
  document.getElementById('share-modal').classList.add('show');
}

/* ── closeShareModal ── */
function closeShareModal() {
  document.getElementById('share-modal').classList.remove('show');
  shareWorkId = '';
}

/* ── shareCopy ── */
function shareCopy() {
  const input = document.getElementById('share-url');
  input.select();
  navigator.clipboard.writeText(input.value).then(() => {
    showToast('链接已复制 🔗');
    recordShare(shareWorkId);
    closeShareModal();
  }).catch(() => {
    document.execCommand('copy');
    showToast('链接已复制 🔗');
    recordShare(shareWorkId);
    closeShareModal();
  });
}

/* ── shareFeishu ── */
function shareFeishu() {
  const url = document.getElementById('share-url').value;
  const w = allWorks.find(x => x._id === shareWorkId);
  const title = w ? w.title : '医起AI·挑战赛作品';
  const text = `来看看「${title}」吧！${url}`;
  navigator.clipboard.writeText(text).then(() => {
    showToast('已复制到剪贴板，请在飞书中粘贴发送');
    recordShare(shareWorkId);
    closeShareModal();
  }).catch(() => {
    showToast('复制失败，请手动复制链接');
  });
}

/* ── shareWechat ── */
function shareWechat() {
  shareCopy();
  showToast('链接已复制，请在微信中粘贴分享');
}

/* ── recordShare ── */
async function recordShare(workId) {
  try {
    const statsCol = db.collection('work_stats');
    const res = await statsCol.where({ workId }).get();
    if (res.data && res.data.length > 0) {
      await statsCol.doc(res.data[0]._id).update({ shares: db.command.inc(1) });
    } else {
      await statsCol.add({ workId, likes: 0, comments: 0, shares: 1 });
    }
    const w = allWorks.find(x => x._id === workId);
    if (w && w._stats) w._stats.shares++;
  } catch (e) { /* ignore */ }
}

/* ── Carousel helpers ── */
function goSlide(workId, idx) {
  const w = allWorks.find(x => x._id === workId);
  if (!w) return;
  const imgs = w.images || [];
  if (!imgs.length) return;
  if (!interactors[workId]) interactors[workId] = {};
  idx = Math.max(0, Math.min(idx, imgs.length - 1));
  interactors[workId].slide = idx;
  saveInteractors();

  const track = document.getElementById('track-' + workId);
  if (track) track.style.transform = `translateX(-${idx * 100}%)`;

  const dotsWrap = document.getElementById('dots-' + workId);
  if (dotsWrap) {
    dotsWrap.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
  }
}

function nextSlide(workId) {
  const w = allWorks.find(x => x._id === workId);
  if (!w) return;
  const idx = (interactors[workId] && interactors[workId].slide || 0) + 1;
  goSlide(workId, idx % (w.images || []).length);
}

function prevSlide(workId) {
  const w = allWorks.find(x => x._id === workId);
  if (!w) return;
  const imgs = w.images || [];
  const idx = (interactors[workId] && interactors[workId].slide || 0) - 1;
  goSlide(workId, idx < 0 ? imgs.length - 1 : idx);
}

/* ── scrollToWorkFromHash ── */
function scrollToWorkFromHash() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  const card = document.getElementById('card-' + hash);
  if (card) {
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
  }
}

/* ── Toast ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

/* ── Utility ── */
function escHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function formatTime(v) {
  if (v instanceof Date) return v.toLocaleString('zh-CN');
  if (typeof v === 'string') {
    try { return new Date(v).toLocaleString('zh-CN'); } catch { return v; }
  }
  if (v && v.$date) return new Date(v.$date).toLocaleString('zh-CN');
  return '';
}

/* ── Init ── */
async function init() {
  // Bind login UI
  const nameInput = document.getElementById('name-input');
  const loginBtn = document.getElementById('login-btn');
  nameInput.addEventListener('input', () => { loginBtn.disabled = !nameInput.value.trim(); });
  nameInput.addEventListener('keydown', e => { if (e.key === 'Enter' && nameInput.value.trim()) doLogin(); });
  loginBtn.addEventListener('click', doLogin);

  // Init core
  await initCloudBase();
  initDeviceId();
  checkVisitor();

  if (isKnown) {
    document.getElementById('login-overlay').classList.add('hidden');
    document.getElementById('main').classList.add('show');
    await loadData();
  }
  // If not known, login overlay stays visible; doLogin() will loadData()
}

init();
