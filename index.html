<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>医起AI·挑战赛 作品广场</title>
<script src="https://unpkg.com/@cloudbase/js-sdk@latest/dist/index.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f6fa;color:#333;min-height:100vh}
.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:24px 20px 16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(102,126,234,.4)}
.header h1{font-size:22px;margin-bottom:12px;letter-spacing:2px}
.tabs{display:flex;justify-content:center;gap:12px;margin-top:8px}
.tab-btn{padding:8px 24px;border-radius:20px;border:2px solid rgba(255,255,255,.6);background:transparent;color:#fff;font-size:14px;cursor:pointer;transition:.3s}
.tab-btn.active,.tab-btn:hover{background:rgba(255,255,255,.25);border-color:#fff;font-weight:600}
.container{max-width:1200px;margin:0 auto;padding:20px 16px 60px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);transition:transform .2s,box-shadow .2s;position:relative}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.rank-badge{position:absolute;top:12px;left:12px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;z-index:10;color:#fff}
.rank-1{background:linear-gradient(135deg,#FFD700,#FFA500)}
.rank-2{background:linear-gradient(135deg,#C0C0C0,#A0A0A0)}
.rank-3{background:linear-gradient(135deg,#CD7F32,#B87333)}
.carousel{position:relative;height:200px;overflow:hidden;background:#eee}
.carousel img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transition:opacity .4s}
.carousel-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.carousel-dots span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer;transition:.2s}
.carousel-dots span.active{background:#fff;width:16px;border-radius:4px}
.card-body{padding:16px}
.card-title{font-size:16px;font-weight:600;margin-bottom:6px}
.card-desc{font-size:13px;color:#666;line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.action-btn{display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:16px;border:1px solid #e0e0e0;background:#fafafa;font-size:13px;cursor:pointer;transition:.2s;user-select:none}
.action-btn:hover{background:#f0f0f0}
.action-btn.liked{color:#e74c3c;border-color:#e74c3c;background:#fef0ef}
.action-btn .icon{font-size:16px}
.external-link{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:16px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:13px;text-decoration:none;transition:.2s;margin-left:auto}
.external-link:hover{opacity:.85}
.interactors{padding:0 16px 12px;display:flex;flex-wrap:wrap;gap:4px}
.interactor-tag{padding:2px 8px;border-radius:10px;background:#f0e6ff;font-size:11px;color:#764ba2}
.comment-section{display:none;border-top:1px solid #eee;padding:12px 16px;max-height:300px;overflow-y:auto}
.comment-section.show{display:block}
.comment-item{padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.comment-item:last-child{border-bottom:none}
.comment-nickname{font-weight:600;color:#764ba2;margin-right:6px}
.comment-text{color:#555}
.comment-time{color:#999;font-size:11px;float:right}
.comment-input-row{display:flex;gap:8px;margin-top:8px}
.comment-input{flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none}
.comment-input:focus{border-color:#764ba2}
.comment-send{padding:8px 16px;border:none;border-radius:8px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:13px;cursor:pointer}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:500px;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{text-align:center;margin-bottom:16px;font-size:18px}
.modal input{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:15px;outline:none;margin-bottom:12px}
.modal input:focus{border-color:#764ba2}
.modal-btn{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:15px;cursor:pointer;font-weight:600}
.share-modal{text-align:center}
.share-btns{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.share-btn{padding:12px;border-radius:10px;border:1px solid #e0e0e0;background:#fff;font-size:14px;cursor:pointer;transition:.2s}
.share-btn:hover{background:#f5f0ff}
.share-copy{color:#333}
.share-feishu{color:#00d6e4}
.share-wechat{color:#07c160}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.admin-link{text-align:center;padding:20px;font-size:13px}
.admin-link a{color:#999;text-decoration:none}
.loading{text-align:center;padding:40px;color:#999}
</style>
</head>
<body>

<div class="header">
  <h1>🏥 医起AI·挑战赛 作品广场</h1>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('battle')">"医"起打擂台</button>
    <button class="tab-btn" onclick="switchTab('bold')">医高人胆大</button>
  </div>
</div>

<div class="container">
  <div id="grid" class="grid"></div>
</div>

<div class="admin-link"><a href="admin.html">管理后台</a></div>

<div id="nameModal" class="modal-overlay">
  <div class="modal">
    <h3>👋 欢迎来到医起AI作品广场</h3>
    <p style="text-align:center;color:#999;font-size:13px;margin-bottom:16px">请留下您的姓名，开始浏览吧~</p>
    <input id="nicknameInput" placeholder="请输入您的姓名" />
    <button class="modal-btn" onclick="submitNickname()">进入广场</button>
  </div>
</div>

<div id="shareModal" class="modal-overlay" onclick="closeShareModal(event)">
  <div class="modal share-modal" onclick="event.stopPropagation()">
    <h3>📤 分享作品</h3>
    <div class="share-btns">
      <button class="share-btn share-copy" onclick="shareCopy()">🔗 复制链接</button>
      <button class="share-btn share-feishu" onclick="shareFeishu()">💬 分享到飞书</button>
      <button class="share-btn share-wechat" onclick="shareWechat()">🟢 分享到微信</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const ENV_ID = 'works-showcase-d2giub4pr5d687848';
const PUB_KEY = 'eyJhbGciOiJSUzI1NiIsImtpZCI6IjlkMWRjMzFlLWI0ZDAtNDQ4Yi1hNzZmLWIwY2M2M2Q4MTQ5OCJ9.eyJpc3MiOiJodHRwczovL3dvcmtzLXNob3djYXNlLWQyZ2l1YjRwcjVkNjg3ODQ4LmFwLXNoYW5naGFpLnRjYi1hcGkudGVuY2VudGNsb3VkYXBpLmNvbSIsInN1YiI6ImFub24iLCJhdWQiOiJ3b3Jrcy1zaG93Y2FzZS1kMmdpdWI0cHI1ZDY4Nzg0OCIsImV4cCI6NDA4MzY2MDYyNiwiaWF0IjoxNzc5OTc3NDI2LCJub25jZSI6IlBSdHgtMm1GUlZ1OXFkM0p5ejU1aWciLCJhdF9oYXNoIjoiUFJ0eC0ybUZSVnU5cWQzSnl6NTVpZyIsIm5hbWUiOiJBbm9ueW1vdXMiLCJzY29wZSI6ImFub255bW91cyIsInByb2plY3RfaWQiOiJ3b3Jrcy1zaG93Y2FzZS1kMmdpdWI0cHI1ZDY4Nzg0OCIsIm1ldGEiOnsicGxhdGZvcm0iOiJQdWJsaXNoYWJsZUtleSJ9LCJ1c2VyX3R5cGUiOiIiLCJjbGllbnRfdHlwZSI6ImNsaWVudF91c2VyIiwiaXNfc3lzdGVtX2FkbWluIjpmYWxzZX0.hbLxMthyDPhSvGwtKo-PpjGfyejWQir39akNphU_pxYr5aW_MRC-crr-g2nznaTWcnvkjDLlXrJAxd8qjRQ7y5H6S_s8QOZ9LllWmEbDGU2IDV9-Z9F6R_-I3AFy80O6l-vVqEH2V3uTV7gOkGDHq9Rebf0adPIWs3Iv9Lgp-sU5MhZoXgluu-rkxDQPr3Lmaw1GL2O2t7QCp4fmfAJjBkBwgEY3hloe8LdO6_xe8fzAKRzMkc9o1D9ZgPplOARhj-lIQK6JVPjHpGYelYJmlMEq_ePQWzQ7HWKwucoPnspi11hnVP9-NQzesOYRMpjww7sIO5QWhTbyIat60TQbOw';
let device_id = null;
let nickname = null;
let works = [];
let currentTab = 'battle';
let currentShareWorkId = null;
let app, auth, db;

async function initCloudBase() {
  app = cloudbase.init({ env: ENV_ID, publishableKey: PUB_KEY });
  auth = app.auth({ persistence: 'local' });
  db = app.database();
  await auth.anonymousAuthProvider().signIn();
}

async function initDeviceId() {
  try {
    const fp = await FingerprintJS.load();
    const result = await fp.get();
    device_id = result.visitorId;
  } catch (e) {
    device_id = 'anon_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
  }
}

async function checkVisitor() {
  const { data } = await db.collection('Visitor').where({ device_id }).get();
  if (data && data.length > 0) {
    nickname = data[0].nickname;
    await db.collection('Visitor').doc(data[0]._id).update({ last_seen: new Date() });
    return true;
  }
  return false;
}

function showNameModal() {
  document.getElementById('nameModal').classList.add('show');
}

function closeNameModal() {
  document.getElementById('nameModal').classList.remove('show');
}

async function submitNickname() {
  const val = document.getElementById('nicknameInput').value.trim();
  if (!val) return showToast('请输入姓名');
  nickname = val;
  await db.collection('Visitor').add({ device_id, nickname, created_at: new Date(), last_seen: new Date() });
  closeNameModal();
  showToast('欢迎 ' + nickname + '！');
  await loadData();
}

async function loadData() {
  try {
    const { data } = await db.collection('Work').orderBy('sort_order', 'asc').get();
    works = data || [];
    renderWorks();
  } catch (e) {
    console.error('Load works failed:', e);
    document.getElementById('grid').innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
  }
}

async function getWorkStats(workId) {
  const [{ data: likes }, { data: comments }, { data: shares }] = await Promise.all([
    db.collection('Like').where({ work_id: workId }).get(),
    db.collection('Comment').where({ work_id: workId }).get(),
    db.collection('Share').where({ work_id: workId }).get()
  ]);
  return { likeCount: (likes||[]).length, commentCount: (comments||[]).length, shareCount: (shares||[]).length };
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'battle') || (i === 1 && tab === 'bold'));
  });
  renderWorks();
}

function getFilteredWorks() {
  return works.filter(w => w.category === currentTab);
}

async function renderWorks() {
  const filtered = getFilteredWorks();
  if (filtered.length === 0) {
    document.getElementById('grid').innerHTML = '<div class="loading">暂无作品</div>';
    return;
  }
  const statsMap = {};
  await Promise.all(filtered.map(async w => {
    statsMap[w._id] = await getWorkStats(w._id);
  }));
  const html = filtered.map((w, i) => {
    const images = (w.images || '').split(',').map(s => s.trim()).filter(Boolean);
    const s = statsMap[w._id] || { likeCount: 0, commentCount: 0, shareCount: 0 };
    const rankBadge = i < 3 ? `<div class="rank-badge rank-${i + 1}">${i + 1}</div>` : '';
    const carousel = images.length > 0 ? `
      <div class="carousel" id="carousel-${w._id}" data-images='${JSON.stringify(images)}' data-current="0">
        ${images.map((img, j) => `<img src="${img}" style="opacity:${j === 0 ? 1 : 0}">`).join('')}
        ${images.length > 1 ? `<div class="carousel-dots">${images.map((_, j) => `<span class="${j === 0 ? 'active' : ''}" onclick="goSlide('${w._id}',${j})"></span>`).join('')}</div>` : ''}
        ${images.length > 1 ? `<div style="position:absolute;top:50%;left:8px;transform:translateY(-50%);width:28px;height:28px;background:rgba(0,0,0,.3);border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px" onclick="prevSlide('${w._id}')">&#8249;</div><div style="position:absolute;top:50%;right:8px;transform:translateY(-50%);width:28px;height:28px;background:rgba(0,0,0,.3);border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px" onclick="nextSlide('${w._id}')">&#8250;</div>` : ''}
      </div>` : '';
    return `
    <div class="card" data-work-id="${w._id}">
      ${rankBadge}
      ${carousel}
      <div class="card-body">
        <div class="card-title">${escHtml(w.title || '')}</div>
        <div class="card-desc">${escHtml(w.description || '')}</div>
        <div class="card-actions">
          <div class="action-btn" id="like-btn-${w._id}" onclick="toggleLike('${w._id}')">
            <span class="icon">♥</span><span id="like-count-${w._id}">${s.likeCount}</span>
          </div>
          <div class="action-btn" onclick="toggleComment('${w._id}')">
            <span class="icon">💬</span><span>${s.commentCount}</span>
          </div>
          <div class="action-btn" onclick="openShareModal('${w._id}')">
            <span class="icon">↗</span><span>${s.shareCount}</span>
          </div>
          ${w.external_url ? `<a class="external-link" href="${escHtml(w.external_url)}" target="_blank">查看详情 →</a>` : ''}
        </div>
      </div>
      <div id="interactors-${w._id}" class="interactors"></div>
      <div class="comment-section" id="comment-section-${w._id}">
        <div id="comment-list-${w._id}"></div>
        <div class="comment-input-row">
          <input class="comment-input" id="comment-input-${w._id}" placeholder="写下你的想法..." />
          <button class="comment-send" onclick="submitComment('${w._id}')">发送</button>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('grid').innerHTML = html;
  loadInteractors(filtered);
}

async function loadInteractors(filtered) {
  for (const w of filtered) {
    const [{ data: likes }, { data: comments }, { data: shares }] = await Promise.all([
      db.collection('Like').where({ work_id: w._id }).limit(20).get(),
      db.collection('Comment').where({ work_id: w._id }).limit(20).get(),
      db.collection('Share').where({ work_id: w._id }).limit(20).get()
    ]);
    const names = new Set();
    [...(likes||[]), ...(comments||[]), ...(shares||[])].forEach(r => { if (r.nickname) names.add(r.nickname); });
    const el = document.getElementById('interactors-' + w._id);
    if (el && names.size > 0) {
      el.innerHTML = [...names].slice(0, 6).map(n => `<span class="interactor-tag">${escHtml(n)}</span>`).join('');
    }
  }
}

async function toggleLike(workId) {
  if (!nickname) return showToast('请先输入姓名');
  const existing = await db.collection('Like').where({ work_id: workId, device_id }).get();
  const btn = document.getElementById('like-btn-' + workId);
  const countEl = document.getElementById('like-count-' + workId);
  if (existing.data && existing.data.length > 0) {
    await db.collection('Like').doc(existing.data[0]._id).remove();
    btn.classList.remove('liked');
  } else {
    await db.collection('Like').add({ work_id: workId, nickname, device_id, created_at: new Date() });
    btn.classList.add('liked');
  }
  const { data } = await db.collection('Like').where({ work_id: workId }).get();
  countEl.textContent = (data || []).length;
  loadInteractors([{ _id: workId }]);
}

function toggleComment(workId) {
  const section = document.getElementById('comment-section-' + workId);
  section.classList.toggle('show');
  if (section.classList.contains('show')) loadComments(workId);
}

async function loadComments(workId) {
  const { data } = await db.collection('Comment').where({ work_id: workId }).orderBy('created_at', 'desc').get();
  const el = document.getElementById('comment-list-' + workId);
  if (!el) return;
  el.innerHTML = (data || []).map(c => {
    const time = c.created_at ? new Date(c.created_at).toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
    return `<div class="comment-item"><span class="comment-nickname">${escHtml(c.nickname||'匿名')}</span><span class="comment-time">${time}</span><div class="comment-text">${escHtml(c.content||'')}</div></div>`;
  }).join('');
}

async function submitComment(workId) {
  if (!nickname) return showToast('请先输入姓名');
  const input = document.getElementById('comment-input-' + workId);
  const content = input.value.trim();
  if (!content) return;
  await db.collection('Comment').add({ work_id: workId, nickname, device_id, content, created_at: new Date() });
  input.value = '';
  showToast('评论成功');
  await loadComments(workId);
}

function openShareModal(workId) {
  currentShareWorkId = workId;
  document.getElementById('shareModal').classList.add('show');
}

function closeShareModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('shareModal').classList.remove('show');
}

async function recordShare(type) {
  if (!nickname || !currentShareWorkId) return;
  await db.collection('Share').add({ work_id: currentShareWorkId, nickname, device_id, share_type: type, created_at: new Date() });
}

function shareCopy() {
  recordShare('link');
  navigator.clipboard.writeText(location.href + '#work-' + currentShareWorkId).then(() => showToast('链接已复制')).catch(() => showToast('复制失败'));
  document.getElementById('shareModal').classList.remove('show');
}

function shareFeishu() {
  recordShare('feishu');
  showToast('请手动分享到飞书');
  document.getElementById('shareModal').classList.remove('show');
}

function shareWechat() {
  recordShare('wechat');
  showToast('请手动分享到微信');
  document.getElementById('shareModal').classList.remove('show');
}

function goSlide(workId, idx) {
  const carousel = document.getElementById('carousel-' + workId);
  if (!carousel) return;
  const data = JSON.parse(carousel.dataset.images);
  const current = parseInt(carousel.dataset.current);
  const imgs = carousel.querySelectorAll('img');
  const dots = carousel.querySelectorAll('.carousel-dots span');
  if (imgs[current]) imgs[current].style.opacity = '0';
  if (dots[current]) dots[current].classList.remove('active');
  carousel.dataset.current = idx;
  if (imgs[idx]) imgs[idx].style.opacity = '1';
  if (dots[idx]) dots[idx].classList.add('active');
}

function nextSlide(workId) {
  const carousel = document.getElementById('carousel-' + workId);
  if (!carousel) return;
  const images = JSON.parse(carousel.dataset.images);
  const current = parseInt(carousel.dataset.current);
  goSlide(workId, (current + 1) % images.length);
}

function prevSlide(workId) {
  const carousel = document.getElementById('carousel-' + workId);
  if (!carousel) return;
  const images = JSON.parse(carousel.dataset.images);
  const current = parseInt(carousel.dataset.current);
  goSlide(workId, (current - 1 + images.length) % images.length);
}

function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Handle URL hash to scroll to a specific work card
function scrollToWorkFromHash() {
  const hash = location.hash;
  if (hash && hash.startsWith('#work-')) {
    const workId = hash.replace('#work-', '');
    setTimeout(() => {
      const card = document.querySelector('[data-work-id="' + workId + '"]');
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 500);
  }
}

async function init() {
  await initCloudBase();
  await initDeviceId();
  const known = await checkVisitor();
  if (!known) {
    showNameModal();
  } else {
    await loadData();
  }
}

init().then(() => {
  scrollToWorkFromHash();
}).catch(e => {
  console.error('Init error:', e);
  document.getElementById('grid').innerHTML = '<div class="loading">初始化失败，请检查网络后刷新</div>';
});
</script>
</body>
</html>
