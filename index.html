<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>优秀作品展</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f5f5; color: #333; }
  header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-align: center; padding: 30px 20px 20px; }
  header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: 2px; }
  header p { margin-top: 8px; font-size: 0.9rem; opacity: 0.85; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
  @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
  .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); transition: transform 0.2s, box-shadow 0.2s; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.14); }
  .carousel { position: relative; width: 100%; aspect-ratio: 16/10; overflow: hidden; background: #eee; }
  .carousel img { width: 100%; height: 100%; object-fit: cover; display: none; }
  .carousel img.active { display: block; }
  .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.35); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; z-index: 2; display: flex; align-items: center; justify-content: center; }
  .carousel-btn.prev { left: 8px; }
  .carousel-btn.next { right: 8px; }
  .carousel-dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
  .carousel-dots span { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.6); cursor: pointer; }
  .carousel-dots span.active { background: white; }
  .card-body { padding: 16px; }
  .card-title { font-size: 1rem; font-weight: 600; line-height: 1.4; }
  .card-desc { margin-top: 8px; font-size: 0.875rem; color: #666; line-height: 1.6; white-space: pre-wrap; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; }
  .card-link a { color: #667eea; font-size: 0.85rem; text-decoration: none; }
  .card-link a:hover { text-decoration: underline; }
  .like-btn { background: none; border: 1.5px solid #e0e0e0; border-radius: 20px; padding: 6px 14px; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 5px; color: #888; transition: all 0.2s; }
  .like-btn:hover, .like-btn.liked { border-color: #ff6b6b; color: #ff6b6b; background: #fff5f5; }
  .empty { text-align: center; padding: 80px 20px; color: #aaa; font-size: 1rem; }
  .loading { text-align: center; padding: 60px 20px; color: #aaa; }
  .admin-link { text-align: center; padding: 20px; }
  .admin-link a { color: #ccc; font-size: 0.75rem; text-decoration: none; }
  .admin-link a:hover { color: #667eea; }
</style>
</head>
<body>
<header>
  <h1>✨ 优秀作品展</h1>
  <p>发现优秀，分享灵感</p>
</header>
<div class="container">
  <div class="loading" id="loading">加载中...</div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">暂无作品，敬请期待 🌱</div>
</div>
<div class="admin-link"><a href="admin.html">管理后台</a></div>

<script>
const SUPABASE_URL = 'https://nrukvtlujydvebfskwok.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ydWt2dGx1anlkdmViZnNrd29rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Mzc5MDUsImV4cCI6MjA5NTMxMzkwNX0.QUZLq1S8VdJjQzA8g6DxUvNj6bK06ci3lR-3KK15nk4';
const LIKES_KEY = 'works_likes_v1';

function getLikes() { try { return JSON.parse(localStorage.getItem(LIKES_KEY)) || {}; } catch { return {}; } }
function saveLikes(l) { localStorage.setItem(LIKES_KEY, JSON.stringify(l)); }

async function api(path, opts={}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON, 'Content-Type': 'application/json', ...opts.headers },
    ...opts
  });
  if (!res.ok) throw new Error(await res.text());
  return res.status === 204 ? null : res.json();
}

async function toggleLike(id, idx) {
  const likes = getLikes();
  const isLiked = likes[id];
  // optimistic update
  likes[id] = !isLiked;
  saveLikes(likes);
  // update db
  const work = window._works[idx];
  const newCount = isLiked ? Math.max(0, (work.likes||0)-1) : (work.likes||0)+1;
  window._works[idx].likes = newCount;
  await api(`works?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify({ likes: newCount }), headers: { 'Prefer': 'return=minimal' } });
  renderCards(window._works);
}

window._carouselIdx = {};
function slide(i, dir) {
  const c = document.getElementById('c'+i);
  const imgs = c.querySelectorAll('img');
  const dots = document.getElementById('dots'+i);
  let idx = window._carouselIdx[i] || 0;
  imgs[idx].classList.remove('active');
  dots && dots.children[idx] && dots.children[idx].classList.remove('active');
  idx = (idx + dir + imgs.length) % imgs.length;
  imgs[idx].classList.add('active');
  dots && dots.children[idx] && dots.children[idx].classList.add('active');
  window._carouselIdx[i] = idx;
}
function goSlide(i, j) {
  const c = document.getElementById('c'+i);
  const imgs = c.querySelectorAll('img');
  const dots = document.getElementById('dots'+i);
  const idx = window._carouselIdx[i] || 0;
  imgs[idx].classList.remove('active');
  dots && dots.children[idx] && dots.children[idx].classList.remove('active');
  imgs[j].classList.add('active');
  dots && dots.children[j] && dots.children[j].classList.add('active');
  window._carouselIdx[i] = j;
}

function renderCards(works) {
  const likes = getLikes();
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  works.forEach((w, i) => {
    const imgs = w.images || [];
    const isLiked = !!likes[w.id];
    let carouselHtml = '';
    if (imgs.length > 0) {
      carouselHtml = `<div class="carousel" id="c${i}">`;
      imgs.forEach((src, j) => { carouselHtml += `<img src="${src}" class="${j===0?'active':''}" alt="">`; });
      if (imgs.length > 1) {
        carouselHtml += `<button class="carousel-btn prev" onclick="slide(${i},-1)">&#8249;</button>`;
        carouselHtml += `<button class="carousel-btn next" onclick="slide(${i},1)">&#8250;</button>`;
        carouselHtml += `<div class="carousel-dots" id="dots${i}">`;
        imgs.forEach((_, j) => carouselHtml += `<span class="${j===0?'active':''}"></span>`);
        carouselHtml += `</div>`;
      }
      carouselHtml += `</div>`;
    }
    grid.innerHTML += `
      <div class="card">
        ${carouselHtml}
        <div class="card-body">
          <div class="card-title">${w.title||'未命名'}</div>
          ${w.description ? `<div class="card-desc">${w.description}</div>` : ''}
          <div class="card-footer">
            ${w.link ? `<div class="card-link"><a href="${w.link}" target="_blank">🔗 查看详情</a></div>` : '<div></div>'}
            <button class="like-btn ${isLiked?'liked':''}" onclick="toggleLike('${w.id}',${i})">
              ${isLiked?'❤️':'🤍'} ${w.likes||0}
            </button>
          </div>
        </div>
      </div>`;
  });
}

async function init() {
  try {
    const works = await api('works?order=sort_order.asc,created_at.desc&select=*');
    window._works = works;
    document.getElementById('loading').style.display = 'none';
    if (!works.length) { document.getElementById('empty').style.display = ''; return; }
    renderCards(works);
  } catch(e) {
    document.getElementById('loading').textContent = '加载失败，请刷新重试';
    console.error(e);
  }
}
init();
</script>
</body>
</html>
