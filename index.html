<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>"医"起AI·挑战赛 作品广场</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f5f5;color:#333}
  header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;text-align:center;padding:24px 20px 0}
  header h1{font-size:1.5rem;font-weight:700;letter-spacing:1px;line-height:1.4}
  header p{margin-top:6px;font-size:0.85rem;opacity:0.85;padding-bottom:16px}
  .tabs{display:flex;background:rgba(255,255,255,0.15);margin:0 16px;border-radius:12px 12px 0 0;overflow:hidden}
  .tab{flex:1;padding:12px 8px;text-align:center;font-size:0.9rem;font-weight:600;color:rgba(255,255,255,0.7);cursor:pointer;transition:all 0.2s;border-bottom:3px solid transparent}
  .tab.active{color:white;background:rgba(255,255,255,0.2);border-bottom-color:white}
  .container{max-width:900px;margin:0 auto;padding:20px 16px 60px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
  @media(max-width:480px){.grid{grid-template-columns:1fr}}
  .rank-badge{position:absolute;top:8px;left:8px;z-index:3;background:rgba(0,0,0,0.55);color:white;font-size:0.75rem;font-weight:700;padding:3px 9px;border-radius:20px}
  .rank-badge.gold{background:linear-gradient(135deg,#f6d365,#fda085)}
  .rank-badge.silver{background:linear-gradient(135deg,#bdc3c7,#9aa0a6)}
  .rank-badge.bronze{background:linear-gradient(135deg,#cd7f32,#a0522d)}
  .card{background:white;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
  .carousel{position:relative;width:100%;aspect-ratio:16/10;overflow:hidden;background:#eee}
  .carousel img{width:100%;height:100%;object-fit:cover;display:none}
  .carousel img.active{display:block}
  .carousel-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.35);color:white;border:none;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center}
  .carousel-btn.prev{left:8px}.carousel-btn.next{right:8px}
  .carousel-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px}
  .carousel-dots span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.6)}
  .carousel-dots span.active{background:white}
  .card-body{padding:14px 16px 0}
  .card-title{font-size:1rem;font-weight:600;line-height:1.4}
  .card-desc{margin-top:6px;font-size:0.875rem;color:#666;line-height:1.6;white-space:pre-wrap}
  .card-link{margin-top:8px}
  .card-link a{color:#667eea;font-size:0.85rem;text-decoration:none}
  .action-bar{display:flex;align-items:center;border-top:1px solid #f0f0f0;margin-top:12px}
  .action-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:10px 0;font-size:0.78rem;color:#999;background:none;border:none;cursor:pointer;transition:color 0.2s,background 0.15s}
  .action-btn:hover{background:#f8f8f8;color:#555}
  .action-btn .icon{font-size:1.1rem}
  .action-btn.liked{color:#ff6b6b}
  .action-sep{width:1px;background:#f0f0f0;height:28px}
  .people-row{display:flex;flex-wrap:wrap;gap:4px;padding:6px 16px 8px}
  .people-row.hidden{display:none}
  .person-tag{background:#f0f4ff;color:#667eea;font-size:0.75rem;border-radius:12px;padding:3px 9px}
  .comment-section{display:none;padding:0 16px 14px;border-top:1px solid #f5f5f5}
  .comment-section.open{display:block}
  .comment-list{margin-top:10px;max-height:200px;overflow-y:auto}
  .comment-item{padding:8px 0;border-bottom:1px solid #f8f8f8}
  .comment-item:last-child{border-bottom:none}
  .comment-nick{font-size:0.8rem;font-weight:600;color:#667eea}
  .comment-text{font-size:0.85rem;color:#444;margin-top:2px;line-height:1.5;word-break:break-all}
  .comment-time{font-size:0.72rem;color:#ccc;margin-top:2px}
  .no-comment{text-align:center;color:#ccc;font-size:0.85rem;padding:14px 0}
  .comment-form{margin-top:10px;display:flex;flex-direction:column;gap:8px}
  .comment-form input{width:100%;padding:8px 12px;border:1.5px solid #e0e0e0;border-radius:20px;font-size:0.85rem;outline:none;font-family:inherit}
  .comment-form input:focus{border-color:#667eea}
  .comment-send-row{display:flex;gap:8px}
  .comment-send-row input{flex:1}
  .comment-send{background:#667eea;color:white;border:none;border-radius:20px;padding:8px 16px;font-size:0.85rem;cursor:pointer;white-space:nowrap}
  .modal-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:flex-end;justify-content:center}
  .modal-mask.open{display:flex}
  .modal-box{background:white;border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:480px}
  .modal-title{font-weight:600;font-size:1rem;margin-bottom:16px;text-align:center}
  .modal-box input{width:100%;padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:0.95rem;outline:none;margin-bottom:14px}
  .modal-box input:focus{border-color:#667eea}
  .share-btns{display:flex;flex-direction:column;gap:10px}
  .share-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:12px;border:1.5px solid #e0e0e0;background:white;font-size:0.95rem;cursor:pointer;text-align:left}
  .share-btn:hover{border-color:#667eea}
  .share-btn .sicon{font-size:1.4rem}
  .modal-cancel{margin-top:12px;width:100%;padding:12px;border:none;background:#f5f5f5;border-radius:12px;font-size:0.95rem;cursor:pointer;color:#888}
  .empty{text-align:center;padding:60px 20px;color:#aaa}
  .loading{text-align:center;padding:60px 20px;color:#aaa}
  .admin-link{text-align:center;padding:20px}
  .admin-link a{color:#ccc;font-size:0.75rem;text-decoration:none}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:10px 24px;border-radius:20px;font-size:0.9rem;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1}
</style>
</head>
<body>
<header>
  <h1>"医"起AI·挑战赛 作品广场</h1>
  <p>发现优秀，分享灵感</p>
  <div class="tabs">
    <div class="tab active" id="tab-challenge" onclick="switchTab('challenge')">"医"起打擂台</div>
    <div class="tab" id="tab-brave" onclick="switchTab('brave')">"医"高人胆大</div>
  </div>
</header>
<div class="container">
  <div class="loading" id="loading">加载中...</div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">暂无作品，敬请期待 🌱</div>
</div>
<div class="admin-link"><a href="admin.html">管理后台</a></div>
<div class="modal-mask" id="share-modal" onclick="closeShareModal(event)">
  <div class="modal-box">
    <div class="modal-title">📤 转发作品</div>
    <input type="text" id="share-nick" placeholder="请输入你的名字（让大家知道是谁分享的）" maxlength="20">
    <div class="share-btns">
      <button class="share-btn" onclick="doShare('copy')"><span class="sicon">🔗</span><div><div style="font-weight:600">复制链接</div><div style="font-size:0.8rem;color:#aaa">可粘贴到微信、飞书等</div></div></button>
      <button class="share-btn" onclick="doShare('feishu')"><span class="sicon">🟦</span><div><div style="font-weight:600">分享到飞书</div><div style="font-size:0.8rem;color:#aaa">打开飞书粘贴发送</div></div></button>
      <button class="share-btn" onclick="doShare('wechat')"><span class="sicon">💚</span><div><div style="font-weight:600">分享到微信</div><div style="font-size:0.8rem;color:#aaa">打开微信粘贴发送</div></div></button>
    </div>
    <button class="modal-cancel" onclick="closeShareModal()">取消</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SB='https://nrukvtlujydvebfskwok.supabase.co';
const AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ydWt2dGx1anlkdmViZnNrd29rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Mzc5MDUsImV4cCI6MjA5NTMxMzkwNX0.QUZLq1S8VdJjQzA8g6DxUvNj6bK06ci3lR-3KK15nk4';
const H={'apikey':AK,'Authorization':'Bearer '+AK,'Content-Type':'application/json'};
const NK='works_nickname';
function gn(){return localStorage.getItem(NK)||''}
function sn(n){if(n)localStorage.setItem(NK,n)}
window._works=[];window._all=[];window._tab='challenge';
window._ci={};window._co={};window._sid=null;window._si=null;
async function init(){
  try{
    const w=await fetch(SB+'/rest/v1/works_with_counts?order=hot_score.desc,sort_order.asc&select=*',{headers:H}).then(r=>r.json());
    window._all=w;
    document.getElementById('loading').style.display='none';
    const p=new URLSearchParams(location.search);
    switchTab(p.get('cat')||'challenge');
    const wid=p.get('work');
    if(wid){setTimeout(()=>{const idx=window._works.findIndex(x=>x.id===wid);if(idx>=0)document.getElementById('card'+idx)?.scrollIntoView({behavior:'smooth',block:'center'})},500);}
  }catch(e){document.getElementById('loading').textContent='加载失败，请刷新重试';}
}
function switchTab(cat){
  window._tab=cat;window._ci={};window._co={};
  document.getElementById('tab-challenge').className='tab'+(cat==='challenge'?' active':'');
  document.getElementById('tab-brave').className='tab'+(cat==='brave'?' active':'');
  window._works=window._all.filter(w=>w.category===cat);
  const empty=document.getElementById('empty');
  if(!window._works.length){empty.style.display='';document.getElementById('grid').innerHTML='';return;}
  empty.style.display='none';renderAll();
}
function renderAll(){
  const grid=document.getElementById('grid');grid.innerHTML='';
  window._works.forEach((w,i)=>{
    const imgs=w.images||[];
    const rb=i===0?'<div class="rank-badge gold">🥇 第1名</div>':i===1?'<div class="rank-badge silver">🥈 第2名</div>':i===2?'<div class="rank-badge bronze">🥉 第3名</div>':`<div class="rank-badge">第${i+1}名</div>`;
    let car='';
    if(imgs.length){
      car=`<div class="carousel" id="c${i}">`;
      imgs.forEach((s,j)=>{car+=`<img src="${s}" class="${j===0?'active':''}" alt="">`;});
      if(imgs.length>1){car+=`<button class="carousel-btn prev" onclick="slide(${i},-1)">&#8249;</button><button class="carousel-btn next" onclick="slide(${i},1)">&#8250;</button><div class="carousel-dots" id="dots${i}">`;imgs.forEach((_,j)=>{car+=`<span class="${j===0?'active':''}"></span>`;});car+=`</div>`;}
      car+=rb+`</div>`;
    }
    grid.innerHTML+=`<div class="card" id="card${i}">${car||rb}
      <div class="card-body">
        <div class="card-title">${w.title||'未命名'}</div>
        ${w.description?`<div class="card-desc">${w.description}</div>`:''}
        ${w.link?`<div class="card-link"><a href="${w.link}" target="_blank">🔗 查看详情</a></div>`:''}
      </div>
      <div class="action-bar">
        <button class="action-btn" id="lb${i}" onclick="toggleLike('${w.id}',${i})"><span class="icon">🤍</span><span id="lc${i}">${w.real_like_count||0} 赞</span></button>
        <div class="action-sep"></div>
        <button class="action-btn" onclick="toggleCmt(${i},'${w.id}')"><span class="icon">💬</span><span id="cc${i}">${w.real_comment_count||0} 评论</span></button>
        <div class="action-sep"></div>
        <button class="action-btn" onclick="openShare('${w.id}',${i})"><span class="icon">📤</span><span id="sc${i}">${w.real_share_count||0} 转发</span></button>
      </div>
      <div class="people-row hidden" id="pr${i}"></div>
      <div class="comment-section" id="cs${i}">
        <div class="comment-list" id="cl${i}"></div>
        <div class="comment-form">
          <input type="text" id="nk${i}" placeholder="你的名字" value="${gn()}" maxlength="12">
          <div class="comment-send-row">
            <input type="text" id="ci${i}" placeholder="写下你的评论..." onkeydown="if(event.key==='Enter')sendCmt('${w.id}',${i})">
            <button class="comment-send" onclick="sendCmt('${w.id}',${i})">发送</button>
          </div>
        </div>
      </div>
    </div>`;
  });
}
function slide(i,dir){
  const c=document.getElementById('c'+i);if(!c)return;
  const imgs=c.querySelectorAll('img'),dots=document.getElementById('dots'+i);
  let idx=window._ci[i]||0;
  imgs[idx].classList.remove('active');dots&&dots.children[idx]&&dots.children[idx].classList.remove('active');
  idx=(idx+dir+imgs.length)%imgs.length;
  imgs[idx].classList.add('active');dots&&dots.children[idx]&&dots.children[idx].classList.add('active');
  window._ci[i]=idx;
}
async function toggleLike(id,i){
  const nick=gn()||prompt('请输入你的名字，让大家知道是你点赞了 👍');if(!nick)return;sn(nick);
  const btn=document.getElementById('lb'+i),liked=btn.classList.contains('liked');
  if(liked){
    await fetch(SB+'/rest/v1/likes?work_id=eq.'+id+'&nickname=eq.'+encodeURIComponent(nick),{method:'DELETE',headers:H});
    const n=Math.max(0,(window._works[i].real_like_count||0)-1);
    window._works[i].real_like_count=n;btn.className='action-btn';btn.querySelector('.icon').textContent='🤍';document.getElementById('lc'+i).textContent=n+' 赞';loadPeople(i,id);
  }else{
    const r=await fetch(SB+'/rest/v1/likes',{method:'POST',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify({work_id:id,nickname:nick})});
    if(r.status===409){showToast('你已经点过赞了 ❤️');btn.className='action-btn liked';btn.querySelector('.icon').textContent='❤️';return;}
    const n=(window._works[i].real_like_count||0)+1;
    window._works[i].real_like_count=n;btn.className='action-btn liked';btn.querySelector('.icon').textContent='❤️';document.getElementById('lc'+i).textContent=n+' 赞';loadPeople(i,id);
  }
}
async function loadPeople(i,wid){
  try{
    const[a,b,c]=await Promise.all([
      fetch(SB+'/rest/v1/likes?work_id=eq.'+wid+'&select=nickname',{headers:H}).then(r=>r.json()),
      fetch(SB+'/rest/v1/comments?work_id=eq.'+wid+'&select=nickname',{headers:H}).then(r=>r.json()),
      fetch(SB+'/rest/v1/shares?work_id=eq.'+wid+'&select=nickname',{headers:H}).then(r=>r.json()),
    ]);
    const names=new Set([...a,...b,...c].map(x=>x.nickname).filter(Boolean));
    const el=document.getElementById('pr'+i);
    if(names.size>0){el.classList.remove('hidden');el.innerHTML=[...names].map(n=>`<span class="person-tag">${n}</span>`).join('');}
    else el.classList.add('hidden');
  }catch(e){}
}
async function toggleCmt(i,wid){
  const sec=document.getElementById('cs'+i),open=window._co[i];
  window._co[i]=!open;sec.className='comment-section'+(!open?' open':'');
  if(!open)await loadCmts(i,wid);
}
async function loadCmts(i,wid){
  const list=document.getElementById('cl'+i);list.innerHTML='<div class="no-comment">加载中...</div>';
  try{
    const cmts=await fetch(SB+'/rest/v1/comments?work_id=eq.'+wid+'&order=created_at.asc&select=*',{headers:H}).then(r=>r.json());
    document.getElementById('cc'+i).textContent=(cmts.length||0)+' 评论';
    if(!cmts.length){list.innerHTML='<div class="no-comment">还没有评论，来说第一句！</div>';return;}
    list.innerHTML=cmts.map(c=>`<div class="comment-item"><div class="comment-nick">${c.nickname}</div><div class="comment-text">${c.content}</div><div class="comment-time">${new Date(c.created_at).toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div></div>`).join('');
    list.scrollTop=list.scrollHeight;loadPeople(i,wid);
  }catch(e){list.innerHTML='<div class="no-comment">加载失败</div>';}
}
async function sendCmt(wid,i){
  const nk=document.getElementById('nk'+i),ci=document.getElementById('ci'+i);
  const nick=nk.value.trim(),content=ci.value.trim();
  if(!nick){showToast('请填写你的名字');nk.focus();return;}
  if(!content){showToast('评论内容不能为空');return;}
  sn(nick);
  const r=await fetch(SB+'/rest/v1/comments',{method:'POST',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify({work_id:wid,nickname:nick,content})});
  if(!r.ok){showToast('发送失败，请重试');return;}
  ci.value='';window._works[i].real_comment_count=(window._works[i].real_comment_count||0)+1;
  document.getElementById('cc'+i).textContent=window._works[i].real_comment_count+' 评论';
  await loadCmts(i,wid);
}
function openShare(wid,idx){window._sid=wid;window._si=idx;document.getElementById('share-nick').value=gn();document.getElementById('share-modal').classList.add('open');}
function closeShareModal(e){if(!e||e.target===document.getElementById('share-modal'))document.getElementById('share-modal').classList.remove('open');}
async function doShare(platform){
  const nick=document.getElementById('share-nick').value.trim();if(!nick){showToast('请先填写你的名字');return;}sn(nick);
  const wid=window._sid,idx=window._si,w=window._works[idx];
  const base=location.origin+location.pathname.replace(/\/[^/]*$/,'/index.html');
  const url=base+'?work='+wid+'&cat='+window._tab;
  const text=`「${w.title}」— "医"起AI·挑战赛 作品广场\n${url}`;
  fetch(SB+'/rest/v1/shares',{method:'POST',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify({work_id:wid,nickname:nick})}).then(()=>{
    window._works[idx].real_share_count=(w.real_share_count||0)+1;
    document.getElementById('sc'+idx).textContent=window._works[idx].real_share_count+' 转发';
    loadPeople(idx,wid);
  });
  const txt=platform==='feishu'?text:url;
  const hint=platform==='copy'?'链接已复制！粘贴发送 🎉':platform==='feishu'?'已复制！打开飞书粘贴发送 🟦':'已复制！打开微信粘贴发送 💚';
  try{await navigator.clipboard.writeText(txt);}catch(e){const ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
  showToast(hint);closeShareModal();
}
let _tt;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),3000);}
init();
</script>
</body>
</html>
