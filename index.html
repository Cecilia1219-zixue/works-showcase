<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>医起AI·挑战赛</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F5F4;--bg-alt:rgba(255,255,255,0.75);--surface:rgba(255,255,255,0.92);
  --text-primary:#1A1A1A;--text-secondary:#666;--text-dim:#999;
  --accent:#1A1A1A;--accent-h:#333;
  --card-shadow:0 10px 34px rgba(20,32,45,0.10);
  --card-radius:12px;--chip-bg:rgba(0,0,0,0.06);
  --nav-bg:rgba(255,255,255,0.82);--nav-shadow:0 2px 12px rgba(0,0,0,0.06);
  --border:rgba(0,0,0,0.08);
  --sheet-tab:#E8E8E8;--sheet-tab-active:#fff;
}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;line-height:1.6;overflow-x:hidden}
a{color:var(--text-secondary);text-decoration:none}

/* 全局背景 */
.site-bg{position:fixed;inset:0;z-index:-2;overflow:hidden}
.site-bg img{width:100%;height:100%;object-fit:cover;object-position:center;filter:brightness(0.92) saturate(0.95);opacity:.35}
.site-bg::after{content:'';position:absolute;inset:0;background:rgba(245,245,244,0.30)}

/* 登录页 */
#login-overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;transition:opacity .5s,visibility .5s;overflow:hidden}
#login-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
.login-card{position:relative;z-index:1;background:var(--surface);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:24px;padding:2.5rem 2rem;width:90%;max-width:420px;box-shadow:0 16px 48px rgba(0,0,0,0.08);text-align:center}
#login-overlay.checking .login-card{max-width:320px;padding:2rem}
.login-card .logo-sphere{width:80px;height:80px;margin:0 auto 1.2rem;border-radius:50%;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.brand-logo{width:100%;height:100%;display:block;object-fit:cover}
.login-card h1{font-size:1.8rem;font-weight:900;letter-spacing:.05em;
  background:linear-gradient(180deg,#e8e8e8 0%,#fff 15%,#a8c0d8 30%,#4a8aaa 50%,#00bcd4 65%,#0288d1 80%,#0d47a1 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 2px 4px rgba(0,188,212,0.3));margin-bottom:.2rem}
.login-card .theme-text{font-family:'Noto Sans SC',sans-serif;font-size:.95rem;color:rgba(26,26,26,0.4);margin-bottom:1.5rem;letter-spacing:.15em;text-transform:uppercase}
.login-loading{display:none;align-items:center;justify-content:center;gap:10px;color:var(--text-dim);font-size:.9rem;margin-top:.5rem}
.login-loading .spinner{width:20px;height:20px;border:2px solid var(--chip-bg);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
#login-overlay.checking .login-loading{display:flex}
#login-overlay.checking .login-form{display:none}
.login-card .login-form{text-align:left}
.login-card .login-form>p{text-align:center;color:var(--text-dim);margin-bottom:1.5rem;font-size:.85rem}
.btn-feishu{width:100%;margin-top:.5rem;background:#3370FF;color:#fff;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-feishu:hover{background:#2860E0;transform:translateY(-1px);box-shadow:0 6px 24px rgba(51,112,255,0.3)}
.btn-feishu:active{transform:scale(0.98)}
.login-divider{display:flex;align-items:center;gap:12px;margin:1rem 0;color:var(--text-dim);font-size:.78rem}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.form-input{width:100%;padding:14px 16px;margin-bottom:1rem;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,0.7);color:var(--text-primary);font-size:1rem;outline:none;transition:border-color .2s,box-shadow .2s}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,26,26,0.06)}
.form-input::placeholder{color:var(--text-dim)}
.form-btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 28px;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .2s,opacity .2s;background:var(--accent);color:#fff}
.btn-primary{width:100%;margin-top:.5rem;box-shadow:0 4px 16px rgba(0,0,0,0.12)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,0.18)}
.btn-primary:active{transform:scale(0.98)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.login-error{color:#E53935;font-size:.82rem;margin-top:.25rem;display:none}
.login-hint{color:var(--text-dim);font-size:.75rem;margin-top:.75rem;text-align:center}
@media(max-width:768px){.login-card{padding:2rem 1.5rem;width:92%;max-width:360px;border-radius:20px}.login-card h1{font-size:1.3rem}.login-card .theme-text{font-size:.8rem}}

/* 主内容 */
#main{position:relative;z-index:1;display:none}
#main.show{display:block}

/* 导航 */
.navbar{position:sticky;top:0;z-index:100;padding:10px 1.5rem;display:flex;align-items:center;justify-content:space-between;background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:var(--nav-shadow);border-radius:0 0 20px 20px}
.nav-left,.nav-right{display:flex;align-items:center;gap:12px}
.nav-sphere{width:36px;height:36px;border-radius:50%;flex-shrink:0;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.nav-title{font-weight:700;font-size:1.1rem;color:var(--text-primary);letter-spacing:-0.01em}
.nav-user{display:flex;flex-direction:column;align-items:flex-end;line-height:1.2;max-width:180px}
.nav-user .name{font-size:.82rem;font-weight:700;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.nav-user .dept{font-size:.68rem;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.nav-admin{font-size:.75rem;color:var(--text-dim);padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .2s}
.nav-admin:hover{color:var(--text-primary);background:rgba(0,0,0,0.04)}
.nav-logout{display:none;font-size:.75rem;color:var(--text-dim);padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .2s}
.nav-logout:hover{color:#e53935;background:rgba(229,57,53,.06);border-color:rgba(229,57,53,.22)}
@media(max-width:640px){.navbar{padding:9px 1rem}.nav-title{font-size:.95rem}.nav-user{display:none}}

/* Hero */
.hero{text-align:center;padding:2rem 1.5rem 1rem}
.hero h1{font-size:2.6rem;font-weight:900;letter-spacing:.05em;
  background:linear-gradient(180deg,#e8e8e8 0%,#fff 15%,#a8c0d8 30%,#4a8aaa 50%,#00bcd4 65%,#0288d1 80%,#0d47a1 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 2px 4px rgba(0,188,212,0.3)) drop-shadow(0 4px 12px rgba(2,136,209,0.2));
  position:relative}
.hero h1::after{content:'医起AI·挑战赛';position:absolute;left:0;top:0;width:100%;height:100%;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.6) 45%,transparent 50%);
  background-size:200% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:shine 4s ease-in-out infinite}
@keyframes shine{0%,100%{background-position:200% 0}50%{background-position:-200% 0}}
.hero .theme-text{font-family:'Noto Sans SC',sans-serif;font-size:1rem;color:rgba(26,26,26,0.35);margin-top:.5rem;letter-spacing:.2em;text-transform:uppercase}

/* Sheet Tabs */
.sheet-bar{max-width:1100px;margin:0 auto;padding:0 1.5rem}
.sheet-tabs{display:flex;align-items:flex-end;gap:0}
.sheet-tab{padding:8px 24px;font-size:.85rem;font-weight:500;cursor:pointer;background:var(--sheet-tab);color:var(--text-secondary);border:1px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;transition:all .2s;user-select:none;position:relative;bottom:-1px}
.sheet-tab:hover{background:rgba(255,255,255,0.6);color:var(--text-primary)}
.sheet-tab.active{background:var(--sheet-tab-active);color:var(--text-primary);font-weight:600;border-bottom-color:var(--sheet-tab-active)}

/* 卡片瀑布流（小红书风格） */
.cards-container{max-width:1180px;margin:0 auto;padding:1.25rem 1.5rem 2.5rem}
.masonry{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;align-items:start}

/* 卡片 */
.card{background:#fff;border-radius:var(--card-radius);overflow:hidden;box-shadow:var(--card-shadow);border:1px solid rgba(0,0,0,0.06);transition:transform .2s,box-shadow .2s;cursor:default}
.card:hover{transform:translateY(-2px);box-shadow:0 14px 42px rgba(20,32,45,0.14)}
.card-image{width:100%;display:block;position:relative;overflow:hidden;background:#f0f0f0}
.card-image img{width:100%;display:block;object-fit:cover}
.card-carousel{position:relative;overflow:hidden}
.card-carousel .carousel-track{display:flex;transition:transform .3s ease}
.card-carousel .carousel-slide{min-width:100%;flex-shrink:0}
.card-carousel .carousel-slide img{width:100%;display:block;object-fit:cover;aspect-ratio:4/3;background:#f1f3f5}
.card-carousel .carousel-btn{position:absolute;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,255,255,0.85);color:#333;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.1);transition:transform .15s}
.card-carousel .carousel-btn:hover{transform:translateY(-50%) scale(1.1)}
.card-carousel .carousel-btn.prev{left:8px}
.card-carousel .carousel-btn.next{right:8px}
.card-carousel .carousel-dots{display:flex;justify-content:center;gap:5px;padding:6px 0}
.card-carousel .carousel-dots .dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);transition:all .2s}
.card-carousel .carousel-dots .dot.active{background:var(--accent);width:14px;border-radius:3px}
.card-body{padding:14px 14px 12px}
.card-title{font-size:1rem;font-weight:800;color:var(--text-primary);margin-bottom:6px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-desc{font-size:.82rem;color:var(--text-secondary);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{font-size:.74rem;color:var(--text-dim);margin-top:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* 卡片底部操作栏 */
.card-actions{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-top:1px solid rgba(0,0,0,0.06);background:#fbfbfb}
.card-action{display:flex;align-items:center;gap:5px;background:transparent;border:none;cursor:pointer;padding:6px 10px;border-radius:10px;transition:all .15s;color:var(--text-secondary);font-size:.82rem}
.card-action:hover{background:rgba(0,0,0,0.04);color:var(--text-primary)}
.card-action.liked{color:#E53935}
.card-action .icon{font-size:1rem}

/* 评论面板 */
.comment-panel{display:none;padding:10px 12px;border-top:1px solid rgba(0,0,0,0.06);background:var(--bg-alt)}
.comment-panel.show{display:block}
.comment-input-row{display:flex;gap:8px;margin-bottom:8px}
.comment-input-row input{flex:1;padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text-primary);font-size:.82rem;outline:none}
.comment-input-row input:focus{border-color:var(--accent)}
.comment-input-row button{padding:8px 16px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:.82rem;cursor:pointer;font-weight:500}
.comment-list{max-height:150px;overflow-y:auto}
.comment-item{padding:6px 0;font-size:.78rem;border-bottom:1px solid rgba(0,0,0,0.04)}
.comment-item:last-child{border-bottom:none}
.comment-author{color:var(--text-primary);font-weight:500}
.comment-dept{display:inline-block;padding:1px 6px;border-radius:8px;background:rgba(0,0,0,0.06);color:var(--text-secondary);font-size:.65rem;margin-left:4px;vertical-align:middle}
.comment-time{color:var(--text-dim);margin-left:6px;font-size:.7rem}
.comment-text{margin-top:2px;color:var(--text-secondary)}

/* 分享弹窗 */
.modal-overlay{position:fixed;inset:0;z-index:998;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s}
.modal-overlay.show{opacity:1;visibility:visible}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:1.5rem;width:90%;max-width:400px;box-shadow:0 16px 48px rgba(0,0,0,0.12);transform:translateY(20px);transition:transform .25s;position:relative}
.modal-overlay.show .modal{transform:translateY(0)}
.modal h3{font-size:1.1rem;font-weight:600;margin-bottom:1rem;color:var(--text-primary)}
.modal-close-btn{position:absolute;top:12px;right:12px;background:transparent;border:none;font-size:1.3rem;cursor:pointer;color:var(--text-dim);line-height:1}
.share-buttons{display:flex;gap:1rem;justify-content:center;margin-bottom:1rem}
.share-btn{width:56px;height:56px;border-radius:50%;border:none;background:var(--chip-bg);color:var(--text-primary);font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,background .15s}
.share-btn:hover{transform:scale(1.1)}
.share-btn.wechat:hover{background:rgba(7,193,96,0.12);color:#07C160}
.share-link{display:flex;gap:8px}
.share-link input{flex:1;padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text-primary);font-size:.8rem;outline:none}
.share-link button{padding:8px 14px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:.8rem;cursor:pointer;font-weight:500}

/* Toast */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(26,26,26,0.9);backdrop-filter:blur(8px);color:#fff;padding:10px 20px;border-radius:12px;font-size:.9rem;z-index:9999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.15)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 空状态 */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;text-align:center;min-height:400px;width:100%;column-span:all}
.empty-state .icon{font-size:3rem;margin-bottom:1rem;opacity:.5}
.empty-state p{font-size:1rem;color:var(--text-secondary)}

/* 页脚 */
.footer{text-align:center;padding:2rem 1.5rem 1.5rem;color:var(--text-dim);font-size:.85rem}
.footer .brand{font-family:'Noto Sans SC',sans-serif;font-size:.78rem;font-weight:500;color:var(--text-secondary);letter-spacing:.15em;margin-bottom:.4rem}
.footer .admin-link{display:inline-block;padding:4px 14px;border-radius:6px;border:1px solid var(--border);color:var(--text-dim);font-size:.72rem;text-decoration:none;transition:all .2s;cursor:pointer}
.footer .admin-link:hover{color:var(--text-primary);background:rgba(0,0,0,0.04);border-color:var(--border-h)}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:1rem;color:var(--text-dim)}
.loading .spinner{width:20px;height:20px;border:2px solid var(--chip-bg);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:640px){
  body{background:#f6f6f6;line-height:1.45}
  .site-bg img{opacity:.18}
  .navbar{padding:8px 10px;border-radius:0;background:rgba(255,255,255,.94)}
  .nav-left{gap:8px;min-width:0}
  .nav-sphere{width:30px;height:30px}
  .nav-title{font-size:.92rem;max-width:8.5em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .nav-admin{font-size:0;width:32px;height:32px;padding:0;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .nav-admin::before{content:'⚙️';font-size:15px}
  .nav-user{display:none}

  .hero{padding:12px 12px 8px}
  .hero h1{font-size:1.45rem;line-height:1.2}
  .hero .theme-text{font-size:.68rem;margin-top:.25rem;letter-spacing:.12em}

  .sheet-bar{padding:0 10px;margin-top:4px}
  .sheet-tabs{gap:8px;align-items:center}
  .sheet-tab{flex:1;text-align:center;padding:7px 8px;border:1px solid var(--border);border-radius:999px;bottom:0;background:rgba(255,255,255,.72);font-size:.74rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sheet-tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

  .cards-container{padding:10px 8px 72px;max-width:none}
  .masonry{display:block;column-count:2;column-gap:8px}
  .card{display:inline-block;width:100%;margin:0 0 8px;border-radius:10px;border:none;box-shadow:none;vertical-align:top;overflow:hidden;background:#fff}
  .card:hover{transform:none;box-shadow:none}
  .card-carousel .carousel-slide img{aspect-ratio:3/4}
  .card-carousel .carousel-btn{width:24px;height:24px;font-size:.85rem}
  .card-carousel .carousel-btn.prev{left:5px}
  .card-carousel .carousel-btn.next{right:5px}
  .card-carousel .carousel-dots{padding:4px 0}
  .card-carousel .carousel-dots .dot{width:5px;height:5px}
  .card-carousel .carousel-dots .dot.active{width:12px}
  .card-body{padding:8px 9px 7px}
  .card-title{font-size:.78rem;line-height:1.35;font-weight:700;margin-bottom:4px;-webkit-line-clamp:2}
  .card-desc{font-size:.68rem;line-height:1.35;-webkit-line-clamp:1;color:#777}
  .card-meta{margin-top:6px;font-size:.64rem;color:#999}
  .card-actions{padding:5px 6px;background:#fff;border-top:1px solid rgba(0,0,0,.04)}
  .card-action{padding:4px 4px;gap:2px;font-size:.66rem;border-radius:8px;min-width:0}
  .card-action .icon{font-size:.82rem}
  .comment-panel{padding:8px;background:#fff}
  .comment-input-row{gap:6px;flex-direction:column}
  .comment-input-row input{padding:8px 9px;font-size:.74rem;border-radius:8px}
  .comment-input-row button{padding:7px 10px;font-size:.74rem;border-radius:8px}
  .comment-list{max-height:120px}
  .comment-item{font-size:.68rem}
  .comment-time{display:block;margin-left:0;margin-top:1px;font-size:.62rem}
  .modal{width:calc(100% - 28px);padding:1.15rem;border-radius:14px}
  .toast{bottom:1.25rem;max-width:86%;font-size:.78rem}
  .footer{padding:1rem 1rem 1.5rem;font-size:.72rem}
}
</style>

<!-- Toast -->
<div class="toast" id="toast"></div>
<script>
// ========== 配置 ==========
const API_URL = 'https://works-showcase-d2giub4pr5d687848-1437802595.ap-shanghai.app.tcloudbase.com/api';
const LOGIN_URL = 'https://works-showcase-d2giub4pr5d687848-1437802595.ap-shanghai.app.tcloudbase.com/login';
const FEISHU_APP_ID = 'cli_aa9f2a2fb6395bdf';
const CANONICAL_ORIGIN = 'https://works-showcase-d2giub4pr5d687848-1437802595.tcloudbaseapp.com';
const CANONICAL_URL = CANONICAL_ORIGIN + '/';
const FEISHU_REDIRECT_URI = CANONICAL_ORIGIN + '/index.html';
const LOGIN_TTL_DAYS = 30;

function enforceCanonicalDomain() {
  if (window.location.origin === CANONICAL_ORIGIN) return false;
  const target = CANONICAL_URL + window.location.search + window.location.hash;
  window.location.replace(target);
  return true;
}

// ========== 状态 ==========
let visitorName = '', visitorDepartment = '', isKnown = false, visitorId = null, visitorOpenId = '', visitorAvatar = '', deviceId = '';
let currentTab = 0, sortMode = 'total', allWorks = [], interactors = {}, shareWorkId = '';

// ========== 统一 API 调用 ==========
async function apiCall(action, collection, params = {}) {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, collection, params })
    });
    return await res.json();
  } catch (e) {
    console.error(`[apiCall ${action}/${collection}]`, e);
    return { code: 500, message: '网络异常: ' + e.message };
  }
}

// ========== 设备 ID ==========
function initDeviceId() {
  deviceId = localStorage.getItem('works_device_id');
  if (!deviceId) {
    deviceId = 'dev_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    localStorage.setItem('works_device_id', deviceId);
  }
}

// ========== 登录 UI ==========
function setLoginChecking() {
  const overlay = document.getElementById('login-overlay');
  overlay.classList.remove('hidden');
  overlay.classList.add('checking');
  document.getElementById('main').classList.remove('show');
}
function hideLogin() {
  const overlay = document.getElementById('login-overlay');
  overlay.classList.add('hidden');
  overlay.classList.remove('checking');
  document.getElementById('main').classList.add('show');
  updateNavUser();
}
function showLogin() {
  const overlay = document.getElementById('login-overlay');
  overlay.classList.remove('hidden');
  overlay.classList.remove('checking');
  document.getElementById('main').classList.remove('show');
  const logoutBtn = document.getElementById('logout-btn');
  if (logoutBtn) logoutBtn.style.display = 'none';
}
function logout() {
  localStorage.removeItem('loginInfo');
  visitorName = '';
  visitorDepartment = '';
  visitorOpenId = '';
  visitorAvatar = '';
  visitorId = null;
  isKnown = false;
  if (typeof closeDetail === 'function') closeDetail();
  showLogin();
  updateNavUser();
  showToast('已退出登录');
}

// ========== 飞书登录 ==========
function doFeishuLogin() {
  const url = 'https://passport.feishu.cn/suite/passport/oauth/authorize'
    + '?client_id=' + FEISHU_APP_ID
    + '&redirect_uri=' + encodeURIComponent(FEISHU_REDIRECT_URI)
    + '&response_type=code'
    + '&state=feishu_login_' + Date.now();
  window.location.assign(url);
}

async function handleFeishuCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  if (!code || !state || state.indexOf('feishu_login') !== 0) return false;
  window.history.replaceState({}, document.title, window.location.pathname);
  try {
    const res = await exchangeCode(code);
    if (res.code !== 0) { showToast('飞书登录失败: ' + (res.message || '未知错误')); return false; }
    const d = res.data;
    const name = d.name || d.en_name || '飞书用户';
    const dept = d.department_ids ? d.department_ids.join(',') : '';
    await autoLoginWithFeishu(d.open_id, name, dept, d.avatar_url);
    return true;
  } catch (e) { console.error('[feishu callback]', e); showToast('飞书登录异常'); return false; }
}

async function exchangeCode(code) {
  try {
    const res = await fetch(LOGIN_URL + '?code=' + encodeURIComponent(code), { method: 'POST' });
    return await res.json();
  } catch (e) {
    console.error('[exchangeCode]', e);
    return { code: 500, message: '调用云函数失败: ' + e.message };
  }
}

async function autoLoginWithFeishu(openId, name, department, avatarUrl) {
  visitorName = name;
  visitorDepartment = department;
  isKnown = true;
  localStorage.setItem('loginInfo', JSON.stringify({ nickname: name, department: department || '', timestamp: Date.now(), openId }));
  // 写入数据库
  try {
    const res = await apiCall('get', 'visitors', { query: { open_id: openId }, limit: 1 });
    if (res.code === 0 && res.data && res.data.data && res.data.data.length === 0) {
      await apiCall('add', 'visitors', { data: { name, department,  open_id: openId, avatar: avatarUrl, createdAt: new Date().toISOString() } });
    } else if (res.code === 0 && res.data && res.data.data && res.data.data.length > 0) {
      await apiCall('update', 'visitors', { docId: res.data.data[0]._id, data: { name, department, lastLoginAt: new Date().toISOString() } });
    }
  } catch (e) { console.warn('[feishu login] DB write skipped:', e); }
  hideLogin();
  showToast('欢迎 ' + name + '（' + (department || '已登录') + '）！');
  loadData();
}

// ========== 手动登录 ==========
async function doLogin() {
  const name = document.getElementById('name-input').value.trim();
  const dept = document.getElementById('dept-input').value.trim();
  const errEl = document.getElementById('login-error');
  if (!name || !dept) { if (errEl) errEl.style.display = 'block'; return; }
  if (errEl) errEl.style.display = 'none';
  visitorName = name;
  visitorDepartment = dept;
  isKnown = true;
  localStorage.setItem('loginInfo', JSON.stringify({ nickname: name, department: dept, timestamp: Date.now() }));
  // 写入数据库
  try {
    const res = await apiCall('get', 'visitors', { query: { deviceId: deviceId }, limit: 1 });
    if (res.code === 0 && res.data && res.data.data && res.data.data.length === 0) {
      await apiCall('add', 'visitors', { data: { name, department: dept,  createdAt: new Date().toISOString() } });
    } else if (res.code === 0 && res.data && res.data.data && res.data.data.length > 0) {
      await apiCall('update', 'visitors', { docId: res.data.data[0]._id, data: { name, department: dept, lastLoginAt: new Date().toISOString() } });
    }
  } catch (e) { console.warn('[doLogin] DB write skipped:', e); }
  hideLogin();
  showToast('欢迎 ' + name + '（' + dept + '）！');
  loadData();
}

// ========== 数据加载 ==========
async function loadData() {
  try {
    const res = await apiCall('get', 'works', {
      query: { category: currentTab, visible: true },
      orderBy: 'createdAt',
      orderType: 'desc',
      limit: 200
    });
    allWorks = (res.code === 0 && res.data && res.data.data) ? res.data.data : [];
  } catch (e) { console.error('[loadData] error:', e); allWorks = []; }
  loadInteractors();
  renderWorks();
}

function switchTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.sheet-tab').forEach(t => t.classList.toggle('active', parseInt(t.dataset.tab) === idx));
  loadData();
  updateNavUser();
}

// ========== 作品渲染 ==========
function renderWorks() {
  const container = document.getElementById('cards');
  if (!allWorks.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">✨</div><p>暂无作品，敬请期待</p></div>';
    return;
  }
  let html = '';
  for (const w of allWorks) {
    const stats = w._stats || { likes: 0, comments: 0, shares: 0 };
    const liked = interactors[w._id] && interactors[w._id].liked;
    const imgs = w.images || [];
    const slide = interactors[w._id] && interactors[w._id].slide ? interactors[w._id].slide : 0;

    const slides = imgs.length ? imgs.map((src, i) => '<div class="carousel-slide"><img src="' + escHtml(src) + '" alt="" onerror="this.parentElement.innerHTML=\'<div style=\'aspect-ratio:3/4;background:#f0f0f0;display:flex;align-items:center;justify-content:center\'><span style=\'font-size:2rem;opacity:.4\'>🖼️</span></div>\'"></div>').join('') : '<div class="carousel-slide"><div style="aspect-ratio:3/4;background:linear-gradient(135deg,#f5f5f4,#e8e8e8);display:flex;align-items:center;justify-content:center"><span style="font-size:2rem;opacity:.4">🖼️</span></div></div>';
    const dots = imgs.length > 1 ? '<div class="carousel-dots" id="dots-' + w._id + '">' + imgs.map((_, i) => '<div class="dot' + (i === slide ? ' active' : '') + '"></div>').join('') + '</div>' : '';
    const arrows = imgs.length > 1 ? '<button class="carousel-btn prev" onclick="event.stopPropagation();prevSlide(\'' + w._id + '\')">‹</button><button class="carousel-btn next" onclick="event.stopPropagation();nextSlide(\'' + w._id + '\')">›</button>' : '';

    html += '<div class="card" id="card-' + w._id + '" data-wid="' + w._id + '" onclick="openShareModal(\'' + w._id + '\')">';
    html += '<div class="card-carousel" id="carousel-' + w._id + '" data-wid="' + w._id + '"><div class="carousel-track" id="track-' + w._id + '" style="transform:translateX(-' + slide * 100 + '%)">' + slides + '</div>';
    if (arrows) html += arrows;
    if (dots) html += dots;
    html += '</div>';
    html += '<div class="card-body"><div class="card-title">' + escHtml(w.title || '未命名作品') + '</div>';
    if (w.description) html += '<div class="card-desc">' + escHtml(w.description) + '</div>';
    html += '</div>';
    html += '<div class="card-actions">';
    html += '<button class="card-action' + (liked ? ' liked' : '') + '" onclick="event.stopPropagation();toggleLike(\'' + w._id + '\')" title="点赞">' + uiIcon('like', liked) + '<span>' + stats.likes + '</span></button>';
    html += '<button class="card-action" onclick="event.stopPropagation();toggleComment(\'' + w._id + '\')" title="评论">' + uiIcon('comment') + '<span id="comments-count-' + w._id + '">' + stats.comments + '</span></button>';
    html += '<button class="card-action" onclick="event.stopPropagation();openShareModal(\'' + w._id + '\')" title="分享">' + uiIcon('share') + '<span>' + stats.shares + '</span></button>';
    html += '</div>';
    html += '<div class="comment-panel' + (interactors[w._id] && interactors[w._id].commentOpen ? ' show' : '') + '" id="comments-' + w._id + '">';
    html += '<div class="comment-input-row"><input type="text" placeholder="写评论…" id="comment-input-' + w._id + '" onkeydown="if(event.key===\'Enter\')submitComment(\'' + w._id + '\')"><button onclick="submitComment(\'' + w._id + '\')">发送</button></div>';
    html += '<div class="comment-list" id="comment-list-' + w._id + '"><div class="loading"><div class="spinner"></div></div></div>';
    html += '</div>';
    html += '</div>';
  }
  container.innerHTML = html;
  loadVisibleComments();
}

// ========== 交互状态 ==========
function loadInteractors() { try { const s = localStorage.getItem('works_interactors'); if (s) interactors = { ...interactors, ...JSON.parse(s) } } catch (e) { } }
function saveInteractors() { localStorage.setItem('works_interactors', JSON.stringify(interactors)) }

// ========== 点赞 ==========
async function toggleLike(work_id) {
  if (!interactors[work_id]) interactors[work_id] = {};
  interactors[work_id].liked = !interactors[work_id].liked;
  saveInteractors();
  const w = allWorks.find(x => x._id === work_id);
  if (w && w._stats) { w._stats.likes += interactors[work_id].liked ? 1 : -1; }
  // 写 likes 表
  try {
    await apiCall('add', 'likes', {
      data: { work_id, user_name: visitorName,   created_at: new Date().toISOString() }
    });
  } catch (e) { }
  // 更新 work_stats
  try {
    const sc = await apiCall('get', 'work_stats', { query: { work_id: work_id }, limit: 1 });
    if (sc.code === 0 && sc.data && sc.data.data && sc.data.data.length > 0) {
      const old = sc.data.data[0];
      await apiCall('update', 'work_stats', { docId: old.id, data: { likes: old.likes + (interactors[work_id].liked ? 1 : -1) } });
    } else {
      await apiCall('add', 'work_stats', { data: { work_id, likes: interactors[work_id].liked ? 1 : 0, comments: 0, shares: 0 } });
    }
  } catch (e) { }
  renderWorks();
}

// ========== 评论 ==========
function toggleComment(work_id) {
  if (!interactors[work_id]) interactors[work_id] = {};
  interactors[work_id].commentOpen = !interactors[work_id].commentOpen;
  saveInteractors();
  renderWorks();
  if (interactors[work_id].commentOpen) { loadComments(work_id); }
}

async function loadComments(work_id) {
  const list = document.getElementById('comment-list-' + work_id); if (!list) return;
  try {
    const res = await apiCall('get', 'comments', {
      query: { work_id: work_id },
      orderBy: 'createdAt',
      orderType: 'desc',
      limit: 50
    });
    const comments = (res.code === 0 && res.data && res.data.data) ? res.data.data : [];
    if (comments.length) {
      list.innerHTML = comments.map(c => {
        const time = c.createdAt ? formatTime(c.createdAt) : '';
        const dept = c.user_department ? '<span class="comment-dept">' + escHtml(c.user_department) + '</span>' : '';
        return '<div class="comment-item"><span class="comment-author">' + escHtml(c.user_name || c.authorName || '匿名') + '</span>' + dept + '<span class="comment-time">' + time + '</span><div class="comment-text">' + escHtml(c.content || c.text) + '</div></div>';
      }).join('');
    } else { list.innerHTML = '<div style="padding:8px 0;color:var(--text-dim);font-size:.8rem">暂无评论，来抢沙发吧~</div>'; }
  } catch (e) { list.innerHTML = '<div style="padding:8px 0;color:var(--text-dim);font-size:.8rem">评论加载失败</div>'; }
}

async function submitComment(work_id) {
  const input = document.getElementById('comment-input-' + work_id); const text = input.value.trim();
  if (!text || !visitorName) { showToast('请先输入评论内容'); return; }
  try {
    await apiCall('add', 'comments', {
      data: { work_id, user_name: visitorName,   content: text, created_at: new Date().toISOString() }
    });
    input.value = '';
    const sc = await apiCall('get', 'work_stats', { query: { work_id: work_id }, limit: 1 });
    if (sc.code === 0 && sc.data && sc.data.data && sc.data.data.length > 0) {
      const old = sc.data.data[0];
      await apiCall('update', 'work_stats', { docId: old.id, data: { comments: (old.comments || 0) + 1 } });
    } else {
      await apiCall('add', 'work_stats', { data: { work_id, likes: 0, comments: 1, shares: 0 } });
    }
    const w = allWorks.find(x => x._id === work_id); if (w && w._stats) w._stats.comments++;
    renderWorks(); loadComments(work_id); showToast('评论成功 🎉');
  } catch (e) { console.error('[submitComment] error:', e); showToast('评论失败，请重试'); }
}

let visibleCommentsLoaded = {};
function loadVisibleComments() { allWorks.forEach(w => { if (interactors[w._id] && interactors[w._id].commentOpen && !visibleCommentsLoaded[w._id]) { visibleCommentsLoaded[w._id] = true; loadComments(w._id); } }) }

// ========== 轮播 ==========
function goSlide(work_id, idx) {
  const w = allWorks.find(x => x._id === work_id); if (!w) return;
  const imgs = w.images || []; if (!imgs.length) return;
  if (!interactors[work_id]) interactors[work_id] = {};
  idx = Math.max(0, Math.min(idx, imgs.length - 1)); interactors[work_id].slide = idx; saveInteractors();
  const track = document.getElementById('track-' + work_id); if (track) track.style.transform = 'translateX(-' + idx * 100 + '%)';
  const dotsWrap = document.getElementById('dots-' + work_id);
  if (dotsWrap) { dotsWrap.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx)); }
}
function nextSlide(work_id) { const w = allWorks.find(x => x._id === work_id); if (!w) return; const idx = (interactors[work_id] && interactors[work_id].slide || 0) + 1; goSlide(work_id, idx % (w.images || []).length); }
function prevSlide(work_id) { const w = allWorks.find(x => x._id === work_id); if (!w) return; const imgs = w.images || []; const idx = (interactors[work_id] && interactors[work_id].slide || 0) - 1; goSlide(work_id, idx < 0 ? imgs.length - 1 : idx); }

// ========== 分享 ==========
function openShareModal(work_id) {
  shareWorkId = work_id; const w = allWorks.find(x => x._id === work_id);
  const url = w ? (CANONICAL_URL + '#' + work_id) : CANONICAL_URL;
  document.getElementById('share-url').value = url; document.getElementById('share-modal').classList.add('show');
}
function closeShareModal() { document.getElementById('share-modal').classList.remove('show'); shareWorkId = ''; }

function shareCopy() {
  const input = document.getElementById('share-url'); input.select();
  navigator.clipboard.writeText(input.value).then(() => { showToast('链接已复制 🔗'); recordShare(shareWorkId, 'link'); closeShareModal(); }).catch(() => { document.execCommand('copy'); showToast('链接已复制 🔗'); recordShare(shareWorkId, 'link'); closeShareModal(); });
}
function shareFeishu() {
  const url = document.getElementById('share-url').value; const w = allWorks.find(x => x._id === shareWorkId);
  const title = w ? w.title : '医起AI·挑战赛作品';
  navigator.clipboard.writeText('来看看「' + title + '」吧！' + url).then(() => { showToast('已复制到剪贴板，请在飞书中粘贴发送'); recordShare(shareWorkId, 'feishu'); closeShareModal(); }).catch(() => { showToast('复制失败，请手动复制链接'); });
}
function shareWechat() { recordShare(shareWorkId, 'wechat'); shareCopy(); showToast('链接已复制，请在微信中粘贴分享'); }

async function recordShare(work_id, platform) {
  try {
    await apiCall('add', 'shares', {
      data: { work_id, user_name: visitorName,   share_platform: platform || 'link', created_at: new Date().toISOString() }
    });
  } catch (e) { }
  try {
    const sc = await apiCall('get', 'work_stats', { query: { work_id: work_id }, limit: 1 });
    if (sc.code === 0 && sc.data && sc.data.data && sc.data.data.length > 0) {
      const old = sc.data.data[0];
      await apiCall('update', 'work_stats', { docId: old.id, data: { shares: (old.shares || 0) + 1 } });
    } else {
      await apiCall('add', 'work_stats', { data: { work_id, likes: 0, comments: 0, shares: 1 } });
    }
    const w = allWorks.find(x => x._id === work_id); if (w && w._stats) w._stats.shares++;
  } catch (e) { }
}

// ========== 工具函数 ==========
function scrollToWorkFromHash() { const hash = window.location.hash.slice(1); if (!hash) return; const card = document.getElementById('card-' + hash); if (card) setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove('show'), 2500); }
function escHtml(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
function uiIcon(type, filled) {
  if (type === 'like') return '<span class="icon"><svg class="action-icon action-icon-heart" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.8 4.6c-1.8-1.8-4.8-1.8-6.6 0L12 6.8 9.8 4.6C8 2.8 5 2.8 3.2 4.6s-1.8 4.8 0 6.6L12 20l8.8-8.8c1.8-1.8 1.8-4.8 0-6.6Z"' + (filled ? ' fill="currentColor"' : '') + '></path></svg></span>';

function formatTime(v) { if (v instanceof Date) return v.toLocaleString('zh-CN'); if (typeof v === 'string') { try { return new Date(v).toLocaleString('zh-CN'); } catch (e) { return v; } } if (v && v.$date) return new Date(v.$date).toLocaleString('zh-CN'); return ''; }
function updateNavUser() {

  if (logoutBtn) logoutBtn.style.display = visitorName ? 'inline-flex' : 'none';

// ========== RDB 字段适配 ==========
function apiRows(res) {
  if (!res || res.code !== 0) return [];
  if (Array.isArray(res.data)) return res.data;
  if (res.data && Array.isArray(res.data.data)) return res.data.data;
  return [];
}

function normalizeImages(images, cover) {
  let list = images;
  if (typeof list === 'string') {
    try { list = JSON.parse(list); } catch (e) { list = list ? [list] : []; }
  }
  if (!Array.isArray(list)) list = [];
  if (!list.length && cover) list = [cover];
  return list.filter(Boolean);
}

function normalizeWork(w) {
  const id = String(w.id || w._id || '');
  return {
    ...w,
    _id: id,
    id: w.id || w._id,
    category: String(w.category ?? '0'),
    images: normalizeImages(w.images, w.cover_image),
    like_count: Number(w.like_count || 0),
    comment_count: Number(w.comment_count || 0),
    share_count: Number(w.share_count || 0),
    _stats: {
      likes: Number(w.like_count || 0),
      comments: Number(w.comment_count || 0),
      shares: Number(w.share_count || 0)
    }
  };
}

function sqlNow() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}

function currentVisitorKey() {
  return visitorOpenId || ('device_' + deviceId);
}

function findOwnRow(rows, workId) {
  const key = currentVisitorKey();
  return rows.find(r => String(r.work_id) === String(workId) && (String(r.user_open_id || '') === key || Number(r.user_id || 0) === Number(visitorId || -1)));
}

async function getRows(collection, limit = 1000) {
  const res = await apiCall('get', collection, { limit });
  return apiRows(res);
}

async function upsertVisitor(openId, name, department, avatar) {
  const key = openId || ('device_' + deviceId);
  visitorOpenId = key;
  visitorAvatar = avatar || '';
  try {
    const rows = await getRows('visitors', 1000);
    const old = rows.find(v => v.open_id === key);
    const data = { open_id: key, name, avatar: avatar || '', updated_at: sqlNow() };
    if (old) {
      visitorId = old.id;
      await apiCall('update', 'visitors', { docId: old.id, data });
    } else {
      const add = await apiCall('add', 'visitors', { data: { ...data, created_at: sqlNow() } });
      const created = add && add.data && (add.data.id || add.data.insertId || add.data.lastInsertId);
      visitorId = created || null;
    }
  } catch (e) {
    console.warn('[upsertVisitor]', e);
  }
}

async function autoLoginWithFeishu(openId, name, department, avatarUrl) {
  visitorName = name;
  visitorDepartment = department || '';
  isKnown = true;
  localStorage.setItem('loginInfo', JSON.stringify({ nickname: name, department: visitorDepartment, timestamp: Date.now(), openId, avatarUrl }));
  await upsertVisitor(openId, name, visitorDepartment, avatarUrl);
  hideLogin();
  showToast('欢迎 ' + name + '（' + (visitorDepartment || '已登录') + '）！');
  loadData();
}

async function doLogin() {
  const name = document.getElementById('name-input').value.trim();
  const dept = document.getElementById('dept-input').value.trim();
  const errEl = document.getElementById('login-error');
  if (!name || !dept) { if (errEl) errEl.style.display = 'block'; return; }
  if (errEl) errEl.style.display = 'none';
  visitorName = name;
  visitorDepartment = dept;
  isKnown = true;
  localStorage.setItem('loginInfo', JSON.stringify({ nickname: name, department: dept, timestamp: Date.now(), openId: 'device_' + deviceId }));
  await upsertVisitor('device_' + deviceId, name, dept, '');
  hideLogin();
  showToast('欢迎 ' + name + '（' + dept + '）！');
  loadData();
}

async function loadData() {
  try {
    const rows = await getRows('works', 500);
    allWorks = rows.map(normalizeWork)
      .filter(w => String(w.category) === String(currentTab) && Number(w.status ?? 1) === 1)
      .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
  } catch (e) {
    console.error('[loadData] error:', e);
    allWorks = [];
  }
  loadInteractors();
  renderWorks();
}

function renderWorks() {
  const container = document.getElementById('cards');
  if (!allWorks.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">✨</div><p>暂无作品，敬请期待</p></div>';

  }
  let html = '';
  for (const w of allWorks) {
    const stats = w._stats || { likes: 0, comments: 0, shares: 0 };
    const liked = interactors[w._id] && interactors[w._id].liked;
    const imgs = normalizeImages(w.images, w.cover_image);
    const slide = interactors[w._id] && interactors[w._id].slide ? interactors[w._id].slide : 0;
    const safeId = escHtml(w._id);
    const slides = imgs.length ? imgs.map(src => '<div class="carousel-slide"><img src="' + escHtml(src) + '" alt="" loading="lazy" onerror="this.parentElement.innerHTML=\'<div style=\\\'aspect-ratio:4/3;background:#f0f0f0;display:flex;align-items:center;justify-content:center\\\'><span style=\\\'font-size:2rem;opacity:.4\\\'>🖼️</span></div>\'"></div>').join('') : '<div class="carousel-slide"><div style="aspect-ratio:4/3;background:linear-gradient(135deg,#f5f5f4,#e8e8e8);display:flex;align-items:center;justify-content:center"><span style="font-size:2rem;opacity:.4">🖼️</span></div></div>';
    const dots = imgs.length > 1 ? '<div class="carousel-dots" id="dots-' + safeId + '">' + imgs.map((_, i) => '<div class="dot' + (i === slide ? ' active' : '') + '"></div>').join('') + '</div>' : '';
    const arrows = imgs.length > 1 ? '<button class="carousel-btn prev" onclick="event.stopPropagation();prevSlide(\'' + safeId + '\')">‹</button><button class="carousel-btn next" onclick="event.stopPropagation();nextSlide(\'' + safeId + '\')">›</button>' : '';

    html += '<div class="card" id="card-' + safeId + '" data-wid="' + safeId + '">';
    html += '<div class="card-carousel" id="carousel-' + safeId + '" data-wid="' + safeId + '"><div class="carousel-track" id="track-' + safeId + '" style="transform:translateX(-' + slide * 100 + '%)">' + slides + '</div>';
    if (arrows) html += arrows;
    if (dots) html += dots;
    html += '</div>';
    html += '<div class="card-body"><div class="card-title">' + escHtml(w.title || '未命名作品') + '</div>';
    if (w.description) html += '<div class="card-desc">' + escHtml(w.description) + '</div>';
    if (w.creator_name) html += '<div class="card-meta">作者：' + escHtml(w.creator_name) + '</div>';

    html += '<button class="card-action" onclick="event.stopPropagation();toggleComment(\'' + safeId + '\')" title="评论">' + uiIcon('comment') + '<span id="comments-count-' + safeId + '">' + stats.comments + '</span></button>';
    html += '<button class="card-action" onclick="event.stopPropagation();openShareModal(\'' + safeId + '\')" title="分享">' + uiIcon('share') + '<span>' + stats.shares + '</span></button>';
    html += '</div>';
    html += '<div class="comment-panel' + (interactors[w._id] && interactors[w._id].commentOpen ? ' show' : '') + '" id="comments-' + safeId + '" onclick="event.stopPropagation()">';
    html += '<div class="comment-input-row"><input type="text" placeholder="写评论…" id="comment-input-' + safeId + '" onclick="event.stopPropagation()" onkeydown="if(event.key===\'Enter\'){event.stopPropagation();submitComment(\'' + safeId + '\')}"><button onclick="event.stopPropagation();submitComment(\'' + safeId + '\')">发送</button></div>';
    html += '<div class="comment-list" id="comment-list-' + safeId + '"><div class="loading"><div class="spinner"></div></div></div>';
    html += '</div></div>';
  }
  container.innerHTML = html;
  loadVisibleComments();
}

async function writeWorkCount(workId, field, value) {
  const docId = Number(workId);
  if (!docId) return;
  await apiCall('update', 'works', { docId, data: { [field]: Math.max(0, value), updated_at: sqlNow() } });
}

async function toggleLike(workId) {
  if (!interactors[workId]) interactors[workId] = {};
  const wasLiked = !!interactors[workId].liked;
  const nextLiked = !wasLiked;
  interactors[workId].liked = nextLiked;
  saveInteractors();
  const w = allWorks.find(x => x._id === String(workId));
  if (!w) return;
  const nextCount = Math.max(0, Number(w.like_count || 0) + (nextLiked ? 1 : -1));
  w.like_count = nextCount;
  w._stats.likes = nextCount;
  renderWorks();
  try {
    if (nextLiked) {
      const added = await apiCall('add', 'likes', { data: { work_id: Number(workId), user_id: Number(visitorId || 0), user_open_id: currentVisitorKey(), created_at: sqlNow() } });
      if (added.code !== 0) throw new Error(added.message || '点赞写入失败');
    } else {
      const own = findOwnRow(await getRows('likes', 1000), workId);
      if (own) {
        const deleted = await apiCall('delete', 'likes', { docId: own.id });
        if (deleted.code !== 0) throw new Error(deleted.message || '取消点赞失败');
      }
    }
    await writeWorkCount(workId, 'like_count', nextCount);
  } catch (e) {
    console.error('[toggleLike]', e);
    showToast('点赞更新失败，请重试');
    loadData();
  }
}

function toggleComment(workId) {
  if (!interactors[workId]) interactors[workId] = {};
  interactors[workId].commentOpen = !interactors[workId].commentOpen;
  saveInteractors();
  renderWorks();
}

async function loadComments(workId) {
  const list = document.getElementById('comment-list-' + workId);
  if (!list) return;
  try {
    const comments = (await getRows('comments', 1000))
      .filter(c => String(c.work_id) === String(workId))
      .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
    if (!comments.length) {
      list.innerHTML = '<div style="padding:8px 0;color:var(--text-dim);font-size:.8rem">暂无评论，来抢沙发吧~</div>';
      return;
    }
    list.innerHTML = comments.map(c => {
      const time = c.created_at ? formatTime(c.created_at) : '';
      const name = c.user_name || c.name || '匿名';
      return '<div class="comment-item"><span class="comment-author">' + escHtml(name) + '</span><span class="comment-time">' + time + '</span><div class="comment-text">' + escHtml(c.content || '') + '</div></div>';
    }).join('');
  } catch (e) {
    list.innerHTML = '<div style="padding:8px 0;color:var(--text-dim);font-size:.8rem">评论加载失败</div>';
  }
}

async function submitComment(workId) {
  const input = document.getElementById('comment-input-' + workId);
  const text = input.value.trim();
  if (!text) { showToast('请先输入评论内容'); return; }
  if (!visitorName) { showToast('请先登录'); return; }
  try {
    const added = await apiCall('add', 'comments', { data: { work_id: Number(workId), user_id: Number(visitorId || 0), user_name: visitorName, user_avatar: visitorAvatar || '', content: text, _openid: currentVisitorKey(), created_at: sqlNow() } });
    if (added.code !== 0) throw new Error(added.message || '评论写入失败');
    input.value = '';
    const w = allWorks.find(x => x._id === String(workId));
    if (w) {
      w.comment_count = Number(w.comment_count || 0) + 1;
      w._stats.comments = w.comment_count;
      await writeWorkCount(workId, 'comment_count', w.comment_count);
    }
    renderWorks();
    showToast('评论成功 🎉');
  } catch (e) {
    console.error('[submitComment] error:', e);
    showToast('评论失败，请重试');
  }
}

function loadVisibleComments() {
  allWorks.forEach(w => {
    if (interactors[w._id] && interactors[w._id].commentOpen) {
      loadComments(w._id);
    }
  });
}

function goSlide(workId, idx) {
  const w = allWorks.find(x => x._id === String(workId));
  if (!w || !w.images.length) return;
  if (!interactors[workId]) interactors[workId] = {};
  idx = Math.max(0, Math.min(idx, w.images.length - 1));
  interactors[workId].slide = idx;
  saveInteractors();
  const track = document.getElementById('track-' + workId);
  if (track) track.style.transform = 'translateX(-' + idx * 100 + '%)';
  const dotsWrap = document.getElementById('dots-' + workId);
  if (dotsWrap) dotsWrap.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
}
function nextSlide(workId) { const w = allWorks.find(x => x._id === String(workId)); if (w && w.images.length) goSlide(workId, ((interactors[workId] && interactors[workId].slide) || 0) + 1 >= w.images.length ? 0 : ((interactors[workId] && interactors[workId].slide) || 0) + 1); }
function prevSlide(workId) { const w = allWorks.find(x => x._id === String(workId)); if (w && w.images.length) goSlide(workId, ((interactors[workId] && interactors[workId].slide) || 0) - 1 < 0 ? w.images.length - 1 : ((interactors[workId] && interactors[workId].slide) || 0) - 1); }

function openShareModal(workId) {
  shareWorkId = String(workId);
  const url = CANONICAL_URL + '#' + shareWorkId;
  document.getElementById('share-url').value = url;
  document.getElementById('share-modal').classList.add('show');
}

async function recordShare(workId, platform) {
  if (!workId) return;
  try {
    const added = await apiCall('add', 'shares', { data: { work_id: Number(workId), user_id: Number(visitorId || 0), share_platform: platform || 'link', _openid: currentVisitorKey(), created_at: sqlNow() } });
    if (added.code !== 0) throw new Error(added.message || '分享写入失败');
    const w = allWorks.find(x => x._id === String(workId));
    if (w) {
      w.share_count = Number(w.share_count || 0) + 1;
      w._stats.shares = w.share_count;
      await writeWorkCount(workId, 'share_count', w.share_count);
      renderWorks();
    }
    return true;
  } catch (e) {
    console.error('[recordShare]', e);
    showToast('分享计数失败，请重试');
    return false;
  }
}

function copyShareText(text, okMsg, platform) {
  const done = async () => { const ok = await recordShare(shareWorkId, platform); if (ok) showToast(okMsg); closeShareModal(); };
  navigator.clipboard.writeText(text).then(done).catch(() => {
    const input = document.getElementById('share-url');
    input.value = text;
    input.select();
    document.execCommand('copy');
    done();
  });
}
function shareCopy() { copyShareText(document.getElementById('share-url').value, '链接已复制 🔗', 'link'); }
function shareFeishu() {
  const w = allWorks.find(x => x._id === shareWorkId);
  const title = w ? w.title : '医起AI·挑战赛作品';
  copyShareText('来看看「' + title + '」吧！' + document.getElementById('share-url').value, '已复制到剪贴板，请在飞书中粘贴发送', 'feishu');
}
function shareWechat() { copyShareText(document.getElementById('share-url').value, '链接已复制，请在微信中粘贴分享', 'wechat'); }

// ========== 初始化 ==========
async function init() {
  if (enforceCanonicalDomain()) return;
  setLoginChecking();
  initDeviceId();
  const nameInput = document.getElementById('name-input');
  const deptInput = document.getElementById('dept-input');
  const loginBtn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  function checkLoginReady() { const ready = nameInput.value.trim() && deptInput.value.trim(); loginBtn.disabled = !ready; if (ready && errEl) errEl.style.display = 'none'; }
  nameInput.addEventListener('input', checkLoginReady); deptInput.addEventListener('input', checkLoginReady);
  nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') { if (nameInput.value.trim() && deptInput.value.trim()) doLogin(); else checkLoginReady(); } });
  deptInput.addEventListener('keydown', e => { if (e.key === 'Enter') { if (nameInput.value.trim() && deptInput.value.trim()) doLogin(); else checkLoginReady(); } });
  loginBtn.addEventListener('click', doLogin);
  // 处理飞书回调
  const feishuOk = await handleFeishuCallback();
  if (feishuOk) return;
  // 检查本地缓存
  const saved = localStorage.getItem('loginInfo');
  if (saved) { try { const info = JSON.parse(saved); const days = (Date.now() - info.timestamp) / (1000 * 60 * 60 * 24); if (days <= LOGIN_TTL_DAYS && info.nickname) { visitorName = info.nickname; visitorDepartment = info.department || ''; visitorOpenId = info.openId || ('device_' + deviceId); visitorAvatar = info.avatarUrl || ''; isKnown = true; await upsertVisitor(visitorOpenId, visitorName, visitorDepartment, visitorAvatar); hideLogin(); await loadData(); return; } } catch (e) { } }
  showLogin();
}
init();

<script>
// Permanent-image feed/detail override.
var detailWorkId = '';
var detailSlide = 0;

function imageUrl(item) {
  if (!item) return '';
  if (typeof item === 'string') return item;
  return item.url || item.tempUrl || item.tempFileURL || item.stableUrl || item.src || item.fileID || '';
}

function imageFileId(item) {
  if (!item || typeof item === 'string') return '';
  return item.fileID || item.fileId || '';
}

function imageStableUrl(item) {
  if (!item) return '';
  if (typeof item === 'string') return item.split('?')[0];
  return item.stableUrl || (item.url ? String(item.url).split('?')[0] : '') || item.fileID || '';
}

function imageTagAttrs(item) {
  return 'src="' + escHtml(imageUrl(item)) + '" data-file-id="' + escHtml(imageFileId(item)) + '" data-stable-url="' + escHtml(imageStableUrl(item)) + '" onerror="refreshImageElement(this)"';
}

async function refreshImageElement(img) {
  if (!img || img.dataset.refreshing === '1') return;
  img.dataset.refreshing = '1';
  const key = img.dataset.fileId || img.dataset.stableUrl || img.currentSrc || img.src || '';
  if (!key) return;
  try {
    const res = await fetch(API_URL + '?action=fileUrl&collection=works&fileID=' + encodeURIComponent(key));
    const json = await res.json();
    const first = json && json.code === 0 && json.data && json.data.images && json.data.images[0];
    const nextUrl = typeof first === 'string' ? first : (first && first.url);
    if (nextUrl) {
      img.onerror = function () { showImageFallback(img); };
      img.src = nextUrl;
      return;
    }
  } catch (e) {
    console.warn('Image refresh failed:', e.message);
  }
  showImageFallback(img);
}

function setImageElement(img, item) {
  img.dataset.fileId = imageFileId(item);
  img.dataset.stableUrl = imageStableUrl(item);
  img.onerror = function () { refreshImageElement(img); };
  img.style.display = '';
  img.src = imageUrl(item);
}

function showImageFallback(img) {
  if (!img) return;
  const parent = img.parentElement;
  if (parent && parent.classList && parent.classList.contains('carousel-slide')) {
    parent.innerHTML = '<div class="card-fallback"></div>';
  } else {
    img.style.display = 'none';
  }
}

function normalizeImages(images, cover) {
  let list = images;
  if (typeof list === 'string') {
    try { list = JSON.parse(list); } catch (e) { list = list ? [list] : []; }
  }
  if (!Array.isArray(list)) list = [];
  if (!list.length && cover) list = [cover];
  return list.map(item => {
    if (!item) return null;
    if (typeof item === 'string') return item;
    return {
      fileID: item.fileID || item.fileId || '',
      url: item.url || item.tempUrl || item.tempFileURL || item.src || '',
      stableUrl: item.stableUrl || ''
    };
  }).filter(item => imageUrl(item));
}

function normalizeWork(w) {
  const id = String(w.id || w._id || '');
  return {
    ...w,
    _id: id,
    id: w.id || w._id,
    category: String(w.category ?? '0'),
    images: normalizeImages(w.images, w.cover_image),
    like_count: Number(w.like_count || 0),
    comment_count: Number(w.comment_count || 0),
    share_count: Number(w.share_count || 0),
    _stats: {
      likes: Number(w.like_count || 0),
      comments: Number(w.comment_count || 0),
      shares: Number(w.share_count || 0)
    }
  };
}

function avatarHtml(name, avatar) {
  if (avatar) return '<img src="' + escHtml(avatar) + '" alt="" style="width:100%;height:100%;object-fit:cover">';
  return escHtml(String(name || '匿').slice(0, 1));
}

function workScore(w, key) {
  const stats = w && w._stats ? w._stats : {};
  if (key === 'likes') return Number(stats.likes || w.like_count || 0);
  if (key === 'comments') return Number(stats.comments || w.comment_count || 0);
  if (key === 'shares') return Number(stats.shares || w.share_count || 0);
  return Number(stats.likes || w.like_count || 0) + Number(stats.comments || w.comment_count || 0) + Number(stats.shares || w.share_count || 0);
}

function compareWorks(a, b) {
  if (sortMode === 'newest') return new Date(b.created_at || 0) - new Date(a.created_at || 0);
  const diff = workScore(b, sortMode) - workScore(a, sortMode);
  if (diff !== 0) return diff;
  return new Date(b.created_at || 0) - new Date(a.created_at || 0);
}

function setSortMode(mode) {
  sortMode = mode || 'total';
  renderWorks();
}

async function loadData() {
  try {
    const rows = await getRows('works', 500);
    allWorks = rows.map(normalizeWork)
      .filter(w => String(w.category) === String(currentTab) && Number(w.status ?? 1) === 1);
  } catch (e) {
    console.error('[loadData] error:', e);
    allWorks = [];
  }
  loadInteractors();
  renderWorks();
  openHashDetailIfNeeded();
}

function renderWorks() {
  const container = document.getElementById('cards');
  if (!container) return;
  if (!allWorks.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">✨</div><p>暂无作品，敬请期待</p></div>';
    return;
  }

  container.innerHTML = allWorks.slice().sort(compareWorks).map(w => {
    const stats = w._stats || { likes: 0, comments: 0, shares: 0 };
    const liked = interactors[w._id] && interactors[w._id].liked;
    const imgs = normalizeImages(w.images, w.cover_image);
    const slide = Math.min((interactors[w._id] && interactors[w._id].slide) || 0, Math.max(0, imgs.length - 1));
    const safeId = escHtml(w._id);
    const slides = imgs.length ? imgs.map(img => {
      return '<div class="carousel-slide"><img ' + imageTagAttrs(img) + ' alt="" loading="lazy"></div>';
    }).join('') : '<div class="carousel-slide"><div class="card-fallback"></div></div>';
    const arrows = imgs.length > 1 ? '<button class="carousel-btn prev" onclick="event.stopPropagation();prevSlide(\'' + safeId + '\')">‹</button><button class="carousel-btn next" onclick="event.stopPropagation();nextSlide(\'' + safeId + '\')">›</button>' : '';
    const dots = imgs.length > 1 ? '<div class="carousel-dots" id="dots-' + safeId + '">' + imgs.map((_, i) => '<div class="dot' + (i === slide ? ' active' : '') + '"></div>').join('') + '</div>' : '';
    const author = w.creator_name || '匿名作者';

    return '<div class="card" id="card-' + safeId + '" data-wid="' + safeId + '" onclick="openDetail(\'' + safeId + '\')">'
      + '<div class="card-carousel"><div class="carousel-track" id="track-' + safeId + '" style="transform:translateX(-' + slide * 100 + '%)">' + slides + '</div>' + arrows + dots + '</div>'
      + '<div class="card-body">'
      + '<div class="card-title">' + escHtml(w.title || '未命名作品') + '</div>'
      + '<div class="card-meta"><span class="author-avatar">' + avatarHtml(author, w.creator_avatar || '') + '</span><span class="author-name">' + escHtml(author) + '</span></div>'
      + '</div>'
      + '<div class="card-actions">'
      + '<button class="card-action' + (liked ? ' liked' : '') + '" onclick="event.stopPropagation();toggleLike(\'' + safeId + '\')" title="点赞">' + uiIcon('like', liked) + '<span>' + stats.likes + '</span></button>'
      + '<button class="card-action" onclick="event.stopPropagation();openDetail(\'' + safeId + '\', true)" title="评论">' + uiIcon('comment') + '<span id="comments-count-' + safeId + '">' + stats.comments + '</span></button>'
      + '<button class="card-action" onclick="event.stopPropagation();openShareModal(\'' + safeId + '\')" title="分享">' + uiIcon('share') + '<span>' + stats.shares + '</span></button>'
      + '</div></div>';
  }).join('');
}

function switchTab(tab) {
  currentTab = String(tab);
  document.querySelectorAll('.sheet-tab').forEach(el => el.classList.toggle('active', String(el.dataset.tab) === String(tab)));
  loadData();
}

function openHashDetailIfNeeded() {
  const id = window.location.hash.slice(1);
  if (!id || detailWorkId === id) return;
  if (allWorks.some(w => w._id === id)) openDetail(id);
}

function openDetail(workId, focusInput) {
  const w = allWorks.find(x => x._id === String(workId));
  if (!w) return;
  detailWorkId = String(workId);
  detailSlide = Math.min(detailSlide || 0, Math.max(0, w.images.length - 1));
  document.body.style.overflow = 'hidden';
  document.getElementById('detail-overlay').classList.add('show');
  renderDetail();
  loadDetailComments(detailWorkId).then(() => {
    if (focusInput) focusDetailInput();
  });
  if (window.location.hash !== '#' + detailWorkId) history.replaceState(null, '', '#' + detailWorkId);
}

function closeDetail() {
  detailWorkId = '';
  detailSlide = 0;
  detailComments = [];
  document.body.style.overflow = '';
  document.getElementById('detail-overlay').classList.remove('show');
  if (window.location.hash) history.replaceState(null, '', window.location.pathname + window.location.search);
}

function renderDetail() {
  const w = allWorks.find(x => x._id === String(detailWorkId));
  if (!w) return;
  const imgs = normalizeImages(w.images, w.cover_image);
  const img = imgs[detailSlide] || imgs[0] || '';
  const author = w.creator_name || '匿名作者';
  const stats = w._stats || { likes: 0, comments: 0, shares: 0 };
  const liked = interactors[w._id] && interactors[w._id].liked;

  setImageElement(document.getElementById('detail-image'), img);
  document.getElementById('detail-prev').style.display = imgs.length > 1 ? '' : 'none';
  document.getElementById('detail-next').style.display = imgs.length > 1 ? '' : 'none';
  document.getElementById('detail-avatar').innerHTML = avatarHtml(author, w.creator_avatar || '');
  document.getElementById('detail-author-name').textContent = author;
  document.getElementById('detail-title').textContent = w.title || '未命名作品';
  document.getElementById('detail-desc').textContent = w.description || '';
  document.getElementById('detail-time').textContent = formatTime(w.created_at);
  document.getElementById('detail-comments-head').textContent = '共 ' + stats.comments + ' 条评论';

  const likeBtn = document.getElementById('detail-like');
  likeBtn.classList.toggle('liked', !!liked);
  likeBtn.innerHTML = uiIcon('like', liked) + ' <span>' + stats.likes + '</span>';
  document.getElementById('detail-comment-action').innerHTML = uiIcon('comment') + ' <span>' + stats.comments + '</span>';
  document.getElementById('detail-share').innerHTML = uiIcon('share') + ' <span>' + stats.shares + '</span>';
}

function detailPrev() {
  const w = allWorks.find(x => x._id === String(detailWorkId));
  if (!w || !w.images.length) return;
  detailSlide = detailSlide <= 0 ? w.images.length - 1 : detailSlide - 1;
  renderDetail();
}

function detailNext() {
  const w = allWorks.find(x => x._id === String(detailWorkId));
  if (!w || !w.images.length) return;
  detailSlide = detailSlide + 1 >= w.images.length ? 0 : detailSlide + 1;
  renderDetail();
}

function focusDetailInput() {
  const input = document.getElementById('detail-input');
  if (input) setTimeout(() => input.focus(), 80);
}

async function loadDetailComments(workId) {
  const box = document.getElementById('detail-comments');
  if (!box) return;
  box.innerHTML = '<div class="loading"><div class="spinner"></div>加载评论中</div>';
  try {
    detailComments = (await getRows('comments', 1000))
      .filter(c => String(c.work_id) === String(workId))
      .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
    renderDetailComments();
  } catch (e) {
    console.error('[loadDetailComments]', e);
    box.innerHTML = '<div style="padding:18px 0;color:#999">评论加载失败</div>';
  }
}

function renderDetailComments() {
  const box = document.getElementById('detail-comments');
  if (!box) return;
  if (!detailComments.length) {
    box.innerHTML = '<div style="padding:18px 0;color:#999">暂无评论，来抢第一条</div>';
    return;
  }
  box.innerHTML = detailComments.map(c => {
    const name = c.user_name || c.name || '匿名用户';
    return '<div class="detail-comment">'
      + '<div class="author-avatar">' + avatarHtml(name, c.user_avatar || '') + '</div>'
      + '<div class="comment-main"><div class="comment-name">' + escHtml(name) + '</div>'
      + '<div class="comment-content">' + escHtml(c.content || '') + '</div>'
      + '<div class="comment-date">' + escHtml(formatTime(c.created_at)) + '</div></div></div>';
  }).join('');
}

async function submitDetailComment() {
  const input = document.getElementById('detail-input');
  const text = input.value.trim();
  if (!detailWorkId) return;
  if (!text) { showToast('请先输入评论内容'); return; }
  if (!visitorName) { showToast('请先登录'); return; }
  try {
    const added = await apiCall('add', 'comments', { data: { work_id: Number(detailWorkId), user_id: Number(visitorId || 0), user_name: visitorName, user_avatar: visitorAvatar || '', content: text, _openid: currentVisitorKey(), created_at: sqlNow() } });
    if (added.code !== 0) throw new Error(added.message || '评论写入失败');
    input.value = '';
    const w = allWorks.find(x => x._id === String(detailWorkId));
    if (w) {
      w.comment_count = Number(w.comment_count || 0) + 1;
      w._stats.comments = w.comment_count;
      await writeWorkCount(detailWorkId, 'comment_count', w.comment_count);
      renderWorks();
      renderDetail();
    }
    await loadDetailComments(detailWorkId);
    showToast('评论成功');
  } catch (e) {
    console.error('[submitDetailComment]', e);
    showToast('评论失败，请重试');
  }
}

function submitComment(workId) {
  if (String(workId) !== String(detailWorkId)) openDetail(workId, true);
  else submitDetailComment();
}

function toggleComment(workId) {
  openDetail(workId, true);
}

async function toggleLikeFromDetail() {
  if (!detailWorkId) return;
  await toggleLike(detailWorkId);
  renderDetail();
}

function loadVisibleComments() {}

function openShareModal(workId) {
  shareWorkId = String(workId || detailWorkId || '');
  const url = CANONICAL_URL + '#' + shareWorkId;
  document.getElementById('share-url').value = url;
  document.getElementById('share-modal').classList.add('show');
}

async function recordShare(workId, platform) {
  if (!workId) return false;
  try {
    const added = await apiCall('add', 'shares', { data: { work_id: Number(workId), user_id: Number(visitorId || 0), share_platform: platform || 'link', _openid: currentVisitorKey(), created_at: sqlNow() } });
    if (added.code !== 0) throw new Error(added.message || '分享写入失败');
    const w = allWorks.find(x => x._id === String(workId));
    if (w) {
      w.share_count = Number(w.share_count || 0) + 1;
      w._stats.shares = w.share_count;
      await writeWorkCount(workId, 'share_count', w.share_count);
      renderWorks();
      if (String(workId) === String(detailWorkId)) renderDetail();
    }
    return true;
  } catch (e) {
    console.error('[recordShare]', e);
    showToast('分享计数失败，请重试');
    return false;
  }
}

window.addEventListener('hashchange', openHashDetailIfNeeded);
setInterval(function renewPrivateImageUrls() {
  if (isKnown) loadData();
}, 45 * 60 * 1000);
</script>
