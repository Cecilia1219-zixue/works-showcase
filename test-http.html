<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>测试云函数 login (HTTP)</title></head>
<body style="padding:2rem;font-family:monospace">
<h2>CloudBase HTTP API 调用云函数 login</h2>
<div style="margin:1rem 0">
  <button onclick="testLogin()">调用云函数 login</button>
</div>
<pre id="log" style="margin-top:1rem;padding:1rem;background:#f0f0f0;white-space:pre-wrap">等待测试...</pre>

<script>
const ENV_ID = 'works-showcase-d2giub4pr5d687848';
const log = document.getElementById('log');

async function testLogin(){
  log.textContent = '正在调用云函数 login...\n';
  
  try {
    // CloudBase HTTP API v1 - callFunction
    const url = `https://${ENV_ID}.service.tcloudbase.com/v1/cloud/${ENV_ID}/callFunction`;
    
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: 'login',
        data: JSON.stringify({ code: 'test_123' })
      })
    });
    
    const data = await res.json();
    log.textContent = 'Status: ' + res.status + '\n';
    log.textContent += 'Response: ' + JSON.stringify(data, null, 2);
  } catch(e) {
    log.textContent += 'Error: ' + e.message + '\n';
    log.textContent += 'Full: ' + JSON.stringify(e, null, 2);
  }
}

testLogin();
</script>
</body>
</html>
